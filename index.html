<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Open Loops</title>
<style>
  :root {
    --bg: #f2ebe1;
    --surface: rgba(251, 247, 240, 0.92);
    --ink: #231d17;
    --ink-soft: #62584d;
    --accent: #b65c36;
    --rule: rgba(35, 29, 23, 0.1);
    --shadow: 0 18px 44px rgba(49, 33, 20, 0.12);
    --serif: Georgia, serif;
    --sans: "Segoe UI", sans-serif;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 24px;
    font-family: var(--sans);
    background:
      radial-gradient(circle at top left, rgba(182, 92, 54, 0.12), transparent 32%),
      linear-gradient(180deg, #f4eee6 0%, #ece4d8 100%);
    color: var(--ink);
  }

  .card {
    max-width: 720px;
    width: 100%;
    padding: 28px;
    border-radius: 24px;
    background: var(--surface);
    border: 1px solid var(--rule);
    box-shadow: var(--shadow);
  }

  h1 {
    margin: 0 0 12px;
    font-family: var(--serif);
    font-size: clamp(2rem, 4vw, 3rem);
    line-height: 1;
  }

  p {
    margin: 0 0 18px;
    color: var(--ink-soft);
    line-height: 1.65;
  }

  .actions {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
  }

  a {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 12px 16px;
    border-radius: 999px;
    border: 1px solid var(--rule);
    color: inherit;
    text-decoration: none;
    background: rgba(255, 255, 255, 0.72);
  }

  a.primary {
    background: var(--accent);
    border-color: transparent;
    color: #fff;
  }
</style>
</head>
<body>
  <main class="card">
    <h1>Open Loops</h1>
    <p>The project now includes a real app shell, PWA assets, Supabase sync scaffolding, and the original walkthrough for reference.</p>
    <div class="actions">
      <a class="primary" href="./open-loops.html">Open app shell</a>
      <a href="./open-loops-visual-walkthrough.html">Open walkthrough</a>
      <a href="./open-loops-setup.md">Open setup notes</a>
    </div>
  </main>
</body>
</html>
