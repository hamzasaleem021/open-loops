<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Open Loops">
<meta name="theme-color" content="#0f0f0f">
<meta name="description" content="A calm place for unfinished things.">
<title>Open Loops</title>
<link rel="manifest" href="./open-loops-manifest.json">
<link rel="icon" href="./open-loops-icon-192.png">
<link rel="apple-touch-icon" href="./open-loops-icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<script src="./open-loops-config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3"></script>
<style>
:root {
  --bg: #0f0f0f;
  --surface: #181818;
  --surface-2: #1f1f1f;
  --surface-3: #272727;
  --border: rgba(255,255,255,0.07);
  --border-soft: rgba(255,255,255,0.04);
  --text: #f0ede8;
  --text-2: rgba(240,237,232,0.55);
  --text-3: rgba(240,237,232,0.28);
  --accent: #e8c547;
  --accent-dim: rgba(232,197,71,0.12);
  --accent-glow: rgba(232,197,71,0.06);
  --do: #6fcf97;
  --do-dim: rgba(111,207,151,0.1);
  --decide: #e8c547;
  --decide-dim: rgba(232,197,71,0.1);
  --ask: #7eb8f7;
  --ask-dim: rgba(126,184,247,0.1);
  --schedule: #b48ef7;
  --schedule-dim: rgba(180,142,247,0.1);
  --let_go: rgba(240,237,232,0.3);
  --let_go-dim: rgba(240,237,232,0.06);
  --r-sm: 8px;
  --r-md: 12px;
  --r-lg: 16px;
  --r-xl: 22px;
  --serif: "Instrument Serif", Georgia, serif;
  --sans: "DM Sans", system-ui, sans-serif;
}

*, *::before, *::after { box-sizing: border-box; }
html { scroll-behavior: smooth; }

body {
  margin: 0;
  min-height: 100vh;
  font-family: var(--sans);
  font-size: 14px;
  color: var(--text);
  background: var(--bg);
  -webkit-font-smoothing: antialiased;
}

button, input, textarea { font: inherit; }
button { cursor: pointer; border: none; background: none; color: inherit; }
a { color: inherit; text-decoration: none; }

/* ── LAYOUT ── */
.app {
  min-height: 100vh;
  display: grid;
  grid-template-rows: auto 1fr;
}

.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 20px;
  border-bottom: 1px solid var(--border-soft);
  position: sticky;
  top: 0;
  z-index: 10;
  background: var(--bg);
}

.brand {
  display: flex;
  align-items: center;
  gap: 10px;
}

.brand-mark {
  width: 28px;
  height: 28px;
  border-radius: 8px;
  background: var(--accent);
  display: flex;
  align-items: center;
  justify-content: center;
}

.brand-mark svg {
  width: 14px;
  height: 14px;
}

.brand-name {
  font-size: 15px;
  font-weight: 500;
  letter-spacing: -0.02em;
  color: var(--text);
}

.topbar-right {
  display: flex;
  align-items: center;
  gap: 8px;
}

.pill-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 12px;
  border-radius: 999px;
  font-size: 12px;
  font-weight: 500;
  border: 1px solid var(--border);
  color: var(--text-2);
  transition: all 0.15s;
  background: transparent;
}
.pill-btn:hover { border-color: rgba(255,255,255,0.14); color: var(--text); }
.pill-btn.synced { color: var(--do); border-color: rgba(111,207,151,0.2); }
.pill-btn.syncing { color: var(--decide); border-color: rgba(232,197,71,0.2); }
.pill-btn.error { color: #f47; border-color: rgba(255,68,119,0.2); }

.dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: currentColor;
}

.main {
  padding: 0 20px 100px;
  max-width: 680px;
  margin: 0 auto;
  width: 100%;
}

/* ── TABS ── */
.tabs {
  display: flex;
  gap: 0;
  padding: 20px 0 0;
  border-bottom: 1px solid var(--border-soft);
  margin-bottom: 24px;
}

.tab {
  padding: 8px 16px 12px;
  font-size: 13px;
  font-weight: 400;
  color: var(--text-3);
  position: relative;
  transition: color 0.15s;
  cursor: pointer;
}
.tab:hover { color: var(--text-2); }
.tab.active {
  color: var(--text);
  font-weight: 500;
}
.tab.active::after {
  content: "";
  position: absolute;
  bottom: -1px;
  left: 0;
  right: 0;
  height: 2px;
  background: var(--accent);
  border-radius: 2px 2px 0 0;
}

.tab-count {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 18px;
  height: 18px;
  padding: 0 5px;
  border-radius: 999px;
  font-size: 10px;
  font-weight: 600;
  background: var(--surface-3);
  color: var(--text-2);
  margin-left: 5px;
  vertical-align: middle;
}
.tab.active .tab-count {
  background: var(--accent-dim);
  color: var(--accent);
}

/* ── REENTRY ── */
.reentry {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-xl);
  padding: 20px;
  margin-bottom: 16px;
  position: relative;
  overflow: hidden;
  animation: fadeSlideDown 0.25s ease;
}

.reentry::before {
  content: "";
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--accent-dim), transparent);
}

.reentry-eyebrow {
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 8px;
  font-weight: 500;
}

.reentry-title {
  font-family: var(--serif);
  font-size: 1.5rem;
  line-height: 1.2;
  margin: 0 0 8px;
  letter-spacing: -0.01em;
}

.reentry-note {
  font-size: 13px;
  color: var(--text-2);
  line-height: 1.6;
  margin: 0 0 16px;
}

.reentry-actions {
  display: flex;
  gap: 8px;
}

/* ── INBOX NOTICE ── */
.inbox-notice {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 12px 16px;
  border-radius: var(--r-lg);
  border: 1px solid var(--border);
  background: var(--surface);
  margin-bottom: 16px;
  animation: fadeSlideDown 0.2s ease;
}

.inbox-notice-left {
  display: flex;
  align-items: center;
  gap: 10px;
}

.inbox-badge {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 28px;
  height: 28px;
  border-radius: 8px;
  background: var(--surface-3);
  font-size: 10px;
  font-weight: 700;
  color: var(--text-2);
}

.inbox-text {
  font-size: 13px;
  color: var(--text-2);
}

/* ── SECTION ── */
.section-header {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  margin-bottom: 12px;
}

.section-label {
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-3);
  font-weight: 500;
}

.section-count {
  font-size: 12px;
  color: var(--text-3);
}

/* ── LOOP CARD ── */
.loop-stack {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.loop-card {
  background: var(--surface);
  border: 1px solid var(--border-soft);
  border-radius: var(--r-lg);
  padding: 14px 16px;
  transition: border-color 0.15s, background 0.15s;
  animation: fadeSlideDown 0.2s ease backwards;
  cursor: default;
}

.loop-card:hover {
  border-color: var(--border);
  background: var(--surface-2);
}

.loop-card.highlighted {
  border-color: var(--accent);
  background: var(--surface-2);
}

.loop-card-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 8px;
}

.kind-chip {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 3px 9px;
  border-radius: 999px;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.04em;
  flex-shrink: 0;
}

.kind-chip.do    { background: var(--do-dim);       color: var(--do); }
.kind-chip.decide{ background: var(--decide-dim);    color: var(--decide); }
.kind-chip.ask   { background: var(--ask-dim);       color: var(--ask); }
.kind-chip.schedule { background: var(--schedule-dim); color: var(--schedule); }
.kind-chip.let_go { background: var(--let_go-dim);  color: var(--let_go); }
.kind-chip.inbox { background: var(--surface-3);     color: var(--text-3); }

.kind-dot {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: currentColor;
}

.card-overflow {
  width: 28px;
  height: 28px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-3);
  transition: all 0.15s;
  flex-shrink: 0;
}
.card-overflow:hover { background: var(--surface-3); color: var(--text); }

.loop-title {
  font-size: 14px;
  font-weight: 400;
  color: var(--text);
  line-height: 1.5;
  margin: 0 0 6px;
  letter-spacing: -0.01em;
}

.loop-next {
  font-size: 12px;
  color: var(--text-2);
  line-height: 1.5;
  display: flex;
  gap: 6px;
  align-items: baseline;
}

.loop-next-label {
  font-size: 10px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-3);
  flex-shrink: 0;
}

.loop-card-bottom {
  display: flex;
  align-items: center;
  justify-content: flex-end;
  gap: 6px;
  margin-top: 12px;
}

/* ── BUTTONS ── */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 7px 14px;
  border-radius: var(--r-sm);
  font-size: 13px;
  font-weight: 500;
  transition: all 0.15s;
  cursor: pointer;
  border: none;
}

.btn-ghost {
  background: transparent;
  color: var(--text-2);
  border: 1px solid var(--border);
}
.btn-ghost:hover { background: var(--surface-2); color: var(--text); border-color: var(--border); }

.btn-primary {
  background: var(--accent);
  color: #0f0f0f;
  font-weight: 600;
}
.btn-primary:hover { background: #f0d060; }
.btn-primary:disabled { opacity: 0.35; cursor: not-allowed; }

.btn-subtle {
  background: var(--surface-2);
  color: var(--text-2);
  border: 1px solid var(--border);
}
.btn-subtle:hover { background: var(--surface-3); color: var(--text); }

.btn-sm {
  padding: 5px 10px;
  font-size: 12px;
  border-radius: 7px;
}

.btn-action {
  background: var(--surface-3);
  color: var(--text-2);
  border: 1px solid var(--border);
  padding: 5px 12px;
  font-size: 12px;
  font-weight: 500;
  border-radius: 7px;
}
.btn-action:hover { color: var(--text); border-color: rgba(255,255,255,0.14); }
.btn-action.kind-do:hover    { color: var(--do);       border-color: var(--do); background: var(--do-dim); }
.btn-action.kind-decide:hover{ color: var(--decide);   border-color: var(--decide); background: var(--decide-dim); }
.btn-action.kind-ask:hover   { color: var(--ask);      border-color: var(--ask); background: var(--ask-dim); }
.btn-action.kind-schedule:hover { color: var(--schedule); border-color: var(--schedule); background: var(--schedule-dim); }
.btn-action.kind-let_go:hover   { color: var(--text);  background: var(--surface-3); }

/* ── SHOW MORE ── */
.show-more {
  width: 100%;
  padding: 10px;
  text-align: center;
  font-size: 12px;
  color: var(--text-3);
  margin-top: 4px;
  border-radius: var(--r-md);
  transition: all 0.15s;
}
.show-more:hover { color: var(--text-2); background: var(--surface); }

/* ── DIVIDER STRIP ── */
.status-strip {
  display: flex;
  gap: 8px;
  margin-top: 32px;
}

.strip-btn {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 14px;
  border-radius: var(--r-md);
  border: 1px solid var(--border-soft);
  background: var(--surface);
  font-size: 13px;
  color: var(--text-2);
  transition: all 0.15s;
}
.strip-btn:hover { border-color: var(--border); color: var(--text); background: var(--surface-2); }

.strip-badge {
  display: flex;
  align-items: center;
  justify-content: center;
  min-width: 22px;
  height: 22px;
  border-radius: 6px;
  background: var(--surface-3);
  font-size: 11px;
  font-weight: 600;
  color: var(--text-3);
}

/* ── FAB ── */
.fab {
  position: fixed;
  bottom: calc(20px + env(safe-area-inset-bottom));
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 14px 24px;
  border-radius: 999px;
  background: var(--accent);
  color: #0f0f0f;
  font-size: 14px;
  font-weight: 600;
  box-shadow: 0 0 0 1px rgba(0,0,0,0.2), 0 8px 32px rgba(232,197,71,0.3);
  z-index: 5;
  transition: all 0.2s;
  white-space: nowrap;
}
.fab:hover { background: #f0d060; transform: translateX(-50%) translateY(-1px); box-shadow: 0 0 0 1px rgba(0,0,0,0.2), 0 12px 40px rgba(232,197,71,0.4); }
.fab:active { transform: translateX(-50%) translateY(0); }

/* ── OVERLAY ── */
.overlay-root {
  position: fixed;
  inset: 0;
  z-index: 50;
  pointer-events: none;
}

.overlay-backdrop {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(4px);
  pointer-events: auto;
  animation: fadeIn 0.2s ease;
}

.overlay-panel {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  pointer-events: none;
}

.overlay-card {
  width: min(100%, 560px);
  max-height: calc(100vh - 40px);
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior: contain;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-xl);
  padding: 24px;
  pointer-events: auto;
  animation: slideUp 0.25s cubic-bezier(0.16,1,0.3,1);
  position: relative;
}

.overlay-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
}

.overlay-meta {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.overlay-eyebrow {
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-3);
  font-weight: 500;
}

.overlay-step {
  font-size: 12px;
  color: var(--text-2);
}

.overlay-close {
  width: 32px;
  height: 32px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-3);
  transition: all 0.15s;
}
.overlay-close:hover { background: var(--surface-3); color: var(--text); }

.overlay-title {
  font-family: var(--serif);
  font-size: clamp(1.5rem, 4vw, 2rem);
  font-weight: 400;
  margin: 0 0 6px;
  line-height: 1.15;
  letter-spacing: -0.02em;
}

.overlay-subtitle {
  font-size: 13px;
  color: var(--text-2);
  line-height: 1.6;
  margin: 0 0 20px;
}

/* ── TEXTAREA ── */
.big-input {
  width: 100%;
  min-height: 120px;
  padding: 14px 16px;
  border-radius: var(--r-md);
  border: 1px solid var(--border);
  background: var(--surface-2);
  color: var(--text);
  font-size: 15px;
  line-height: 1.6;
  resize: none;
  transition: border-color 0.15s;
}
.big-input:focus {
  outline: none;
  border-color: rgba(232,197,71,0.35);
  box-shadow: 0 0 0 3px var(--accent-glow);
}
.big-input::placeholder { color: var(--text-3); }

.input-hint {
  font-size: 12px;
  color: var(--text-3);
  margin-top: 8px;
  line-height: 1.5;
}

/* ── KIND CHOICES ── */
.kind-grid {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-bottom: 20px;
}

.kind-option {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 14px 16px;
  border-radius: var(--r-md);
  border: 1px solid var(--border-soft);
  background: var(--surface-2);
  text-align: left;
  width: 100%;
  transition: all 0.15s;
}
.kind-option:hover { border-color: var(--border); background: var(--surface-3); }
.kind-option.selected { border-color: currentColor; }
.kind-option.selected.do    { color: var(--do);       background: var(--do-dim); }
.kind-option.selected.decide{ color: var(--decide);   background: var(--decide-dim); }
.kind-option.selected.ask   { color: var(--ask);      background: var(--ask-dim); }
.kind-option.selected.schedule { color: var(--schedule); background: var(--schedule-dim); }
.kind-option.selected.let_go   { background: var(--let_go-dim); border-color: var(--let_go); }

.kind-option-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  border: 1.5px solid currentColor;
  margin-top: 3px;
  flex-shrink: 0;
  transition: background 0.15s;
}
.kind-option.selected .kind-option-dot { background: currentColor; }

.kind-option-label { font-size: 14px; font-weight: 500; color: var(--text); display: block; margin-bottom: 2px; }
.kind-option.selected .kind-option-label { color: inherit; }
.kind-option-desc { font-size: 12px; color: var(--text-2); line-height: 1.5; }
.kind-option.selected .kind-option-desc { color: inherit; opacity: 0.75; }

/* ── PREVIEW CARD ── */
.preview-loop {
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  padding: 16px;
  margin-bottom: 20px;
}

.preview-loop-title {
  font-size: 15px;
  font-weight: 400;
  color: var(--text);
  margin: 8px 0 6px;
  line-height: 1.4;
}

/* ── DRAWER (waiting/released) ── */
.drawer-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
  max-height: 55vh;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  margin-bottom: 16px;
}

.drawer-item {
  background: var(--surface-2);
  border: 1px solid var(--border-soft);
  border-radius: var(--r-md);
  padding: 12px 14px;
}

.drawer-item-title {
  font-size: 13px;
  color: var(--text);
  margin-bottom: 4px;
  line-height: 1.4;
}

.drawer-item-note {
  font-size: 12px;
  color: var(--text-2);
  line-height: 1.5;
}

.drawer-item-actions {
  display: flex;
  gap: 6px;
  margin-top: 10px;
}

/* ── MENU ── */
.menu-list {
  display: flex;
  flex-direction: column;
  gap: 4px;
  margin-bottom: 16px;
}

.menu-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  border-radius: var(--r-sm);
  font-size: 13px;
  color: var(--text-2);
  transition: all 0.15s;
  text-align: left;
  width: 100%;
  border: 1px solid transparent;
}
.menu-item:hover { background: var(--surface-2); color: var(--text); }
.menu-item.danger:hover { background: rgba(255,68,119,0.08); color: #f47; border-color: rgba(255,68,119,0.12); }

/* ── SYNC ── */
.sync-info {
  background: var(--surface-2);
  border: 1px solid var(--border-soft);
  border-radius: var(--r-md);
  padding: 12px 14px;
  font-size: 12px;
  color: var(--text-2);
  line-height: 1.6;
  margin-bottom: 16px;
}

.email-row {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
}

.email-input {
  flex: 1;
  padding: 9px 12px;
  border-radius: var(--r-sm);
  border: 1px solid var(--border);
  background: var(--surface-2);
  color: var(--text);
  font-size: 13px;
  transition: border-color 0.15s;
}
.email-input:focus { outline: none; border-color: rgba(232,197,71,0.35); }
.email-input::placeholder { color: var(--text-3); }

/* ── EMPTY ── */
.empty-state {
  padding: 32px 16px;
  text-align: center;
  color: var(--text-3);
  font-size: 13px;
  line-height: 1.7;
  border: 1px dashed var(--border-soft);
  border-radius: var(--r-lg);
}

.empty-state strong { display: block; color: var(--text-2); margin-bottom: 4px; font-weight: 500; }

/* ── OVERLAYS — tab panels ── */
.tab-panel { display: none; }
.tab-panel.active { display: block; animation: fadeIn 0.15s ease; }

/* ── NOTICE BANNER ── */
.notice-banner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 10px 14px;
  border-radius: var(--r-md);
  background: rgba(255,68,119,0.08);
  border: 1px solid rgba(255,68,119,0.15);
  margin-bottom: 12px;
  font-size: 12px;
  color: #f88;
}

/* ── INLINE EDIT ── */
.inline-edit-input {
  width: 100%;
  background: var(--surface-2);
  border: 1px solid rgba(232,197,71,0.35);
  border-radius: 6px;
  padding: 6px 8px;
  font-size: 14px;
  color: var(--text);
  line-height: 1.5;
  resize: none;
  box-shadow: 0 0 0 3px var(--accent-glow);
}
.inline-edit-input:focus { outline: none; }

/* ── TOAST ── */
.toast {
  position: fixed;
  bottom: calc(80px + env(safe-area-inset-bottom));
  left: 50%;
  transform: translateX(-50%) translateY(10px);
  background: var(--surface-3);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 10px 16px;
  border-radius: 999px;
  font-size: 13px;
  opacity: 0;
  pointer-events: none;
  transition: all 0.2s;
  z-index: 100;
  white-space: nowrap;
}
.toast.visible { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast.has-action.visible { pointer-events: auto; }
.toast-action {
  margin-left: 12px;
  color: var(--accent);
  font-weight: 500;
  font-size: 13px;
  padding: 2px 6px;
  border-radius: 4px;
  transition: background 0.15s;
}
.toast-action:hover { background: var(--accent-dim); }

/* ── ANIMATIONS ── */
@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

@keyframes fadeSlideDown {
  from { opacity: 0; transform: translateY(-8px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(20px) scale(0.98); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

/* ── OVERLAY ACTIONS ── */
.overlay-actions {
  display: flex;
  gap: 8px;
  justify-content: flex-end;
  margin-top: 20px;
}

/* ── MOBILE ── */
@media (max-width: 600px) {
  .main { padding: 0 14px 100px; }
  .topbar { padding: 12px 16px; }
  .reentry-title { font-size: 1.3rem; }
  .overlay-panel { padding: 12px; align-items: flex-end; }
  .overlay-card { width: 100%; max-height: 85vh; border-radius: 20px 20px 0 0; }
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    transition-duration: 0.01ms !important;
  }
}
</style>
</head>
<body>

<div class="app" id="app">
  <header class="topbar">
    <div class="brand">
      <div class="brand-mark">
        <svg viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="7" cy="7" r="5" stroke="#0f0f0f" stroke-width="1.5" fill="none"/>
          <path d="M7 4.5V7.5L9 9" stroke="#0f0f0f" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </div>
      <span class="brand-name">Open Loops</span>
    </div>
    <div class="topbar-right">
      <button class="pill-btn" id="sync-pill" type="button" data-action="open-sync">
        <span class="dot"></span>
        <span id="sync-label">Sync</span>
      </button>
    </div>
  </header>

  <main class="main" id="app-main"></main>
</div>

<div class="overlay-root" id="overlay-root"></div>
<div class="toast" id="toast"></div>

<script>
(() => {
  const CFG = window.OL_CONFIG || {};
  const STORAGE_KEY = CFG.STORAGE_KEY ? CFG.STORAGE_KEY + '_v2' : 'open_loops_data_v2';
  const CLIENT_NONCE = crypto.randomUUID ? crypto.randomUUID() : `ol-${Date.now()}-${Math.random().toString(36).slice(2)}`;
  const IS_FILE = location.protocol === 'file:';

  function hasSupabaseCfg() {
    return !!(CFG.SUPABASE_URL && CFG.SUPABASE_KEY &&
      !CFG.SUPABASE_URL.includes('YOUR_PROJECT') &&
      !CFG.SUPABASE_KEY.includes('YOUR_SUPABASE'));
  }

  const VALID_KINDS = new Set(['do', 'decide', 'ask', 'schedule', 'let_go']);
  const VALID_STATUSES = new Set(['active', 'waiting', 'released', 'inbox']);

  const kindMeta = {
    do:       { label: 'Do',       action: 'Mark done',  question: 'What is the one next visible step?', helper: 'Concrete enough that you could start right now without planning.' },
    decide:   { label: 'Decide',   action: 'Decide',     question: 'What decision needs to be made?',    helper: 'Name the decision cleanly — stop holding the whole swirl.' },
    ask:      { label: 'Ask',      action: 'Reach out',  question: 'Who do you need something from?',    helper: 'One person, one ask. Nothing more.' },
    schedule: { label: 'Schedule', action: 'Add to cal', question: 'What needs time on a calendar?',     helper: 'Treat time as the missing ingredient.' },
    let_go:   { label: 'Let go',   action: 'Release',    question: 'What are you choosing to release?',  helper: 'The goal is relief, not proving the thought was silly.' },
    inbox:    { label: 'Inbox',    action: 'Clarify',    question: '',                                   helper: '' }
  };

  function nowIso() { return new Date().toISOString(); }
  function uid(p) { return `${p}-${Math.random().toString(36).slice(2,9)}`; }

  function seedState() {
    return {
      version: 2,
      lastLoopId: 'l1',
      activeTab: 'now',
      loops: [
        mk('l1','Text the building manager about the leak near the sink','ask','active','Ask when someone can come by.'),
        mk('l2','Pick either the afternoon train or the early flight for Karachi','decide','active','Decide by Friday — stop reopening tabs.'),
        mk('l3','Return the borrowed monitor stand','do','active','Put it by the front door tonight.'),
        mk('l4','Book the dentist cleaning that keeps slipping','schedule','active','Add one 15-min admin block.'),
        mk('l5','Upload the passport photo before the form window closes','do','active','Take the photo near the window tomorrow morning.'),
        mk('l6','Choose one savings account and stop researching','decide','waiting','Waiting until I compare only the top two.'),
        mk('l7','Check in with Dad about Saturday lunch','ask','waiting','Waiting until tomorrow morning.'),
        mk('l8','Read every desk review before deciding','let_go','released','Released after narrowing the choice enough.'),
        mk('l9','Reply perfectly to that old group thread','let_go','released','Silence is also an answer.'),
        mk('l10','Need to sort out the summer trip dates',null,'inbox','Decide whether first week of July is realistic.'),
        mk('l11','Something about updating the laptop warranty',null,'inbox','Find the deadline.')
      ]
    };
  }

  function mk(id, rawText, kind, status, promptAnswer) {
    const t = nowIso();
    return { id, rawText, kind, status, promptAnswer, createdAt: t, updatedAt: t };
  }

  function sanitize(loop) {
    return {
      id: loop.id || uid('l'),
      rawText: (loop.rawText || 'Untitled').trim(),
      kind: VALID_KINDS.has(loop.kind) ? loop.kind : null,
      status: VALID_STATUSES.has(loop.status) ? loop.status : 'active',
      promptAnswer: (loop.promptAnswer || '').trim(),
      createdAt: loop.createdAt || nowIso(),
      updatedAt: loop.updatedAt || nowIso()
    };
  }

  // ── STATE ──
  let data = seedState();
  let view = {
    activeTab: 'now',
    overlay: null,
    highlightedId: null,
    reentryDismissedFor: null,
    expanded: false,
    syncStatus: 'idle',
    syncText: 'Sync',
    inlineEditId: null,
  };
  let toastTimer = null;

  // ── PERSIST ──
  function load() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return;
      const parsed = JSON.parse(raw);
      if (parsed && Array.isArray(parsed.loops)) {
        data = { version: 2, lastLoopId: parsed.lastLoopId || null, activeTab: 'now', loops: parsed.loops.map(sanitize) };
        view.activeTab = parsed.activeTab || 'now';
      }
    } catch(e) {}
  }

  function save() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({ version: 2, lastLoopId: data.lastLoopId, activeTab: view.activeTab, loops: data.loops }));
    } catch(e) {}
  }

  // ── QUERIES ──
  function byStatus(s) { return data.loops.filter(l => l.status === s); }
  function getLoop(id) { return data.loops.find(l => l.id === id) || null; }
  function suggested() {
    if (data.lastLoopId) {
      const l = getLoop(data.lastLoopId);
      if (l && l.status === 'active') return l;
    }
    return byStatus('active')[0] || null;
  }

  // ── MUTATIONS ──
  function createLoop({rawText, kind, promptAnswer, status}) {
    const l = sanitize({ id: uid('l'), rawText, kind, promptAnswer, status, createdAt: nowIso(), updatedAt: nowIso() });
    data.loops.unshift(l);
    if (l.status === 'active') data.lastLoopId = l.id;
    return l;
  }

  function updateLoop(id, patch) {
    const l = getLoop(id);
    if (!l) return null;
    Object.assign(l, patch, { updatedAt: nowIso() });
    if (!VALID_KINDS.has(l.kind)) l.kind = null;
    if (!VALID_STATUSES.has(l.status)) l.status = 'active';
    if (l.status === 'active') data.lastLoopId = l.id;
    return l;
  }

  function removeLoop(id) {
    data.loops = data.loops.filter(l => l.id !== id);
    if (data.lastLoopId === id) data.lastLoopId = suggested()?.id || null;
  }

  // ── TOAST ──
  function toast(msg, opts) {
    const el = document.getElementById('toast');
    if (!el) return;
    el.textContent = '';
    el.classList.remove('has-action');
    const span = document.createElement('span');
    span.textContent = msg;
    el.appendChild(span);
    const dur = (opts && opts.duration) || 2500;
    if (opts && opts.action && typeof opts.onAction === 'function') {
      el.classList.add('has-action');
      const btn = document.createElement('button');
      btn.className = 'toast-action';
      btn.type = 'button';
      btn.textContent = opts.action;
      btn.addEventListener('click', () => {
        clearTimeout(toastTimer);
        el.classList.remove('visible');
        el.classList.remove('has-action');
        try { opts.onAction(); } catch(e) {}
      });
      el.appendChild(btn);
    }
    el.classList.add('visible');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => {
      el.classList.remove('visible');
      el.classList.remove('has-action');
    }, dur);
  }

  // ── ESCAPE HTML ──
  function esc(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── KIND CHIP HTML ──
  function chipHtml(kind) {
    const m = kindMeta[kind] || kindMeta.inbox;
    const cls = kind || 'inbox';
    return `<span class="kind-chip ${cls}"><span class="kind-dot"></span>${m.label}</span>`;
  }

  // ── LOOP CARD ──
  function cardHtml(loop, idx) {
    const m = kindMeta[loop.kind] || kindMeta.inbox;
    const hl = view.highlightedId === loop.id ? ' highlighted' : '';
    const delay = `animation-delay:${idx*0.04}s`;

    if (view.inlineEditId === loop.id) {
      return `
        <article class="loop-card${hl}" style="${delay}" data-loop-id="${esc(loop.id)}">
          <div class="loop-card-top">
            ${chipHtml(loop.kind)}
            <button class="card-overflow" data-action="open-menu" data-loop-id="${esc(loop.id)}" title="More">
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="3" cy="7" r="1.2" fill="currentColor"/><circle cx="7" cy="7" r="1.2" fill="currentColor"/><circle cx="11" cy="7" r="1.2" fill="currentColor"/></svg>
            </button>
          </div>
          <textarea class="inline-edit-input" id="inline-edit-${esc(loop.id)}" rows="2">${esc(loop.rawText)}</textarea>
          <div class="loop-card-bottom">
            <button class="btn-action btn btn-sm" data-action="inline-edit-save" data-loop-id="${esc(loop.id)}">Save</button>
            <button class="btn-ghost btn btn-sm" data-action="inline-edit-cancel">Cancel</button>
          </div>
        </article>`;
    }

    return `
      <article class="loop-card${hl}" style="${delay}" data-loop-id="${esc(loop.id)}">
        <div class="loop-card-top">
          ${chipHtml(loop.kind)}
          <button class="card-overflow" data-action="open-menu" data-loop-id="${esc(loop.id)}" title="More">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="3" cy="7" r="1.2" fill="currentColor"/><circle cx="7" cy="7" r="1.2" fill="currentColor"/><circle cx="11" cy="7" r="1.2" fill="currentColor"/></svg>
          </button>
        </div>
        <p class="loop-title" data-action="inline-edit-start" data-loop-id="${esc(loop.id)}" title="Click to edit" style="cursor:text">${esc(loop.rawText)}</p>
        <div class="loop-next">
          <span class="loop-next-label">Next</span>
          <span>${esc(loop.promptAnswer || 'No next step set.')}</span>
        </div>
        <div class="loop-card-bottom">
          <button class="btn-action kind-${loop.kind || 'inbox'}" data-action="primary-action" data-loop-id="${esc(loop.id)}">${m.action}</button>
        </div>
      </article>`;
  }

  // ── HOME RENDER ──
  function renderHome() {
    const active = byStatus('active');
    const visible = view.expanded ? active : active.slice(0, 5);
    const waiting = byStatus('waiting');
    const released = byStatus('released');
    const inbox = byStatus('inbox');
    const hidden = Math.max(0, active.length - visible.length);
    const suggested_loop = suggested();
    const showReentry = suggested_loop && view.reentryDismissedFor !== suggested_loop.id;

    let html = '';

    // Reentry
    if (showReentry && view.activeTab === 'now') {
      html += `
        <section class="reentry">
          <div class="reentry-eyebrow">Pick up where you left off</div>
          <h2 class="reentry-title">${esc(suggested_loop.rawText)}</h2>
          <p class="reentry-note">${esc(suggested_loop.promptAnswer || 'This is still waiting for a clear next move.')}</p>
          <div class="reentry-actions">
            <button class="btn btn-primary btn-sm" data-action="continue-reentry">Back to it</button>
            <button class="btn btn-ghost btn-sm" data-action="dismiss-reentry">Skip</button>
          </div>
        </section>`;
    }

    // Inbox notice
    if (inbox.length && view.activeTab === 'now') {
      html += `
        <div class="inbox-notice">
          <div class="inbox-notice-left">
            <div class="inbox-badge">${inbox.length}</div>
            <span class="inbox-text">${inbox.length} unclarified loop${inbox.length === 1 ? '' : 's'}</span>
          </div>
          <button class="btn btn-ghost btn-sm" data-action="clarify-inbox">Clarify</button>
        </div>`;
    }

    // Tabs
    html += `
      <div class="tabs">
        <button class="tab ${view.activeTab === 'now' ? 'active' : ''}" data-action="set-tab" data-tab="now">
          Now <span class="tab-count">${Math.min(active.length,5)}</span>
        </button>
        <button class="tab ${view.activeTab === 'waiting' ? 'active' : ''}" data-action="set-tab" data-tab="waiting">
          Waiting <span class="tab-count">${waiting.length}</span>
        </button>
        <button class="tab ${view.activeTab === 'released' ? 'active' : ''}" data-action="set-tab" data-tab="released">
          Released <span class="tab-count">${released.length}</span>
        </button>
      </div>`;

    // Now tab
    if (view.activeTab === 'now') {
      html += `<div class="tab-panel active" id="tab-now">`;
      if (visible.length) {
        html += `<div class="loop-stack">${visible.map((l,i) => cardHtml(l,i)).join('')}</div>`;
        if (hidden > 0 && !view.expanded) {
          html += `<button class="show-more" data-action="show-more">Show ${hidden} more loop${hidden > 1 ? 's' : ''}</button>`;
        }
      } else {
        html += `<div class="empty-state"><strong>Your head is quiet</strong>When something starts taking up space in it, drop it here.</div>`;
      }
      html += `</div>`;
    }

    // Waiting tab
    if (view.activeTab === 'waiting') {
      html += `<div class="tab-panel active" id="tab-waiting">`;
      if (waiting.length) {
        html += `<div class="loop-stack">`;
        waiting.forEach((loop, i) => {
          const m = kindMeta[loop.kind] || kindMeta.inbox;
          html += `
            <article class="loop-card" style="animation-delay:${i*0.04}s">
              <div class="loop-card-top">${chipHtml(loop.kind)}<button class="card-overflow" data-action="open-menu" data-loop-id="${esc(loop.id)}" title="More"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="3" cy="7" r="1.2" fill="currentColor"/><circle cx="7" cy="7" r="1.2" fill="currentColor"/><circle cx="11" cy="7" r="1.2" fill="currentColor"/></svg></button></div>
              <p class="loop-title">${esc(loop.rawText)}</p>
              <div class="loop-next"><span class="loop-next-label">Note</span><span>${esc(loop.promptAnswer || '—')}</span></div>
              <div class="loop-card-bottom">
                <button class="btn-action" data-action="restore-active" data-loop-id="${esc(loop.id)}">Return to Now</button>
              </div>
            </article>`;
        });
        html += `</div>`;
      } else {
        html += `<div class="empty-state"><strong>Nothing waiting</strong>Park things here when they're not yours to move yet.</div>`;
      }
      html += `</div>`;
    }

    // Released tab
    if (view.activeTab === 'released') {
      html += `<div class="tab-panel active" id="tab-released">`;
      if (released.length) {
        html += `<div class="loop-stack">`;
        released.forEach((loop, i) => {
          html += `
            <article class="loop-card" style="animation-delay:${i*0.04}s;opacity:0.7">
              <div class="loop-card-top">${chipHtml(loop.kind)}<button class="card-overflow" data-action="open-menu" data-loop-id="${esc(loop.id)}" title="More"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="3" cy="7" r="1.2" fill="currentColor"/><circle cx="7" cy="7" r="1.2" fill="currentColor"/><circle cx="11" cy="7" r="1.2" fill="currentColor"/></svg></button></div>
              <p class="loop-title" style="text-decoration:line-through;color:var(--text-2)">${esc(loop.rawText)}</p>
              <div class="loop-next"><span class="loop-next-label">Note</span><span>${esc(loop.promptAnswer || '—')}</span></div>
              <div class="loop-card-bottom">
                <button class="btn-action" data-action="restore-active" data-loop-id="${esc(loop.id)}">Restore</button>
              </div>
            </article>`;
        });
        html += `</div>`;
      } else {
        html += `<div class="empty-state"><strong>Nothing let go of yet</strong>When you close a loop, it rests here.</div>`;
      }
      html += `</div>`;
    }

    // FAB
    html += `
      <button class="fab" data-action="open-capture" type="button">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><line x1="7" y1="2" x2="7" y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="2" y1="7" x2="12" y2="7" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        Capture loop
      </button>`;

    return html;
  }

  // ── OVERLAY RENDERS ──
  function renderCapture(ov) {
    if (!ov) return '';
    const closeBtn = `<button class="overlay-close" data-action="close-overlay" title="Close"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><line x1="4" y1="4" x2="12" y2="12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><line x1="12" y1="4" x2="4" y2="12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg></button>`;

    if (ov.step === 'capture') {
      return `
        <div class="overlay-card">
          <div class="overlay-header">
            <div class="overlay-meta"><div class="overlay-eyebrow">New loop</div><div class="overlay-step">Step 1 of 3</div></div>
            ${closeBtn}
          </div>
          <h2 class="overlay-title">What's sitting in your head?</h2>
          <p class="overlay-subtitle">Drop the thought here as it arrives. You'll shape it in the next step.</p>
          <textarea class="big-input" id="capture-input" placeholder="Write one unfinished thing…" autofocus>${esc(ov.rawText)}</textarea>
          <p class="input-hint">One thought. Don't start a project here.</p>
          <div class="overlay-actions">
            <button class="btn btn-ghost" data-action="save-for-later">Save raw</button>
            <button class="btn btn-primary" data-action="capture-next" ${ov.rawText.trim() ? '' : 'disabled'}>Continue →</button>
          </div>
        </div>`;
    }

    if (ov.step === 'kind') {
      const kinds = ['do','decide','ask','schedule','let_go'];
      const opts = kinds.map(k => {
        const m = kindMeta[k];
        const sel = ov.kind === k ? ` selected ${k}` : '';
        return `
          <button class="kind-option${sel}" data-action="pick-kind" data-kind="${k}" type="button">
            <div class="kind-option-dot"></div>
            <div><span class="kind-option-label">${m.label}</span><span class="kind-option-desc">${esc(m.helper)}</span></div>
          </button>`;
      }).join('');
      return `
        <div class="overlay-card">
          <div class="overlay-header">
            <div class="overlay-meta"><div class="overlay-eyebrow">Clarify</div><div class="overlay-step">Step 2 of 3</div></div>
            ${closeBtn}
          </div>
          <h2 class="overlay-title">What kind of loop is this?</h2>
          <div class="kind-grid">${opts}</div>
          <div class="overlay-actions">
            <button class="btn btn-ghost" data-action="capture-back">← Back</button>
            <button class="btn btn-primary" data-action="kind-next" ${ov.kind ? '' : 'disabled'}>Continue →</button>
          </div>
        </div>`;
    }

    if (ov.step === 'detail') {
      const m = kindMeta[ov.kind] || kindMeta.inbox;
      return `
        <div class="overlay-card">
          <div class="overlay-header">
            <div class="overlay-meta"><div class="overlay-eyebrow">${m.label}</div><div class="overlay-step">Step 3 of 3</div></div>
            ${closeBtn}
          </div>
          <h2 class="overlay-title">${esc(m.question)}</h2>
          <p class="overlay-subtitle">${esc(m.helper)}</p>
          <textarea class="big-input" id="detail-input" placeholder="One clear next state…" style="min-height:90px">${esc(ov.promptAnswer)}</textarea>
          <p class="input-hint">Enough for the next move. You can refine it later.</p>
          <div class="overlay-actions">
            <button class="btn btn-ghost" data-action="kind-back">← Back</button>
            <button class="btn btn-primary" data-action="finish-capture" ${ov.promptAnswer.trim() ? '' : 'disabled'}>Save loop</button>
          </div>
        </div>`;
    }

    return '';
  }

  function renderMenu(loop) {
    if (!loop) return '';
    const m = kindMeta[loop.kind] || kindMeta.inbox;
    const waiting = loop.status === 'waiting';
    const active = loop.status === 'active';
    const released = loop.status === 'released';
    return `
      <div class="overlay-card">
        <div class="overlay-header">
          <div class="overlay-meta">
            <div class="overlay-eyebrow">Loop</div>
            ${chipHtml(loop.kind)}
          </div>
          <button class="overlay-close" data-action="close-overlay" title="Close"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><line x1="4" y1="4" x2="12" y2="12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><line x1="12" y1="4" x2="4" y2="12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg></button>
        </div>
        <p style="font-size:15px;font-weight:400;margin:0 0 20px;line-height:1.5;color:var(--text)">${esc(loop.rawText)}</p>
        <div class="menu-list">
          <button class="menu-item" data-action="inline-edit-open" data-loop-id="${esc(loop.id)}">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 10l1.5-1.5 7-7 1.5 1.5-7 7L2 10z" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/></svg>
            Edit text
          </button>
          <button class="menu-item" data-action="reclarify-kind" data-loop-id="${esc(loop.id)}">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 2a5 5 0 0 1 5 5M7 12a5 5 0 0 1-5-5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/><path d="M12 4V7H9" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/><path d="M2 10V7h3" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            Change kind
          </button>
          ${active ? `<button class="menu-item" data-action="move-waiting" data-loop-id="${esc(loop.id)}">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="5" stroke="currentColor" stroke-width="1.2"/><path d="M7 4v3l2 2" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
            Move to Waiting
          </button>` : ''}
          ${waiting || released ? `<button class="menu-item" data-action="restore-active" data-loop-id="${esc(loop.id)}">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M3 7h8M8 4l3 3-3 3" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            Return to Now
          </button>` : ''}
          ${active ? `<button class="menu-item" data-action="move-released" data-loop-id="${esc(loop.id)}">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 7h10M7 3l-4 4 4 4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            Release
          </button>` : ''}
          <button class="menu-item danger" data-action="delete-loop" data-loop-id="${esc(loop.id)}">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M3 4h8M5 4V3h4v1M5.5 6.5v4M8.5 6.5v4M4 4l.5 7h5L10 4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            Delete
          </button>
        </div>
        <div class="overlay-actions">
          <button class="btn btn-ghost" data-action="close-overlay">Close</button>
        </div>
      </div>`;
  }

  function renderChangekind(loop) {
    if (!loop) return '';
    const kinds = ['do','decide','ask','schedule','let_go'];
    const opts = kinds.map(k => {
      const m = kindMeta[k];
      const sel = loop.kind === k ? ` selected ${k}` : '';
      return `<button class="kind-option${sel}" data-action="set-kind-direct" data-kind="${k}" data-loop-id="${esc(loop.id)}" type="button">
        <div class="kind-option-dot"></div>
        <div><span class="kind-option-label">${m.label}</span><span class="kind-option-desc">${esc(m.helper)}</span></div>
      </button>`;
    }).join('');
    return `
      <div class="overlay-card">
        <div class="overlay-header">
          <div class="overlay-meta"><div class="overlay-eyebrow">Change kind</div></div>
          <button class="overlay-close" data-action="close-overlay" title="Close"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><line x1="4" y1="4" x2="12" y2="12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><line x1="12" y1="4" x2="4" y2="12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg></button>
        </div>
        <div class="kind-grid">${opts}</div>
        <div class="overlay-actions"><button class="btn btn-ghost" data-action="close-overlay">Cancel</button></div>
      </div>`;
  }

  function renderSync() {
    const loggedIn = Sync.isLoggedIn();
    const hasError = view.syncStatus === 'error';
    const isSyncing = view.syncStatus === 'syncing';
    return `
      <div class="overlay-card">
        <div class="overlay-header">
          <div class="overlay-meta"><div class="overlay-eyebrow">Sync</div><div class="overlay-step">Cross-device</div></div>
          <button class="overlay-close" data-action="close-overlay" title="Close"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><line x1="4" y1="4" x2="12" y2="12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><line x1="12" y1="4" x2="4" y2="12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg></button>
        </div>
        <h2 class="overlay-title">Keep loops everywhere.</h2>
        <p class="overlay-subtitle">Your loops save on this device first. Add an email to keep them in sync everywhere.</p>
        ${!hasSupabaseCfg() ? `
          <div class="sync-info">Edit <code>open-loops-config.js</code> with your Supabase URL and key, then run <code>open-loops-supabase.sql</code> in the Supabase SQL editor.</div>
        ` : loggedIn ? `
          ${hasError ? `
            <div class="sync-info" style="color:#f88;border-color:rgba(255,68,119,0.15);background:rgba(255,68,119,0.06)">Last sync didn't go through. Your changes are safe on this device.</div>
            <div class="overlay-actions" style="margin-top:0;margin-bottom:12px">
              <button class="btn btn-primary" data-action="sync-retry" ${isSyncing ? 'disabled' : ''}>${isSyncing ? 'Retrying…' : 'Retry sync'}</button>
            </div>
          ` : `
            <div class="sync-info" style="color:var(--do)">Connected. Your loops sync automatically across devices.</div>
          `}
          <div class="overlay-actions" style="margin-top:0">
            <button class="btn btn-ghost" data-action="sign-out">Sign out</button>
            <button class="btn btn-ghost" data-action="close-overlay">Close</button>
          </div>
        ` : `
          <div class="sync-info">Enter your email — you'll receive a magic link. No password needed.</div>
          <div class="email-row">
            <input type="email" class="email-input" id="sync-email" placeholder="you@example.com" autocomplete="email">
            <button class="btn btn-primary" data-action="send-magic-link">Send link</button>
          </div>
        `}
        ${!loggedIn ? `<div class="overlay-actions"><button class="btn btn-ghost" data-action="close-overlay">Close</button></div>` : ''}
      </div>`;
  }

  function renderPrimaryAction(loop) {
    if (!loop) return '';
    const m = kindMeta[loop.kind] || kindMeta.inbox;
    const actions = {
      do: { q: 'Did you complete this?', hint: 'Mark it done and move on, or update the next step.', options: [
        { label: 'Done — release it', action: 'complete-done', primary: true },
        { label: 'Still in progress', action: 'complete-progress' },
        { label: 'Update next step', action: 'complete-update' },
      ]},
      decide: { q: 'Have you decided?', hint: 'Name the decision you made, or keep it active.', options: [
        { label: 'Decision made — release it', action: 'complete-done', primary: true },
        { label: 'Still deciding', action: 'complete-progress' },
        { label: 'Update the question', action: 'complete-update' },
      ]},
      ask: { q: 'Did you reach out?', hint: 'Mark sent, or update who you need to ask.', options: [
        { label: 'Sent — release it', action: 'complete-done', primary: true },
        { label: 'Not yet', action: 'complete-progress' },
        { label: 'Update the ask', action: 'complete-update' },
      ]},
      schedule: { q: 'Is it on the calendar?', hint: 'Mark it scheduled, or update the timing.', options: [
        { label: 'Scheduled — release it', action: 'complete-done', primary: true },
        { label: 'Not yet', action: 'complete-progress' },
        { label: 'Update timing', action: 'complete-update' },
      ]},
      let_go: { q: 'Ready to release this?', hint: 'Let it go. You can restore it if needed.', options: [
        { label: 'Yes, release it', action: 'complete-done', primary: true },
        { label: 'Not yet', action: 'complete-progress' },
      ]},
    };
    const cfg = actions[loop.kind] || actions.do;
    const opts = cfg.options.map(o => `
      <button class="menu-item${o.primary ? ' menu-item-primary' : ''}" data-action="${o.action}" data-loop-id="${esc(loop.id)}" style="${o.primary ? 'color:var(--accent);border-color:var(--accent-dim);background:var(--accent-dim)' : ''}">
        ${o.label}
      </button>`).join('');
    return `
      <div class="overlay-card">
        <div class="overlay-header">
          <div class="overlay-meta"><div class="overlay-eyebrow">${m.label}</div></div>
          <button class="overlay-close" data-action="close-overlay" title="Close"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><line x1="4" y1="4" x2="12" y2="12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><line x1="12" y1="4" x2="4" y2="12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg></button>
        </div>
        <h2 class="overlay-title" style="font-size:1.4rem">${esc(cfg.q)}</h2>
        <p class="overlay-subtitle">${esc(cfg.hint)}</p>
        <p style="font-size:13px;color:var(--text-2);margin:0 0 16px;padding:10px 12px;background:var(--surface-2);border-radius:8px;line-height:1.5">${esc(loop.rawText)}</p>
        <div class="menu-list">${opts}</div>
        <div class="overlay-actions"><button class="btn btn-ghost" data-action="close-overlay">Cancel</button></div>
      </div>`;
  }

  // ── RENDER MAIN ──
  function renderMain() {
    const main = document.getElementById('app-main');
    if (main) main.innerHTML = renderHome();
    focusInlineEdit();
  }

  function focusInlineEdit() {
    if (view.inlineEditId) {
      const el = document.getElementById(`inline-edit-${view.inlineEditId}`);
      if (el) { el.focus(); el.selectionStart = el.selectionEnd = el.value.length; }
    }
  }

  function renderOverlay() {
    const root = document.getElementById('overlay-root');
    if (!root) return;
    const ov = view.overlay;
    if (!ov) { root.innerHTML = ''; return; }

    let inner = '';
    if (ov.type === 'capture') inner = renderCapture(ov);
    else if (ov.type === 'menu') inner = renderMenu(getLoop(ov.loopId));
    else if (ov.type === 'change-kind') inner = renderChangekind(getLoop(ov.loopId));
    else if (ov.type === 'sync') inner = renderSync();
    else if (ov.type === 'primary-action') inner = renderPrimaryAction(getLoop(ov.loopId));

    root.innerHTML = `
      <div class="overlay-backdrop" data-action="close-overlay"></div>
      <div class="overlay-panel">${inner}</div>`;

    // Focus first input
    const firstInput = root.querySelector('textarea, input[type="email"]');
    if (firstInput) setTimeout(() => firstInput.focus(), 50);
  }

  function renderHeader() {
    const pill = document.getElementById('sync-pill');
    const label = document.getElementById('sync-label');
    if (!pill || !label) return;
    pill.className = `pill-btn ${view.syncStatus}`;
    label.textContent = view.syncText;
  }

  function renderAll() {
    renderHeader();
    renderMain();
    renderOverlay();
  }

  // ── ACTIONS ──
  async function persistAndSync() {
    save();
    renderMain();
    await Sync.push();
  }

  function closeOverlay() {
    view.overlay = null;
    renderOverlay();
  }

  // ── EVENT DELEGATION ──
  document.addEventListener('click', async e => {
    const el = e.target.closest('[data-action]');
    if (!el) return;
    const action = el.dataset.action;
    const loopId = el.dataset.loopId || null;

    // Overlay management
    if (action === 'close-overlay') { closeOverlay(); return; }

    // Tabs
    if (action === 'set-tab') {
      view.activeTab = el.dataset.tab;
      save();
      renderMain();
      return;
    }

    // FAB
    if (action === 'open-capture') {
      view.overlay = { type: 'capture', step: 'capture', rawText: '', kind: null, promptAnswer: '', sourceId: null };
      renderOverlay();
      return;
    }

    // Reentry
    if (action === 'continue-reentry') {
      const l = suggested();
      if (l) { view.highlightedId = l.id; data.lastLoopId = l.id; }
      view.reentryDismissedFor = l?.id || null;
      renderMain();
      return;
    }
    if (action === 'dismiss-reentry') {
      view.reentryDismissedFor = suggested()?.id || null;
      renderMain();
      return;
    }

    // Inbox
    if (action === 'clarify-inbox') {
      const next = byStatus('inbox')[0];
      if (next) {
        view.overlay = { type: 'capture', step: 'kind', rawText: next.rawText, kind: null, promptAnswer: next.promptAnswer || '', sourceId: next.id };
        renderOverlay();
      }
      return;
    }

    // Capture flow
    if (action === 'capture-next') {
      const ov = view.overlay;
      if (!ov || ov.type !== 'capture') return;
      const val = document.getElementById('capture-input')?.value.trim();
      if (!val) return;
      ov.rawText = val;
      ov.step = 'kind';
      renderOverlay();
      return;
    }
    if (action === 'capture-back') {
      if (view.overlay?.type === 'capture') { view.overlay.step = 'capture'; renderOverlay(); }
      return;
    }
    if (action === 'pick-kind') {
      if (view.overlay?.type === 'capture') { view.overlay.kind = el.dataset.kind; renderOverlay(); }
      return;
    }
    if (action === 'kind-next') {
      if (view.overlay?.type === 'capture' && view.overlay.kind) { view.overlay.step = 'detail'; renderOverlay(); }
      return;
    }
    if (action === 'kind-back') {
      if (view.overlay?.type === 'capture') { view.overlay.step = 'kind'; renderOverlay(); }
      return;
    }
    if (action === 'finish-capture') {
      const ov = view.overlay;
      if (!ov || ov.type !== 'capture') return;
      const ans = document.getElementById('detail-input')?.value.trim();
      if (!ans) return;
      ov.promptAnswer = ans;
      if (ov.sourceId) {
        updateLoop(ov.sourceId, { rawText: ov.rawText, kind: ov.kind, promptAnswer: ans, status: ov.kind === 'let_go' ? 'released' : 'active' });
        view.highlightedId = ov.sourceId;
      } else {
        const l = createLoop({ rawText: ov.rawText, kind: ov.kind, promptAnswer: ans, status: ov.kind === 'let_go' ? 'released' : 'active' });
        view.highlightedId = l.id;
        if (l.status === 'released') view.activeTab = 'released';
        else view.activeTab = 'now';
      }
      view.reentryDismissedFor = null;
      closeOverlay();
      await persistAndSync();
      toast('Loop saved.');
      return;
    }
    if (action === 'save-for-later') {
      const ov = view.overlay;
      if (!ov || ov.type !== 'capture') return;
      const raw = document.getElementById('capture-input')?.value.trim();
      if (!raw) return;
      if (ov.sourceId) {
        updateLoop(ov.sourceId, { rawText: raw, status: 'inbox' });
      } else {
        createLoop({ rawText: raw, kind: null, promptAnswer: '', status: 'inbox' });
      }
      closeOverlay();
      await persistAndSync();
      toast('Saved to inbox.');
      return;
    }

    // Show more
    if (action === 'show-more') { view.expanded = true; renderMain(); return; }

    // Menu open
    if (action === 'open-menu') {
      view.overlay = { type: 'menu', loopId };
      renderOverlay();
      return;
    }

    // Primary action
    if (action === 'primary-action') {
      view.overlay = { type: 'primary-action', loopId };
      renderOverlay();
      return;
    }

    // Primary action outcomes
    if (action === 'complete-done') {
      updateLoop(loopId, { status: 'released' });
      closeOverlay();
      view.activeTab = 'now';
      await persistAndSync();
      toast('Released.');
      return;
    }
    if (action === 'complete-progress') {
      closeOverlay();
      toast('Still in progress.');
      return;
    }
    if (action === 'complete-update') {
      closeOverlay();
      const l = getLoop(loopId);
      if (l) {
        view.overlay = { type: 'capture', step: 'detail', rawText: l.rawText, kind: l.kind, promptAnswer: l.promptAnswer, sourceId: loopId };
        renderOverlay();
      }
      return;
    }

    // Status changes
    if (action === 'move-waiting') {
      updateLoop(loopId, { status: 'waiting' });
      closeOverlay();
      await persistAndSync();
      toast('Moved to Waiting.');
      return;
    }
    if (action === 'move-released') {
      updateLoop(loopId, { status: 'released' });
      closeOverlay();
      view.activeTab = 'now';
      await persistAndSync();
      toast('Released.');
      return;
    }
    if (action === 'restore-active') {
      updateLoop(loopId, { status: 'active' });
      closeOverlay();
      view.activeTab = 'now';
      await persistAndSync();
      toast('Returned to Now.');
      return;
    }
    if (action === 'delete-loop') {
      const target = getLoop(loopId);
      if (!target) { closeOverlay(); return; }
      const snapshot = JSON.parse(JSON.stringify(target));
      const originalIndex = data.loops.findIndex(l => l.id === loopId);
      const wasLast = data.lastLoopId === loopId;
      removeLoop(loopId);
      closeOverlay();
      await persistAndSync();
      toast('Loop deleted.', {
        action: 'Undo',
        duration: 8000,
        onAction: async () => {
          if (getLoop(snapshot.id)) return;
          const insertAt = Math.min(Math.max(originalIndex, 0), data.loops.length);
          data.loops.splice(insertAt, 0, snapshot);
          if (wasLast) data.lastLoopId = snapshot.id;
          await persistAndSync();
          toast('Restored.');
        }
      });
      return;
    }

    // Change kind
    if (action === 'reclarify-kind') {
      closeOverlay();
      view.overlay = { type: 'change-kind', loopId };
      renderOverlay();
      return;
    }
    if (action === 'set-kind-direct') {
      const newKind = el.dataset.kind;
      const patch = { kind: newKind };
      // Match capture-flow behavior: choosing "Let go" releases the loop.
      if (newKind === 'let_go') patch.status = 'released';
      updateLoop(loopId, patch);
      closeOverlay();
      if (newKind === 'let_go') view.activeTab = 'now';
      await persistAndSync();
      toast(newKind === 'let_go' ? 'Released.' : 'Kind updated.');
      return;
    }

    // Inline edit
    if (action === 'inline-edit-start') {
      view.inlineEditId = loopId;
      renderMain();
      return;
    }
    if (action === 'inline-edit-open') {
      view.inlineEditId = loopId;
      closeOverlay();
      renderMain();
      return;
    }
    if (action === 'inline-edit-save') {
      const inp = document.getElementById(`inline-edit-${loopId}`);
      const val = inp ? inp.value.trim() : null;
      if (val) {
        updateLoop(loopId, { rawText: val });
        await persistAndSync();
        toast('Updated.');
      }
      view.inlineEditId = null;
      renderMain();
      return;
    }
    if (action === 'inline-edit-cancel') {
      view.inlineEditId = null;
      renderMain();
      return;
    }

    // Sync
    if (action === 'open-sync') {
      view.overlay = { type: 'sync' };
      renderOverlay();
      return;
    }
    if (action === 'send-magic-link') {
      const input = document.getElementById('sync-email');
      const email = input ? input.value.trim() : '';
      if (!email) { toast('Enter your email first.'); return; }
      try {
        setSyncStatus('syncing', 'Sending…');
        await Sync.sendMagicLink(email);
        setSyncStatus('idle', 'Check email');
        toast('Magic link sent — check your email.');
      } catch(e) {
        setSyncStatus('error', 'Error');
        toast(e.message || 'Could not send link.');
      }
      return;
    }
    if (action === 'sign-out') {
      await Sync.signOut();
      closeOverlay();
      return;
    }
    if (action === 'sync-retry') {
      renderOverlay();
      const result = await Sync.retry();
      if (result?.ok) toast('Sync restored.');
      else toast('Still having trouble syncing.');
      renderOverlay();
      return;
    }
  });

  // Input binding for capture
  document.addEventListener('input', e => {
    const ov = view.overlay;
    if (!ov || ov.type !== 'capture') return;
    if (e.target.id === 'capture-input') {
      ov.rawText = e.target.value;
      const btn = document.querySelector('[data-action="capture-next"]');
      if (btn) btn.disabled = !e.target.value.trim();
    }
    if (e.target.id === 'detail-input') {
      ov.promptAnswer = e.target.value;
      const btn = document.querySelector('[data-action="finish-capture"]');
      if (btn) btn.disabled = !e.target.value.trim();
    }
  });

  // Keyboard: Escape closes overlays, Enter saves inline edit, c opens capture
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      if (view.inlineEditId) { view.inlineEditId = null; renderMain(); }
      else closeOverlay();
    }
    if (e.key === 'c' && !view.overlay && !view.inlineEditId &&
        !['INPUT','TEXTAREA','SELECT'].includes(e.target.tagName)) {
      e.preventDefault();
      view.overlay = { type: 'capture', step: 'capture', rawText: '', kind: null, promptAnswer: '', sourceId: null };
      renderOverlay();
    }
    if (e.key === 'Enter' && e.target.classList.contains('inline-edit-input') && !e.shiftKey) {
      e.preventDefault();
      const loopId = e.target.id.replace('inline-edit-', '');
      const val = e.target.value.trim();
      if (val) { updateLoop(loopId, { rawText: val }); persistAndSync(); toast('Updated.'); }
      view.inlineEditId = null;
      renderMain();
    }
  });

  // ── SUPABASE SYNC ──
  const Sync = (() => {
    if (!window.supabase || !hasSupabaseCfg()) {
      return {
        init: async () => {},
        push: async () => ({ ok: true, pending: true }),
        retry: async () => ({ ok: true, pending: true }),
        sendMagicLink: async () => { throw new Error('Supabase is not configured in open-loops-config.js.'); },
        signOut: async () => {},
        isLoggedIn: () => false
      };
    }

    const db = window.supabase.createClient(CFG.SUPABASE_URL, CFG.SUPABASE_KEY, {
      auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: true }
    });

    let currentUser = null;
    let channel = null;

    function cleanUrl() {
      if (location.hash || location.search.includes('code='))
        history.replaceState({}, document.title, location.pathname);
    }

    function applyRemote(cfg) {
      if (!Array.isArray(cfg.loops)) return;
      const remoteLoops = cfg.loops.map(sanitize);
      const localById = new Map(data.loops.map(l => [l.id, l]));
      const remoteById = new Map(remoteLoops.map(l => [l.id, l]));
      const merged = [];
      const seen = new Set();

      // Merge: for loops in both, keep newer; remote-only adds; local-only keeps
      for (const rl of remoteLoops) {
        seen.add(rl.id);
        const ll = localById.get(rl.id);
        if (!ll) { merged.push(rl); }
        else { merged.push(rl.updatedAt >= ll.updatedAt ? rl : ll); }
      }
      for (const ll of data.loops) {
        if (!seen.has(ll.id)) merged.push(ll);
      }

      data = { version: 2, lastLoopId: cfg.lastReentryLoopId || data.lastLoopId || null, activeTab: 'now', loops: merged };
      save();
      renderMain();
    }

    async function pull() {
      if (!currentUser) return;
      try {
        const { data: rows, error } = await db.rpc('get_open_loops_state', { p_user_id: currentUser.id });
        if (error) throw error;
        if (rows && rows.length && rows[0].state_data) {
          applyRemote(rows[0].state_data);
          setSyncStatus('synced', 'Synced');
        } else {
          await pushNow();
        }
      } catch(e) { setSyncStatus('error', 'Sync error'); }
    }

    async function pushNow() {
      if (!currentUser) return { ok: false };
      try {
        const { error } = await db.rpc('upsert_open_loops_state', {
          p_user_id: currentUser.id,
          p_state_data: { version: 1, loops: data.loops, lastReentryLoopId: data.lastLoopId, _nonce: CLIENT_NONCE, _at: Date.now() }
        });
        if (error) throw error;
        setSyncStatus('synced', 'Synced');
        return { ok: true };
      } catch(e) { setSyncStatus('error', 'Not saved'); return { ok: false }; }
    }

    function setupRealtime() {
      if (!currentUser || channel) return;
      channel = db.channel('open-loops-state')
        .on('postgres_changes', { event: '*', schema: 'public', table: 'open_loops_state', filter: `user_id=eq.${currentUser.id}` },
          payload => {
            const incoming = payload.new?.state_data;
            if (!incoming || incoming._nonce === CLIENT_NONCE) return;
            applyRemote(incoming);
            setSyncStatus('synced', 'Synced');
          })
        .subscribe();
    }

    db.auth.onAuthStateChange(async (event, session) => {
      if (event === 'SIGNED_IN' && session) {
        currentUser = session.user;
        cleanUrl();
        setSyncStatus('syncing', 'Syncing…');
        await pull();
        setupRealtime();
      } else if (event === 'SIGNED_OUT') {
        currentUser = null;
        if (channel) { db.removeChannel(channel); channel = null; }
        setSyncStatus('idle', 'Sync');
      }
    });

    return {
      async init() {
        try {
          const { data: { session } } = await db.auth.getSession();
          if (session) {
            currentUser = session.user;
            cleanUrl();
            setSyncStatus('syncing', 'Syncing…');
            await pull();
            setupRealtime();
          }
        } catch(e) { setSyncStatus('error', 'Sync error'); }
      },
      async push() { return currentUser ? pushNow() : { ok: true, pending: true }; },
      async retry() {
        if (!currentUser) return { ok: true, pending: true };
        setSyncStatus('syncing', 'Syncing…');
        try {
          await pull();
          const r = await pushNow();
          setupRealtime();
          return r;
        } catch(e) {
          setSyncStatus('error', 'Sync error');
          return { ok: false };
        }
      },
      async sendMagicLink(email) {
        const redirect = CFG.EMAIL_REDIRECT_TO || (IS_FILE ? null : `${location.origin}${location.pathname}`);
        if (!redirect) throw new Error('Set EMAIL_REDIRECT_TO in open-loops-config.js (required when running from file://).');
        const { error } = await db.auth.signInWithOtp({ email, options: { emailRedirectTo: redirect } });
        if (error) throw error;
      },
      async signOut() { await db.auth.signOut(); },
      isLoggedIn() { return !!currentUser; }
    };
  })();

  function setSyncStatus(key, text) {
    view.syncStatus = key;
    view.syncText = text;
    renderHeader();
  }

  // ── INIT ──
  load();
  renderAll();
  Sync.init();

  // ── SERVICE WORKER ──
  if ('serviceWorker' in navigator && !IS_FILE) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./open-loops-sw.js').catch(() => {});
    });
  }
})();
</script>
</body>
</html>
