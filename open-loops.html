  function renderDefineRaw(loop) {
    if (!loop) return '';
    const ov = view.overlay || {};
    const selectedKind = ov.kind || loop.kind || null;
    const selectedStatus = ov.status || 'active';
    const rawText = ov.rawText ?? loop.rawText;
    const promptAnswer = ov.promptAnswer ?? loop.promptAnswer ?? '';
    const kinds = ['do','decide','ask','schedule','let_go'];
    const opts = kinds.map(k => {
      const m = kindMeta[k];
      const sel = selectedKind === k ? ` selected ${k}` : '';
      return `
        <button class="kind-option${sel}" data-action="define-pick-kind" data-kind="${k}" type="button">
          <div class="kind-option-dot"></div>
          <div><span class="kind-option-label">${m.label}</span><span class="kind-option-desc">${esc(m.helper)}</span></div>

    const statusOptions = [
      { key: 'active', label: 'Active', hint: 'Now focus' },

    ].map(s => `
      <button class="route-option ${selectedStatus === s.key ? 'selected' : ''}" type="button" data-action="define-pick-status" data-status="${s.key}" aria-pressed="${selectedStatus === s.key}">
        <strong>${s.label}</strong><span>${s.hint}</span>
      </button>`).join('');
    const detailLabel = selectedKind ? (kindMeta[selectedKind]?.question || 'What is the useful note?') : 'What is the next useful note?';
    const len = String(promptAnswer || '').length;
    return `
      <div class="overlay-card" role="dialog" aria-modal="true" aria-labelledby="define-title">

  // ── ONBOARDING ──
  // 4-step micro guided tutorial shown once after first sign-in and
  // replayable from Settings. Each step maps to one stage in the loop
  // lifecycle: Capture → Activate → Park → Close.
  const ONBOARDING_STEPS = [
    {
      eyebrow: '1 of 4',
      title: 'Capture.',
      body: 'A thought entered your head. Write it down. That act alone quiets it.',
      visual: `
        <div class="onboarding-visual">
          <div class="onboarding-visual-row"><span class="kind-chip inbox"><span class="kind-dot"></span>Raw</span><span>Reply to the contractor quote</span></div>
          <div class="onboarding-visual-row"><span class="kind-chip inbox"><span class="kind-dot"></span>Raw</span><span>Choose a new laptop</span></div>
          <div class="onboarding-visual-row"><span class="kind-chip inbox"><span class="kind-dot"></span>Raw</span><span>Check in with Sarah</span></div>
        </div>`,
      next: 'Next',
    },
    {
      eyebrow: '2 of 4',
      title: 'Activate.',
      body: 'Give it a kind — Do, Decide, Ask, Schedule, Let go. Naming the attention is half the work.',
      visual: `
        <div class="onboarding-visual">
          <div style="display:flex;flex-wrap:wrap;gap:8px;justify-content:center;">
            <span class="kind-chip do"><span class="kind-dot"></span>Do</span>
            <span class="kind-chip decide"><span class="kind-dot"></span>Decide</span>
            <span class="kind-chip ask"><span class="kind-dot"></span>Ask</span>
            <span class="kind-chip schedule"><span class="kind-dot"></span>Schedule</span>
            <span class="kind-chip let_go"><span class="kind-dot"></span>Let go</span>
          </div>
        </div>`,
      next: 'Next',
    },
    {
      eyebrow: '3 of 4',
      title: 'Park what isn\'t yours.',
      body: 'If the next move belongs to someone else, or to a later day, park it. It\'s waiting, not forgotten.',
      visual: `
        <div class="onboarding-visual" style="text-align:center;padding:18px 20px;">
          <div style="font-size:13px;color:var(--text-2);line-height:1.7;">Parked loops sit quietly until they're yours again.</div>
        </div>`,
      next: 'Next',
    },
    {
      eyebrow: '4 of 4',
      title: 'Close.',
      body: 'When a loop is done — whether you did it or let it go — close it. The point is relief.',
      visual: `
        <div class="onboarding-visual" style="text-align:center;padding:18px 20px;">
          <div style="font-size:13px;color:var(--text-2);line-height:1.7;">Closed loops are kept, not deleted.<br>You can always look back.</div>
        </div>`,
      next: 'Start capturing',
    },
  ];

  function renderOnboarding() {
    const root = document.getElementById('onboarding-root');
    if (!root) return;

    const step = view.onboardingStep;
    if (step < 0 || step >= ONBOARDING_STEPS.length) {
      root.innerHTML = '';
      return;
    }

    const s = ONBOARDING_STEPS[step];
    const dots = ONBOARDING_STEPS.map((_, i) => {
      const cls = i < step ? 'done' : i === step ? 'active' : '';
      return `<div class="onboarding-dot ${cls}"></div>`;
    }).join('');

    const isLast = step === ONBOARDING_STEPS.length - 1;

    root.innerHTML = `
      <div class="onboarding-overlay">
        <div class="onboarding-card">
          <div class="onboarding-step-indicator">${dots}</div>
          <div class="onboarding-eyebrow">${s.eyebrow}</div>
          <h2 class="onboarding-title">${s.title}</h2>
          <p class="onboarding-body">${s.body}</p>
          ${s.visual}
          <div class="onboarding-actions">
            <button class="onboarding-btn-primary" data-action="onboarding-next">${s.next}</button>
            ${step > 0 ? `<button class="onboarding-btn-ghost" data-action="onboarding-prev">Back</button>` : ''}
          </div>
          ${!isLast ? `<div class="onboarding-skip"><button type="button" class="inline-link" data-action="onboarding-skip">Skip tutorial</button></div>` : ''}
        </div>
      </div>`;
  }

  function hasCompletedOnboarding() {
    const key = scopedKey(ONBOARDING_KEY_BASE);
    if (!key) return false;
    try { return !!localStorage.getItem(key); } catch(e) { return false; }
  }

  function markOnboardingComplete() {
    const key = scopedKey(ONBOARDING_KEY_BASE);
    try { if (key) localStorage.setItem(key, '1'); } catch(e) {}
    view.onboardingStep = -1;
    renderOnboarding();
    // Open capture overlay to prompt first loop
    view.overlay = { type: 'capture', step: 'capture', rawText: '', kind: null, promptAnswer: '', sourceId: null };
    renderOverlay();
  }

  function startOnboarding() {
    view.onboardingStep = 0;
    renderOnboarding();
  }

  function renderPrimaryAction(loop) {
    if (!loop) return '';
    const m = kindMeta[loop.kind] || kindMeta.inbox;
    const actions = {
      do: { q: 'Did you complete this?', hint: 'Mark it done and move on, or update the next step.', options: [
        { label: 'Done — release it', action: 'complete-done', primary: true },
        { label: 'Still in progress', action: 'complete-progress' },
        { label: 'Update next step', action: 'complete-update' },
      ]},
      decide: { q: 'Have you decided?', hint: 'Name the decision you made, or keep it active.', options: [
        { label: 'Decision made — release it', action: 'complete-done', primary: true },
        { label: 'Still deciding', action: 'complete-progress' },
        { label: 'Update the question', action: 'complete-update' },
      ]},
      ask: { q: 'Did you reach out?', hint: 'Mark sent, or update who you need to ask.', options: [
        { label: 'Sent — release it', action: 'complete-done', primary: true },
        { label: 'Not yet', action: 'complete-progress' },
        { label: 'Update the ask', action: 'complete-update' },
      ]},
      schedule: { q: 'Is it on the calendar?', hint: 'Mark it scheduled, or update the timing.', options: [
        { label: 'Scheduled — release it', action: 'complete-done', primary: true },
        { label: 'Not yet', action: 'complete-progress' },
        { label: 'Update timing', action: 'complete-update' },
      ]},
      let_go: { q: 'Ready to release this?', hint: 'Let it go. You can restore it if needed.', options: [
        { label: 'Yes, release it', action: 'complete-done', primary: true },
        { label: 'Not yet', action: 'complete-progress' },
      ]},
    };
    const cfg = actions[loop.kind] || actions.do;
    const opts = cfg.options.map(o => `
      <button class="menu-item${o.primary ? ' menu-item-primary' : ''}" data-action="${o.action}" data-loop-id="${esc(loop.id)}" style="${o.primary ? 'color:var(--accent);border-color:var(--accent-dim);background:var(--accent-dim)' : ''}">
        ${o.label}
      </button>`).join('');
    return `
      <div class="overlay-card" role="dialog" aria-modal="true" aria-labelledby="primary-action-title">
        <div class="overlay-header">
          <div class="overlay-meta"><div class="overlay-eyebrow">${m.label}</div></div>
          <button class="overlay-close" data-action="close-overlay" title="Close"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><line x1="4" y1="4" x2="12" y2="12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><line x1="12" y1="4" x2="4" y2="12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg></button>
        </div>
        <h2 class="overlay-title" id="primary-action-title" style="font-size:1.4rem">${esc(cfg.q)}</h2>
        <p class="overlay-subtitle">${esc(cfg.hint)}</p>
        <p style="font-size:13px;color:var(--text-2);margin:0 0 16px;padding:10px 12px;background:var(--surface-2);border-radius:8px;line-height:1.5">${esc(loop.rawText)}</p>
        <div class="menu-list">${opts}</div>
        <div class="overlay-actions"><button class="btn btn-ghost" data-action="close-overlay">Cancel</button></div>
      </div>`;
  }

  function renderConfirmDelete(loop) {
    if (!loop) return '';
    return `
      <div class="overlay-card" role="dialog" aria-modal="true" aria-labelledby="confirm-delete-title">
        <div class="overlay-header">
          <div class="overlay-meta"><div class="overlay-eyebrow">Delete loop</div></div>
          <button class="overlay-close" data-action="close-overlay" title="Close" aria-label="Close"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true"><line x1="4" y1="4" x2="12" y2="12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><line x1="12" y1="4" x2="4" y2="12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg></button>
        </div>
        <h2 class="overlay-title" id="confirm-delete-title" style="font-size:1.4rem">Delete this loop?</h2>
        <p class="overlay-subtitle">You can undo for a few seconds after. If you'd rather keep it archived, close it instead.</p>
        <p style="font-size:13px;color:var(--text-2);margin:0 0 20px;padding:10px 12px;background:var(--surface-2);border-radius:8px;line-height:1.5">${esc(loop.rawText)}</p>
        <div class="overlay-actions">
          <button class="btn btn-ghost" data-action="close-overlay">Cancel</button>
          <button class="btn btn-primary" data-action="confirm-delete" data-loop-id="${esc(loop.id)}" style="background:#e85a5a;color:#fff">Delete</button>
        </div>
      </div>`;
  }

  // ── RENDER SIDEBAR ──
  // The sidebar element is hidden via CSS (display:none) on every viewport.
  // Kept as a no-op so renderAll() doesn't need a special case; if a sidebar
  // is reintroduced, this is the place to wire it.
  function renderSidebar() {
    const sidebar = document.getElementById('sidebar');
    if (sidebar) sidebar.innerHTML = '';
  }

  function renderBottomNav() {
    const nav = document.getElementById('bottom-nav');
    if (!nav) return;
    const counts = {
      now: byStatus('active').length,
      later: byStatus('waiting').length,
      done: byStatus('released').length,
      inbox: byStatus('inbox').length
    };
    const items = [
      { key: 'now',   label: TAB_LABEL.active,   icon: '<path d="M9 3.5A4.5 4.5 0 1 1 5.8 11.2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M9 3.5v3h3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>' },
      { key: 'later', label: TAB_LABEL.waiting,  icon: '<circle cx="9" cy="9" r="5.5" stroke="currentColor" stroke-width="1.5"/><path d="M9 6.8v2.6l1.7 1.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>' },
      { key: 'done',  label: TAB_LABEL.released, icon: '<path d="M4.8 9.3 7.4 12l5.8-6.2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>' },
      { key: 'inbox', label: TAB_LABEL.inbox,    icon: '<path d="M3.5 5.5h11l-1 7h-9l-1-7Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/><path d="M6.5 8.8h5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>' }
    ];
    nav.innerHTML = items.map(item => `
      <button class="bottom-nav-btn ${view.activeTab === item.key ? 'active' : ''}" type="button" data-action="set-tab" data-tab="${item.key}">
        ${counts[item.key] ? `<span class="bottom-nav-badge">${counts[item.key]}</span>` : ''}
        <svg class="bottom-nav-icon" viewBox="0 0 18 18" fill="none" aria-hidden="true">${item.icon}</svg>
        <span>${item.label}</span>
      </button>
    `).join('');
  }

  // ── RENDER CONTEXT PANEL ──
  // The context panel previously showed keyboard shortcuts. With shortcuts
  // removed it has no content, and its container is hidden via CSS.
  function renderContextPanel() {
    const panel = document.getElementById('context-panel');
    if (panel) panel.innerHTML = '';
  }

  // ── RENDER MAIN ──
  function renderMain() {
    const main = document.getElementById('app-main');
    if (main) main.innerHTML = renderHome();
    focusInlineEdit();
  }

  function focusInlineEdit() {
    if (view.inlineEditId) {
      const el = document.getElementById(`inline-edit-${view.inlineEditId}`);
      if (el) { el.focus(); el.selectionStart = el.selectionEnd = el.value.length; }
    }
  }

  function renderOverlay() {
    const root = document.getElementById('overlay-root');
    if (!root) return;
    const ov = view.overlay;
    if (!ov) { root.innerHTML = ''; return; }

    let inner = '';
    if      (ov.type === 'capture')        inner = renderCapture(ov);
    else if (ov.type === 'define-raw')     inner = renderDefineRaw(getLoop(ov.loopId));
    else if (ov.type === 'menu')           inner = renderMenu(getLoop(ov.loopId));
    else if (ov.type === 'change-kind')    inner = renderChangekind(getLoop(ov.loopId));
    else if (ov.type === 'sync')           inner = renderSync();
    else if (ov.type === 'settings')       inner = renderSettings();
    else if (ov.type === 'primary-action') inner = renderPrimaryAction(getLoop(ov.loopId));
    else if (ov.type === 'confirm-delete') inner = renderConfirmDelete(getLoop(ov.loopId));

    root.innerHTML = `
      <div class="overlay-backdrop" data-action="close-overlay"></div>
      <div class="overlay-panel">${inner}</div>`;

    // Focus first input/button so keyboard users don't have to hunt.
    const firstInput = root.querySelector('textarea, input[type="email"], input[type="text"]');
    if (firstInput) {
      setTimeout(() => firstInput.focus(), 50);
    } else {
      // No text input — focus the first actionable button instead.
      const firstBtn = root.querySelector('.overlay-card button:not([data-action="close-overlay"])');
      if (firstBtn) setTimeout(() => firstBtn.focus(), 50);
    }
  }

  function renderHeader() {
    const pill = document.getElementById('sync-pill');
    const label = document.getElementById('sync-label');
    if (!pill || !label) return;
    pill.className = `pill-btn ${view.syncStatus}`;
    label.textContent = view.syncText;
  }

  function renderAll() {
    renderHeader();
    renderSidebar();
    renderBottomNav();
    renderMain();
    renderContextPanel();
    renderOverlay();
    if (authReady && !Sync.isLoggedIn()) {
      renderAuthGate();
    } else if (authReady) {
      hideAuthGate();
    }
    if (view.onboardingStep >= 0) renderOnboarding();
  }

  // ── ACTIONS ──
  // Signed-in local cache + re-render. Supabase remains the source of truth;
  // localStorage only keeps the UI fast and protects queued offline writes.
  function persistAndRender() {
    save();
    renderAll();
  }

  function closeOverlay() {
    const opener = view.overlayOpenerEl;
    view.overlay = null;
    renderOverlay();
    view.overlayOpenerEl = null;
    if (opener && document.contains(opener)) {
      setTimeout(() => {
        if (document.contains(opener)) opener.focus();
      }, 0);
    }
  }

  function rememberOverlayOpener(el) {
    if (!view.overlay && el && typeof el.focus === 'function') {
      view.overlayOpenerEl = el;
    }
  }

  // ── MUTATION GUARD ──
  // Sign-in is required to capture or modify loops. Unauthenticated users
  // see the auth gate and cannot mutate state.
  function requireLogin() {
    if (Sync.isLoggedIn()) return false;
    toast('Sign in to save your loops.');
    if (authReady) renderAuthGate();
    return true;
  }

  // ── EVENT DELEGATION ──
  document.addEventListener('click', async e => {
    const el = e.target.closest('[data-action]');
    if (!el) return;
    const action = el.dataset.action;
    const loopId = el.dataset.loopId || null;

    // Overlay management
    if (action === 'close-overlay') { closeOverlay(); return; }

    // ── AUTH GATE ACTIONS ──
    if (action === 'auth-gate-send') {
      const input = document.getElementById('auth-gate-email');
      const email = input ? input.value.trim() : view.authGateEmail;
      if (!email) { toast('Enter your email.'); return; }
      const sinceLast = Date.now() - lastMagicLinkAt;
      if (sinceLast < MAGIC_LINK_COOLDOWN_MS) {
        const wait = Math.ceil((MAGIC_LINK_COOLDOWN_MS - sinceLast) / 1000);
        toast(`Please wait ${wait}s before requesting another link.`);
        return;
      }
      view.authGateEmail = email;
      const btn = document.getElementById('auth-gate-btn');
      if (btn) { btn.disabled = true; btn.textContent = 'Sending…'; }
      try {
        await Sync.sendMagicLink(email);
        lastMagicLinkAt = Date.now();
        view.authGateSent = true;
        renderAuthGate();
      } catch(err) {
        // Keep label consistent with initial state ("Send link") so repeated
        // attempts don't look like a different button.
        if (btn) { btn.disabled = false; btn.textContent = 'Send link'; }
        toast(err.message || 'Could not send link. Try again.');
      }
      return;
    }
    if (action === 'auth-gate-reset') {
      view.authGateSent = false;
      view.authGateEmail = '';
      renderAuthGate();
      return;
    }

    // ── ONBOARDING ACTIONS ──
    if (action === 'onboarding-next') {
      const isLast = view.onboardingStep === ONBOARDING_STEPS.length - 1;
      if (isLast) { markOnboardingComplete(); }
      else { view.onboardingStep++; renderOnboarding(); }
      return;
    }
    if (action === 'onboarding-prev') {
      if (view.onboardingStep > 0) { view.onboardingStep--; renderOnboarding(); }
      return;
    }
    if (action === 'onboarding-skip') {
      markOnboardingComplete();
      return;
    }

    // Overlay management

    // Tabs
    if (action === 'set-tab') {
      view.activeTab = el.dataset.tab;
      save();
      renderMain();
      renderSidebar();
      renderBottomNav();
      return;
    }

    // FAB
    if (action === 'open-capture') {
      if (requireLogin()) return;
      rememberOverlayOpener(el);
      view.overlay = { type: 'capture', step: 'capture', rawText: '', kind: null, promptAnswer: '', sourceId: null };
      renderOverlay();
      return;
    }

    if (action === 'define-raw') {
      const target = getLoop(loopId);
      if (target) {
        rememberOverlayOpener(el);
        const status = target.status === 'inbox'
          ? (target.kind === 'let_go' ? 'released' : 'active')
          : target.status;
        view.overlay = { type: 'define-raw', loopId, rawText: target.rawText, kind: target.kind || null, promptAnswer: target.promptAnswer || '', status };
        renderOverlay();
      }
      return;
    }

    // Capture flow
    if (action === 'pick-raw-kind') {
      if (view.overlay?.type === 'capture') {
        view.overlay.kind = el.dataset.kind;
        renderOverlay();
      }
      return;
    }
    if (action === 'save-raw-loop') {
      if (requireLogin()) return;
      const ov = view.overlay;
      if (!ov || ov.type !== 'capture') return;
      const raw = document.getElementById('capture-input')?.value.trim();
      if (!raw || !ov.kind) return;
      const l = createLoop({ rawText: raw, kind: ov.kind, promptAnswer: '', status: 'inbox' });
      view.activeTab = 'inbox';
      closeOverlay();
      await persistAndRender();
      Sync.createLoop(l);
      toast('Added to Raw.');
      return;
    }
    if (action === 'define-pick-kind') {
      if (view.overlay?.type === 'define-raw') {
        view.overlay.kind = el.dataset.kind;
        if (view.overlay.kind === 'let_go') view.overlay.status = 'released';
        renderOverlay();
      }
      return;
    }
    if (action === 'define-pick-status') {
      if (view.overlay?.type === 'define-raw') {
        view.overlay.status = el.dataset.status;
        renderOverlay();
      }
      return;
    }
    if (action === 'finish-define-raw') {
      if (requireLogin()) return;
      const ov = view.overlay;
      if (!ov || ov.type !== 'define-raw' || !ov.kind) return;
      const raw = document.getElementById('define-raw-input')?.value.trim() || ov.rawText;
      const ans = document.getElementById('define-detail-input')?.value.trim() || '';
      const status = ov.status || (ov.kind === 'let_go' ? 'released' : 'active');
      const patch = { rawText: raw, kind: ov.kind, promptAnswer: ans, status };
      updateLoop(ov.loopId, patch);
      view.highlightedId = status === 'active' ? ov.loopId : null;
      view.activeTab = status === 'waiting' ? 'later' : status === 'released' ? 'done' : 'now';
      saveReentryDismissed(null);
      closeOverlay();
      await persistAndRender();
      Sync.updateLoop(ov.loopId, patch);
      toast(status === 'active' ? 'Defined and made active.' : status === 'waiting' ? 'Defined and parked.' : 'Defined and closed.');
      return;
    }

    // Show more
    if (action === 'show-more') { view.expanded = true; renderMain(); return; }

    // Menu open
    if (action === 'open-menu') {
      rememberOverlayOpener(el);
      view.overlay = { type: 'menu', loopId };
      renderOverlay();
      return;
    }

    // Primary action
    if (action === 'primary-action') {
      rememberOverlayOpener(el);
      view.overlay = { type: 'primary-action', loopId };
      renderOverlay();
      return;
    }

    // Primary action outcomes
    if (action === 'complete-done') {
      if (requireLogin()) return;
      const patch = { status: 'released' };
      updateLoop(loopId, patch);
      closeOverlay();
      view.activeTab = 'now';
      await persistAndRender();
      Sync.updateLoop(loopId, patch);
      toast('Released.');
      return;
    }
    if (action === 'complete-progress') {
      closeOverlay();
      toast('Still in progress.');
      return;
    }
    if (action === 'complete-update') {
      closeOverlay();
      const l = getLoop(loopId);
      if (l) {
        view.overlay = { type: 'define-raw', loopId, rawText: l.rawText, kind: l.kind, promptAnswer: l.promptAnswer, status: l.status };
        renderOverlay();
      }
      return;
    }

    // Status changes
    if (action === 'move-waiting') {
      if (requireLogin()) return;
      const patch = { status: 'waiting' };
      updateLoop(loopId, patch);
      closeOverlay();
      await persistAndRender();
      Sync.updateLoop(loopId, patch);
      toast('Moved to Waiting.');
      return;
    }
    if (action === 'move-released') {
      if (requireLogin()) return;
      const patch = { status: 'released' };
      updateLoop(loopId, patch);
      closeOverlay();
      view.activeTab = 'now';
      await persistAndRender();
      Sync.updateLoop(loopId, patch);
      toast('Released.');
      return;
    }
    if (action === 'restore-active') {
      if (requireLogin()) return;
      // Snapshot the previous status BEFORE updateLoop mutates the same
      // object reference (getLoop returns the live row, not a copy).
      const prevStatus = getLoop(loopId)?.status;
      // Restoring from waiting/released should land the loop back on top
      // of the active list, not at its old position slot (which is likely
      // long-stale and below everything else active right now).
      const patch = { status: 'active', position: topPosition() };
      updateLoop(loopId, patch);
      closeOverlay();
      view.activeTab = 'now';
      await persistAndRender();
      Sync.updateLoop(loopId, patch);
      toast(prevStatus === 'released' ? 'Reopened.' : 'Made active.');
      return;
    }
    if (action === 'delete-loop') {
      if (!loopId) return;
      if (!getLoop(loopId)) { closeOverlay(); return; }
      // Don't require login here — the confirm-delete handler re-checks.
      // Open the confirm dialog with the current opener preserved so focus
      // returns properly when the user hits Cancel.
      view.overlay = { type: 'confirm-delete', loopId };
      renderOverlay();
      return;
    }
    if (action === 'confirm-delete') {
      if (requireLogin()) return;
      const target = getLoop(loopId);
      if (!target) { closeOverlay(); return; }
      const snapshot = JSON.parse(JSON.stringify(target));
      const originalIndex = data.loops.findIndex(l => l.id === loopId);
      const wasLast = data.lastLoopId === loopId;
      removeLoop(loopId);
      closeOverlay();
      await persistAndRender();
      Sync.deleteLoop(loopId);
      toast('Loop deleted.', {
        action: 'Undo',
        duration: 8000,
        onAction: async () => {
          if (requireLogin()) return;
          if (getLoop(snapshot.id)) return;
          const insertAt = Math.min(Math.max(originalIndex, 0), data.loops.length);
          data.loops.splice(insertAt, 0, snapshot);
          if (wasLast) data.lastLoopId = snapshot.id;
          await persistAndRender();
          // Undo soft-delete on the server so the row reappears everywhere.
          Sync.undeleteLoop(snapshot.id);
          toast('Restored.');
        }
      });
      return;
    }

    // Change kind
    if (action === 'reclarify-kind') {
      view.overlay = { type: 'change-kind', loopId };
      renderOverlay();
      return;
    }
    if (action === 'set-kind-direct') {
      if (requireLogin()) return;
      const newKind = el.dataset.kind;
      const patch = { kind: newKind };
      // Match capture-flow behavior: choosing "Let go" releases the loop.
      if (newKind === 'let_go') patch.status = 'released';
      updateLoop(loopId, patch);
      closeOverlay();
      if (newKind === 'let_go') view.activeTab = 'now';
      await persistAndRender();
      Sync.updateLoop(loopId, patch);
      toast(newKind === 'let_go' ? 'Released.' : 'Kind updated.');
      return;
    }

    // Inline edit
    if (action === 'inline-edit-start') {
      view.inlineEditId = loopId;
      renderMain();
      return;
    }
    if (action === 'inline-edit-open') {
      view.inlineEditId = loopId;
      closeOverlay();
      renderMain();
      return;
    }
    if (action === 'inline-edit-save') {
      if (requireLogin()) return;
      const inp = document.getElementById(`inline-edit-${loopId}`);
      const val = inp ? inp.value.trim() : null;
      if (val) {
        const patch = { rawText: val };
        updateLoop(loopId, patch);
        await persistAndRender();
        Sync.updateLoop(loopId, patch);
        toast('Updated.');
      }
      view.inlineEditId = null;
      renderMain();
      return;
    }
    if (action === 'inline-edit-cancel') {
      view.inlineEditId = null;
      renderMain();
      return;
    }

    // Sync
    if (action === 'open-sync') {
      rememberOverlayOpener(el);
      view.overlay = { type: 'sync' };
      renderOverlay();
      return;
    }
    if (action === 'send-magic-link') {
      const input = document.getElementById('sync-email');
      const email = input ? input.value.trim() : '';
      if (!email) { toast('Enter your email first.'); return; }
      const sinceLast = Date.now() - lastMagicLinkAt;
      if (sinceLast < MAGIC_LINK_COOLDOWN_MS) {
        const wait = Math.ceil((MAGIC_LINK_COOLDOWN_MS - sinceLast) / 1000);
        toast(`Please wait ${wait}s before requesting another link.`);
        return;
      }
      try {
        setSyncStatus('syncing', 'Sending…');
        await Sync.sendMagicLink(email);
        lastMagicLinkAt = Date.now();
        setSyncStatus('idle', 'Check email');
        toast('Magic link sent — check your email.');
      } catch(e) {
        setSyncStatus('error', 'Error');
        toast(e.message || 'Could not send link.');
      }
      return;
    }
    if (action === 'sign-out') {
      await Sync.signOut();
      closeOverlay();
      return;
    }
    if (action === 'sync-retry') {
      const fromBanner = !!el.closest('.sync-error-banner');
      if (!fromBanner) renderOverlay();
      const result = await Sync.retry();
      if (result?.ok) toast('Sync restored.');
      else toast('Still having trouble syncing.');
      if (!fromBanner && view.overlay?.type === 'sync') renderOverlay();
      return;
    }

    if (action === 'move-loop-up' || action === 'move-loop-down') {
      if (requireLogin()) return;
      const offset = action === 'move-loop-up' ? -1 : 1;
      const result = moveActiveLoopByOffset(loopId, offset);
      if (!result.ok) return;
      await persistAndRender();
      syncPositionChanges(result);
      toast(action === 'move-loop-up' ? 'Moved up.' : 'Moved down.');
      return;
    }

    // Theme toggle
    if (action === 'toggle-theme') {
      setTheme(view.theme === 'dark' ? 'light' : 'dark');
      // If the Settings overlay is currently open, re-render it so the
      // "Dark/Light" label updates in place.
      if (view.overlay && view.overlay.type === 'settings') renderOverlay();
      return;
    }

    // PWA install
    if (action === 'install-app') {
      if (!deferredInstallPrompt) return;
      const promptEvent = deferredInstallPrompt;
      deferredInstallPrompt = null;
      try {
        await promptEvent.prompt();
        const choice = await promptEvent.userChoice;
        if (choice && choice.outcome === 'accepted') {
          toast('Installing Open Loops…');
        }
      } catch (err) {
        /* ignore — some browsers throw on re-prompt */
      }
      const btn = document.getElementById('install-btn');
      if (btn) btn.hidden = true;
      return;
    }

    // Settings overlay
    if (action === 'open-settings') {
      rememberOverlayOpener(el);
      view.overlay = { type: 'settings' };
      renderOverlay();
      return;
    }
    if (action === 'set-theme') {
      setTheme(el.dataset.theme);
      if (view.overlay && view.overlay.type === 'settings') renderOverlay();
      return;
    }
    if (action === 'set-loop-cap') {
      const n = parseInt(el.dataset.cap, 10);
      saveLoopCap(n);
      // Re-render the settings overlay (to update selected button) and the
      // main view (visible loop count may change immediately).
      if (view.overlay && view.overlay.type === 'settings') renderOverlay();
      renderMain();
      return;
    }
    if (action === 'reset-onboarding') {
      try {
        const key = scopedKey(ONBOARDING_KEY_BASE);
        if (key) localStorage.removeItem(key);
      } catch(e) {}
      closeOverlay();
      startOnboarding();
      return;
    }

    // Dismiss sync error banner
    if (action === 'dismiss-sync-banner') {
      const banner = document.getElementById('sync-error-banner');
      if (banner) banner.style.display = 'none';
      return;
    }
  });

  document.addEventListener('dragstart', e => {
    const card = e.target.closest('[data-draggable-loop="1"]');
    if (!card) return;
    view.draggingLoopId = card.dataset.loopId;
    card.classList.add('dragging');
    if (e.dataTransfer) {
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', view.draggingLoopId);
    }
  });

  document.addEventListener('dragover', e => {
    const card = e.target.closest('[data-draggable-loop="1"]');
    if (!card || !view.draggingLoopId || card.dataset.loopId === view.draggingLoopId) return;
    e.preventDefault();
    card.classList.add('drag-over');
    if (e.dataTransfer) e.dataTransfer.dropEffect = 'move';
  });

  document.addEventListener('dragleave', e => {
    const card = e.target.closest('[data-draggable-loop="1"]');
    if (card) card.classList.remove('drag-over');
  });

  document.addEventListener('drop', async e => {
    const card = e.target.closest('[data-draggable-loop="1"]');
    if (!card || !view.draggingLoopId) return;
    e.preventDefault();
    // Mutation guard: if the user isn't signed in, don't reorder (matches
    // how every other mutation path behaves).
    if (requireLogin()) { view.draggingLoopId = null; return; }
    const result = moveActiveLoop(view.draggingLoopId, card.dataset.loopId);
    view.draggingLoopId = null;
    if (!result.ok) return;
    await persistAndRender();
    // Sync the position change(s). Common case: one row updated. Rare case
    // (rebalance fired): many rows. Either way we enqueue a position-only
    // patch per changed row — the queue's coalescing means consecutive
    // drags of the same loop merge into a single update.
    syncPositionChanges(result);
  });

  document.addEventListener('dragend', () => {
    view.draggingLoopId = null;
    document.querySelectorAll('.loop-card.dragging, .loop-card.drag-over').forEach(el => el.classList.remove('dragging', 'drag-over'));
  });

  // Live char-counter helper. Tints the counter yellow near the limit,
  // red at exactly the limit, and falls back to default otherwise.
  function updateCounter(counterId, len) {
    const c = document.getElementById(counterId);
    if (!c) return;
    c.textContent = `${len}/${MAX_LOOP_TEXT_LEN}`;
    c.classList.toggle('near-limit', len >= MAX_LOOP_TEXT_LEN - 50 && len < MAX_LOOP_TEXT_LEN);
    c.classList.toggle('at-limit', len >= MAX_LOOP_TEXT_LEN);
  }

  // Input binding for capture + auth gate email tracking
  document.addEventListener('input', e => {
    // Track auth gate email typing in view state
    if (e.target.id === 'auth-gate-email') {
      view.authGateEmail = e.target.value;
      return;
    }
    if (e.target.classList.contains('inline-edit-input')) {
      const counterId = e.target.id.replace('inline-edit-', 'inline-edit-counter-');
      updateCounter(counterId, e.target.value.length);
      return;
    }
    const ov = view.overlay;
    if (ov && ov.type === 'define-raw') {
      if (e.target.id === 'define-raw-input') {
        ov.rawText = e.target.value;
        return;
      }
      if (e.target.id === 'define-detail-input') {
        ov.promptAnswer = e.target.value;
        updateCounter('define-detail-counter', e.target.value.length);
        return;
      }
    }
    if (!ov || ov.type !== 'capture') return;
    if (e.target.id === 'capture-input') {
      ov.rawText = e.target.value;
      updateCounter('capture-counter', e.target.value.length);
      const btn = document.querySelector('[data-action="save-raw-loop"]');
      if (btn) btn.disabled = !(e.target.value.trim() && ov.kind);
    }
  });

  // Enter key on auth gate email → submit
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && e.target.id === 'auth-gate-email') {
      e.preventDefault();
      const btn = document.getElementById('auth-gate-btn');
      if (btn && !btn.disabled) btn.click();
    }
  }, true); // capture phase so it fires before the main keydown handler

  // Minimal keyboard handling:
  //   Escape               → exit inline edit or close overlay
  //   Enter in inline edit → save (Shift+Enter inserts a newline)
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      if (view.inlineEditId) { view.inlineEditId = null; renderMain(); }
      else closeOverlay();
      return;
    }

    if (e.key === 'Enter' && e.target.classList.contains('inline-edit-input') && !e.shiftKey) {
      e.preventDefault();
      const loopId = e.target.id.replace('inline-edit-', '');
      const val = e.target.value.trim();
      if (val) {
        if (requireLogin()) return;
        const patch = { rawText: val };
        updateLoop(loopId, patch);
        persistAndRender();
        Sync.updateLoop(loopId, patch);
        toast('Updated.');
      }
      view.inlineEditId = null;
      renderMain();
    }
  });

  // ── AUTO-RETRY ON NETWORK / VISIBILITY EVENTS ──
  // When we come back online or refocus the tab, drain any queued offline
  // operations. Individual edits already sync immediately when online.
  window.addEventListener('online', async () => {
    if (Sync.isLoggedIn()) {
      await Sync.processQueue();
      // Network just came back — the realtime channel may have died during
      // the outage. Ask Sync to verify/repair it.
      Sync.ensureRealtime();
    }
  });

  // Fix 3: 'focus' is unreliable on mobile PWAs — returning from background
  // often fires visibilitychange without firing focus. Use visibilitychange
  // as the primary trigger and keep 'focus' as a belt-and-suspenders fallback
  // for desktop. When the tab becomes visible again, drain the queue and
  // verify the realtime channel is still alive.
  document.addEventListener('visibilitychange', async () => {
    if (document.hidden) return;
    if (!Sync.isLoggedIn()) return;
    await Sync.processQueue();
    Sync.ensureRealtime();
  });

  window.addEventListener('focus', async () => {
    if (Sync.isLoggedIn()) {
      await Sync.processQueue();
      Sync.ensureRealtime();
    }
  });

  // ── SUPABASE SYNC (atomic, one-row-per-loop) ──
  // Every edit is a single-row INSERT/UPDATE. PostgreSQL serializes concurrent
  // writes to the same row, so two devices editing different loops never
  // conflict, and two devices editing the same loop serialize rather than
  // overwriting each other's whole state.
  //
  // Reliability features:
  //   - Offline edits queue in localStorage; drained on reconnect.
  //   - Queue uses exponential backoff (4s → 60s cap) and moves poison-pill
  //     entries to a dead-letter queue after MAX_QUEUE_ATTEMPTS so one bad
  //     write can't block every subsequent edit.
  //   - Realtime subscription monitors its own connection status; on drop it
  //     tears down and re-subscribes, then does a pullAll() to catch up.
  //   - visibilitychange / online handlers verify the channel and drain the
  //     queue whenever the user returns to the tab or comes back online.
  //   - TOKEN_REFRESHED updates realtime's JWT so the channel doesn't silently
  //     die after token rotation.
  //   - Incoming realtime updates compare updated_at vs local; a remote row
  //     older than our local copy doesn't clobber (prevents late echoes from
  //     overwriting newer state).
  const OFFLINE_QUEUE_KEY_BASE = 'open_loops_offline_queue';
  const DEAD_QUEUE_KEY_BASE = 'open_loops_dead_queue';
  const LEGACY_OFFLINE_QUEUE_KEY = OFFLINE_QUEUE_KEY_BASE;
  const LEGACY_DEAD_QUEUE_KEY = DEAD_QUEUE_KEY_BASE;
  const LEGACY_OFFLINE_QUEUE_QUARANTINE_KEY = `${OFFLINE_QUEUE_KEY_BASE}_legacy_unscoped`;
  const LEGACY_DEAD_QUEUE_QUARANTINE_KEY = `${DEAD_QUEUE_KEY_BASE}_legacy_unscoped`;

  const Sync = (() => {
    if (!window.supabase || !hasSupabaseCfg()) {
      return {
        init:          async () => { authReady = true; renderAuthGate(); },
        createLoop:    () => {},
        updateLoop:    () => {},
        deleteLoop:    () => {},
        undeleteLoop:  () => {},
        processQueue:  async () => ({ ok: true, pending: true }),
        retry:         async () => ({ ok: true, pending: true }),
        ensureRealtime: () => {},
        sendMagicLink: async () => { throw new Error(supabaseClientIssue() || 'Supabase sign-in is not ready.'); },
        signOut:       async () => {},
        isLoggedIn:    () => false
      };
    }

    const db = window.supabase.createClient(CFG.SUPABASE_URL, CFG.SUPABASE_KEY, {
      auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: true }
    });

    let currentUser = null;
    let channel     = null;
    let channelHealthy = false;
    let channelConnecting = false;
    let channelSeq = 0;
    let retryTimer  = null;
    let draining    = false;

    // Echo suppression: when we write a row, the realtime subscription will
    // echo it back. We don't want that echo to clobber a newer in-flight
    // local edit, so we track recently-written ids for a few seconds.
    const recentEchoes = new Map(); // id -> expiry timestamp (ms)
    function markEcho(id) { recentEchoes.set(id, Date.now() + 3000); }
    function isEcho(id) {
      const exp = recentEchoes.get(id);
      if (!exp) return false;
      if (Date.now() > exp) { recentEchoes.delete(id); return false; }
      return true;
    }

    function cleanUrl() {
      // Strip the magic-link auth fragments / query params after Supabase
      // has consumed them. URLSearchParams.has('code') is exact — substring
      // matching would also strip benign params like ?qrcode= or
      // ?discount_code=.
      let hasAuthParam = false;
      try { hasAuthParam = new URLSearchParams(location.search).has('code'); } catch(_) {}
      if (location.hash || hasAuthParam)
        history.replaceState({}, document.title, location.pathname);
    }

    function showSyncErrorBanner() {
      const banner = document.getElementById('sync-error-banner');
      if (banner) banner.style.display = 'flex';
    }
    function hideSyncErrorBanner() {
      const banner = document.getElementById('sync-error-banner');
      if (banner) banner.style.display = 'none';
    }

    function queueKey() {
      return scopedKey(OFFLINE_QUEUE_KEY_BASE);
    }

    function deadQueueKey() {
      return scopedKey(DEAD_QUEUE_KEY_BASE);
    }

    function quarantineLegacyQueueData() {
      let moved = false;
      try {
        const raw = localStorage.getItem(LEGACY_OFFLINE_QUEUE_KEY);
        if (raw && !localStorage.getItem(LEGACY_OFFLINE_QUEUE_QUARANTINE_KEY)) {
          localStorage.setItem(LEGACY_OFFLINE_QUEUE_QUARANTINE_KEY, raw);
        }
        if (raw) {
          localStorage.removeItem(LEGACY_OFFLINE_QUEUE_KEY);
          moved = true;
        }

        const dead = localStorage.getItem(LEGACY_DEAD_QUEUE_KEY);
        if (dead && !localStorage.getItem(LEGACY_DEAD_QUEUE_QUARANTINE_KEY)) {
          localStorage.setItem(LEGACY_DEAD_QUEUE_QUARANTINE_KEY, dead);
        }
        if (dead) {
          localStorage.removeItem(LEGACY_DEAD_QUEUE_KEY);
          moved = true;
        }
      } catch(e) {}
      return moved;
    }

    // ── Offline queue (localStorage) ──
    // Entry shape: { op: 'create'|'update'|'delete'|'undelete', id, payload?, ts }
    function loadQueue() {
      const key = queueKey();
      if (!key || !currentUser) return [];
      try {
        const raw = localStorage.getItem(key);
        if (!raw) return [];
        const parsed = JSON.parse(raw);
        if (!Array.isArray(parsed)) return [];
        return parsed.filter(entry => !entry.ownerUserId || entry.ownerUserId === currentUser.id);
      } catch(e) { return []; }
    }
    function saveQueue(q) {
      const key = queueKey();
      if (!key) return;
      try {
        if (!q.length) localStorage.removeItem(key);
        else           localStorage.setItem(key, JSON.stringify(q));
      } catch(e) {}
    }
    function loadDeadQueue() {
      const key = deadQueueKey();
      if (!key || !currentUser) return [];
      try {
        const parsed = JSON.parse(localStorage.getItem(key) || '[]');
        if (!Array.isArray(parsed)) return [];
        return parsed.filter(entry => !entry.ownerUserId || entry.ownerUserId === currentUser.id);
      } catch(e) { return []; }
    }
    function settleSyncStatus() {
      if (loadDeadQueue().length) {
        setSyncStatus('error', 'Sync issue');
        showSyncErrorBanner();
        return { ok: false, dead: true };
      }
      if (loadQueue().length) {
        setSyncStatus(navigator.onLine ? 'syncing' : 'offline', navigator.onLine ? 'Saving…' : 'Saved offline');
        return { ok: true, pending: true };
      }
      setSyncStatus('synced', 'Synced');
      hideSyncErrorBanner();
      return { ok: true };
    }
    function enqueue(entry) {
      if (!currentUser) return;
      entry.ownerUserId = currentUser.id;
      const q = loadQueue();
      // Coalesce back-to-back updates to the same id so we don't pile up
      // hundreds of small UPDATEs from typing into an inline edit field.
      // During a drain, q[0] may already be in flight. Only coalesce into a
      // tail entry that is not the active network write.
      if (entry.op === 'update' && q.length && (!draining || q.length > 1)) {
        const last = q[q.length - 1];
        if (last.op === 'update' && last.id === entry.id) {
          last.payload = { ...last.payload, ...entry.payload };
          last.ts = entry.ts;
          saveQueue(q);
          setSyncStatus(navigator.onLine ? 'syncing' : 'offline', navigator.onLine ? 'Saving…' : 'Saved offline');
          return;
        }
      }
      q.push(entry);
      saveQueue(q);
      setSyncStatus(navigator.onLine ? 'syncing' : 'offline', navigator.onLine ? 'Saving…' : 'Saved offline');
    }

    // ── Map between local loop shape and DB row shape ──
    function loopToRow(loop) {
      return {
        id:            loop.id,
        user_id:       currentUser.id,
        raw_text:      loop.rawText || '',
        kind:          VALID_KINDS.has(loop.kind) ? loop.kind : null,
        status:        loop.status || 'active',
        prompt_answer: loop.promptAnswer || '',
        position:      typeof loop.position === 'number' ? loop.position : nowPosition(),
        created_at:    loop.createdAt || nowIso()
        // updated_at is set by the DB trigger.
      };
    }
    function rowToLoop(row) {
      return sanitize({
        id:           row.id,
        rawText:      row.raw_text || '',
        kind:         row.kind,
        status:       row.status,
        promptAnswer: row.prompt_answer || '',
        position:     row.position,
        createdAt:    row.created_at,
        updatedAt:    row.updated_at
      });
    }
    function patchToRow(patch) {
      const out = {};
      if ('rawText'      in patch) out.raw_text      = patch.rawText;
      if ('kind'         in patch) out.kind          = VALID_KINDS.has(patch.kind) ? patch.kind : null;
      if ('status'       in patch) out.status        = patch.status;
      if ('promptAnswer' in patch) out.prompt_answer = patch.promptAnswer;
      if ('position'     in patch) out.position      = patch.position;
      if ('deleted_at'   in patch) out.deleted_at    = patch.deleted_at;
      if ('completed_at' in patch) out.completed_at  = patch.completed_at;
      return out;
    }

    // ── Single-row network ops ──
    async function netCreate(loop) {
      markEcho(loop.id);
      const { error } = await db.from('loops').upsert(loopToRow(loop), { onConflict: 'id' });
      if (error) throw error;
    }
    async function netUpdate(id, patch) {
      const row = patchToRow(patch);
      if (!Object.keys(row).length) return;
      markEcho(id);
      const { data: updated, error } = await db.from('loops').update(row).eq('id', id).select('id').maybeSingle();
      if (error) throw error;
      if (!updated) throw new Error('No matching loop was updated for this signed-in user.');
    }
    async function netDelete(id) {
      markEcho(id);
      const { data: updated, error } = await db.from('loops')
        .update({ deleted_at: nowIso() })
        .eq('id', id)
        .select('id')
        .maybeSingle();
      if (error) throw error;
      if (!updated) throw new Error('No matching loop was deleted for this signed-in user.');
    }
    async function netUndelete(id) {
      markEcho(id);
      const { data: updated, error } = await db.from('loops')
        .update({ deleted_at: null })
        .eq('id', id)
        .select('id')
        .maybeSingle();
      if (error) throw error;
      if (!updated) throw new Error('No matching loop was restored for this signed-in user.');
    }

    // Max attempts per queue entry before moving it to a dead-letter queue.
    // Prevents a single poison-pill entry from blocking every edit behind it.
    const MAX_QUEUE_ATTEMPTS = 5;

    function moveToDeadQueue(entry, error) {
      const key = deadQueueKey();
      if (!key) return;
      try {
        const dead = JSON.parse(localStorage.getItem(key) || '[]');
        dead.push({
          ...entry,
          lastError: String(error && error.message ? error.message : error),
          droppedAt: Date.now()
        });
        // Keep the last 50 dead entries — enough for debugging, not enough to
        // bloat localStorage if something is spamming failures.
        localStorage.setItem(key, JSON.stringify(dead.slice(-50)));
      } catch(_) {}
    }

    async function processQueue() {
      if (!currentUser) return { ok: true, pending: true };
      if (draining) return { ok: true, pending: loadQueue().length > 0 };
      if (!loadQueue().length) return settleSyncStatus();
      draining = true;
      let chainAfterRun = true;
      setSyncStatus(navigator.onLine ? 'syncing' : 'offline', navigator.onLine ? 'Saving…' : 'Saved offline');
      try {
        while (true) {
          if (!navigator.onLine) {
            setSyncStatus('offline', 'Saved offline');
            scheduleRetry(1);
            chainAfterRun = false;
            return { ok: true, pending: true };
          }
          const q = loadQueue();
          if (!q.length) {
            return settleSyncStatus();
          }
          const entry = q[0];
          if (entry.ownerUserId && entry.ownerUserId !== currentUser.id) {
            chainAfterRun = false;
            throw new Error('Queued write belongs to a different signed-in user.');
          }
          entry.attempts = (entry.attempts || 0) + 1;
          try {
            if      (entry.op === 'create')   await netCreate(entry.payload);
            else if (entry.op === 'update')   await netUpdate(entry.id, entry.payload);
            else if (entry.op === 'delete')   await netDelete(entry.id);
            else if (entry.op === 'undelete') await netUndelete(entry.id);
            // Success — pop the head.
            const latest = loadQueue();
            latest.shift();
            saveQueue(latest);
          } catch(e) {
            console.error(`Queue drain error (attempt ${entry.attempts}):`, e, entry);
            chainAfterRun = false;

            // Poison-pill: after MAX_QUEUE_ATTEMPTS, move this entry to the
            // dead-letter queue so it stops blocking everything behind it.
            if (entry.attempts >= MAX_QUEUE_ATTEMPTS) {
              const latest = loadQueue();
              const skipped = latest.shift();
              saveQueue(latest);
              moveToDeadQueue(skipped, e);
              console.warn('[open-loops] Moved poison-pill entry to dead queue:', skipped);
              // Keep draining — the next entry might succeed.
              continue;
            }

            // Persist the bumped attempt counter so it survives a reload.
            const latest = loadQueue();
            if (latest[0] && latest[0].id === entry.id && latest[0].op === entry.op) {
              latest[0] = entry;
              saveQueue(latest);
            }
            setSyncStatus('error', 'Sync issue');
            showSyncErrorBanner();
            scheduleRetry(entry.attempts);
            return { ok: false, error: e };
          }
        }
      } finally {
        const shouldChain = chainAfterRun && currentUser && navigator.onLine && loadQueue().length;
        draining = false;
        if (shouldChain) {
          // More work showed up while we were draining — chain another pass
          // without awaiting so we don't deepen the call stack.
          Promise.resolve().then(processQueue);
        }
      }
    }

    // Exponential backoff: 4s, 8s, 16s, 32s, capped at 60s. Prevents
    // hammering Supabase when the server is flaky or rate-limiting us.
    function scheduleRetry(attempts) {
      if (retryTimer) return;
      const n = Math.max(1, attempts || 1);
      const delay = Math.min(60000, 4000 * Math.pow(2, n - 1));
      retryTimer = setTimeout(async () => {
        retryTimer = null;
        if (currentUser && navigator.onLine && loadQueue().length) {
          await processQueue();
        }
      }, delay);
    }

    function applyPendingQueueOverlay(remoteLoops) {
      const pending = loadQueue();
      if (!pending.length) return remoteLoops;

      const byId = new Map(remoteLoops.map(loop => [loop.id, loop]));
      const localById = new Map(data.loops.map(loop => [loop.id, loop]));

      for (const entry of pending) {
        if (entry.ownerUserId && entry.ownerUserId !== currentUser.id) continue;

        if (entry.op === 'create') {
          const source = localById.get(entry.id) || entry.payload;
          if (source) byId.set(entry.id, sanitize(source));
        } else if (entry.op === 'update') {
          const base = byId.get(entry.id) || localById.get(entry.id);
          if (base) {
            const local = localById.get(entry.id);
            byId.set(entry.id, sanitize({
              ...base,
              ...entry.payload,
              updatedAt: (local && local.updatedAt) || base.updatedAt || nowIso()
            }));
          }
        } else if (entry.op === 'delete') {
          byId.delete(entry.id);
        } else if (entry.op === 'undelete') {
          const local = localById.get(entry.id);
          if (local) byId.set(entry.id, sanitize(local));
        }
      }

      return Array.from(byId.values()).sort((a, b) => (b.position || 0) - (a.position || 0));
    }

    // ── Full pull (on login / init) ──
    async function pullAll() {
      // Capture the user we're pulling for. If the user signs out (or signs in
      // as a different account) while any of these awaits are in flight, we
      // must abort — otherwise we'd overwrite the new user's data with the
      // previous user's server rows.
      const pullForUser = currentUser;
      if (!pullForUser) return;
      setSyncStatus('syncing', 'Syncing…');
      try {
        const { data: rows, error } = await db
          .from('loops')
          .select('*')
          .is('deleted_at', null)
          .order('position', { ascending: false });
        if (currentUser !== pullForUser) return;   // user switched mid-pull
        if (error) throw error;

        if (!rows || !rows.length) {
          // Empty visible server. But don't blindly re-seed — the server
          // might just have everything soft-deleted. If there are ANY rows
          // (including deleted) we treat the server as "initialized" and
          // trust it. Only seed if the server has genuinely never seen
          // this user's data.
          const { count, error: countErr } = await db
            .from('loops')
            .select('id', { count: 'exact', head: true });
          if (currentUser !== pullForUser) return; // user switched mid-pull
          if (countErr) throw countErr;

          const serverTrulyEmpty = (count || 0) === 0;
          const protectedLocalLoops = applyPendingQueueOverlay([]);

          if (serverTrulyEmpty && data.loops && data.loops.length) {
            const payload = data.loops.map(l => ({
              id:           l.id,
              rawText:      l.rawText,
              kind:         l.kind,
              status:       l.status,
              promptAnswer: l.promptAnswer,
              position:     l.position,
              createdAt:    l.createdAt
            }));
            const { error: upErr } = await db.rpc('batch_upsert_loops', { p_loops: payload });
            if (currentUser !== pullForUser) return; // user switched mid-seed
            if (upErr) throw upErr;
          } else if (protectedLocalLoops.length) {
            // A server pull should not erase local edits that are still queued.
            data = {
              version:    2,
              lastLoopId: data.lastLoopId && protectedLocalLoops.some(l => l.id === data.lastLoopId)
                ? data.lastLoopId
                : (protectedLocalLoops.find(l => l.status === 'active')?.id || null),
              activeTab:  view.activeTab || 'now',
              loops:      protectedLocalLoops
            };
            save();
            renderMain();
          } else if (!serverTrulyEmpty) {
            // Server has data, but it's all soft-deleted. Trust the server:
            // clear local state so we don't silently resurrect rows the
            // user deleted on another device.
            data = {
              version:    2,
              lastLoopId: null,
              activeTab:  view.activeTab || 'now',
              loops:      []
            };
            save();
            renderMain();
          }
          settleSyncStatus();
          return;
        }

        // Server has data — server is truth on pull. Replace local state.
        const remoteLoops = applyPendingQueueOverlay(rows.map(rowToLoop));
        const keepLast = data.lastLoopId && remoteLoops.some(l => l.id === data.lastLoopId);
        data = {
          version:    2,
          lastLoopId: keepLast ? data.lastLoopId : (remoteLoops.find(l => l.status === 'active')?.id || null),
          activeTab:  view.activeTab || 'now',
          loops:      remoteLoops
        };
        save();
        renderMain();
        settleSyncStatus();
      } catch(e) {
        if (currentUser !== pullForUser) return;   // ignore errors from a stale pull
        console.error('Pull error:', e);
        setSyncStatus('error', 'Sync issue');
        showSyncErrorBanner();
      }
    }

    // ── Realtime: apply per-row changes from other devices ──
    // Tracks state for reconnection logic. Supabase realtime channels can drop
    // for many reasons (network blip, sleep, JWT expiry, free-tier idle cuts),
    // and without a status callback we'd never notice. When a channel drops we
    // tear it down, re-subscribe, and do a pullAll() to catch up on anything
    // we missed while disconnected.
    let realtimeReconnectTimer = null;
    // When setupRealtime is called right after an explicit pullAll (during
    // init or SIGNED_IN), we don't need to pull again on the first SUBSCRIBED
    // event. Subsequent SUBSCRIBEDs (from reconnects) still pull to catch up.
    let skipNextSubscribePull = false;

    function scheduleRealtimeReconnect() {
      if (realtimeReconnectTimer) return;
      realtimeReconnectTimer = setTimeout(() => {
        realtimeReconnectTimer = null;
        if (currentUser && navigator.onLine && !document.hidden) {
          setupRealtime();
        }
      }, 3000);
    }

    function setupRealtime(opts) {
      if (!currentUser) return;
      skipNextSubscribePull = !!(opts && opts.skipInitialPull);
      const seq = ++channelSeq;
      channelHealthy = false;
      channelConnecting = true;
      // Tear down any existing channel before creating a new one. Re-using a
      // dead channel is how we end up silently missing events.
      if (channel) {
        try { db.removeChannel(channel); } catch(_) {}
        channel = null;
      }
      const nextChannel = db.channel(`loops:${currentUser.id}`);
      channel = nextChannel;
      nextChannel
        .on('postgres_changes',
          { event: '*', schema: 'public', table: 'loops', filter: `user_id=eq.${currentUser.id}` },
          payload => {
            if (seq !== channelSeq || channel !== nextChannel) return;
            const eventType = payload.eventType || payload.event;
            const row = payload.new || payload.old;
            if (!row || !row.id) return;

            // Ignore echoes of our own recent writes.
            if (isEcho(row.id)) return;

            if (eventType === 'DELETE') {
              // Hard delete (rare — we soft-delete).
              data.loops = data.loops.filter(l => l.id !== row.id);
              if (data.lastLoopId === row.id) data.lastLoopId = null;
              save();
              renderMain();
              return;
            }

            const incoming = payload.new;
            if (!incoming) return;

            // Soft delete: drop from local list.
            if (incoming.deleted_at) {
              data.loops = data.loops.filter(l => l.id !== incoming.id);
              if (data.lastLoopId === incoming.id) data.lastLoopId = null;
              save();
              renderMain();
              return;
            }

            const mapped = rowToLoop(incoming);
            const idx = data.loops.findIndex(l => l.id === mapped.id);
            if (idx === -1) {
              // New row from another device — insert at top (matches createLoop).
              data.loops.unshift(mapped);
            } else {
              // Fix 5: if our local copy is newer than what realtime is
              // sending us, don't clobber. This handles the case where we
              // just wrote locally and haven't gotten our own echo yet, or
              // the case where a stale queued write from another device
              // arrives late.
              const existing = data.loops[idx];
              const localTs  = existing && existing.updatedAt ? new Date(existing.updatedAt).getTime() : 0;
              const remoteTs = mapped.updatedAt ? new Date(mapped.updatedAt).getTime() : 0;
              if (localTs && remoteTs && localTs > remoteTs) return;
              data.loops[idx] = mapped;
            }
            save();
            renderMain();
          })
        .subscribe(async (status, err) => {
          if (seq !== channelSeq || channel !== nextChannel) return;
          if (status === 'SUBSCRIBED') {
            channelHealthy = true;
            channelConnecting = false;
            // Fresh subscription — we may have missed events while we were
            // disconnected (or during initial setup). Pull to catch up —
            // unless the caller told us a pullAll just ran.
            if (skipNextSubscribePull) {
              skipNextSubscribePull = false;
              return;
            }
            try { await pullAll(); } catch(_) {}
          } else if (status === 'CHANNEL_ERROR' || status === 'TIMED_OUT' || status === 'CLOSED') {
            console.warn('[open-loops] Realtime channel dropped:', status, err);
            channelHealthy = false;
            channelConnecting = false;
            skipNextSubscribePull = false;
            try { db.removeChannel(nextChannel); } catch(_) {}
            if (channel === nextChannel) channel = null;
            scheduleRealtimeReconnect();
          }
        });
    }

    async function handleAuthStateChange(event, session) {
      if (event === 'SIGNED_IN' && session) {
        currentUser = session.user;
        setLocalUser(currentUser);
        const foundLegacyData = quarantineLegacyLocalData();
        const foundLegacyQueue = quarantineLegacyQueueData();
        const foundLegacy = foundLegacyData || foundLegacyQueue;
        load();
        cleanUrl();
        setSyncStatus('syncing', 'Syncing…');
        // Drain only this user's offline queue, then pull server truth.
        if (loadQueue().length) await processQueue();
        await pullAll();
        setupRealtime({ skipInitialPull: true });
        // Auth gate → hide; reveal app
        authReady = true;
        hideAuthGate();
        view.authGateSent = false;
        // Trigger onboarding on first sign-in
        if (!hasCompletedOnboarding()) {
          startOnboarding();
        }
        renderAll();
        if (foundLegacy) toast('Older local data was kept aside for safety.');
      } else if (event === 'TOKEN_REFRESHED' && session) {
        // Fix 4: the JWT was refreshed. Realtime uses this token — if we
        // don't tell it about the new one, the channel will die the next
        // time the old token expires at the server. Also re-subscribe so
        // any silently-dropped channel gets rebuilt.
        currentUser = session.user;
        setLocalUser(currentUser);
        try {
          if (db.realtime && typeof db.realtime.setAuth === 'function') {
            db.realtime.setAuth(session.access_token);
          }
        } catch(_) {}
        setupRealtime();
      } else if (event === 'SIGNED_OUT') {
        currentUser = null;
        setLocalUser(null);
        channelHealthy = false;
        channelConnecting = false;
        channelSeq++;
        if (channel) { db.removeChannel(channel); channel = null; }
        // Clean up any pending retry timers so they don't fire stale.
        if (retryTimer) { clearTimeout(retryTimer); retryTimer = null; }
        if (realtimeReconnectTimer) { clearTimeout(realtimeReconnectTimer); realtimeReconnectTimer = null; }
        resetLocalAppState();
        setSyncStatus('idle', 'Sync');
        hideSyncErrorBanner();
        renderAll();
      }
    }

    db.auth.onAuthStateChange((event, session) => {
      setTimeout(() => {
        handleAuthStateChange(event, session).catch(e => {
          console.error('Auth state change error:', e);
          setSyncStatus('error', 'Sync issue');
          showSyncErrorBanner();
        });
      }, 0);
    });

    return {
      async init() {
        try {
          const { data: { session } } = await db.auth.getSession();
          if (session) {
            currentUser = session.user;
            setLocalUser(currentUser);
            const foundLegacyData = quarantineLegacyLocalData();
            const foundLegacyQueue = quarantineLegacyQueueData();
            const foundLegacy = foundLegacyData || foundLegacyQueue;
            load();
            cleanUrl();
            setSyncStatus('syncing', 'Syncing…');
            if (loadQueue().length) await processQueue();
            await pullAll();
            setupRealtime({ skipInitialPull: true });
            if (foundLegacy) toast('Older local data was kept aside for safety.');
          }
        } catch(e) {
          console.error('Sync init error:', e);
          setSyncStatus('error', 'Sync issue');
          showSyncErrorBanner();
        }
        // Auth check complete. The app remains locked until a user signs in.
        authReady = true;
        if (!currentUser) {
          renderAuthGate();
        } else if (!hasCompletedOnboarding()) {
          startOnboarding();
        }
      },

      // Mutations: enqueue + drain. If offline, the queue persists and drains
      // on the 'online'/'focus' event or on next init.
      createLoop(loop) {
        if (!loop || !loop.id) return;
        enqueue({ op: 'create', id: loop.id, payload: loop, ts: Date.now() });
        if (currentUser && navigator.onLine) processQueue();
        else if (!navigator.onLine) { setSyncStatus('offline', 'Saved offline'); scheduleRetry(); }
      },
      updateLoop(loopId, changes) {
        if (!loopId || !changes) return;
        enqueue({ op: 'update', id: loopId, payload: { ...changes }, ts: Date.now() });
        if (currentUser && navigator.onLine) processQueue();
        else if (!navigator.onLine) { setSyncStatus('offline', 'Saved offline'); scheduleRetry(); }
      },
      deleteLoop(loopId) {
        if (!loopId) return;
        enqueue({ op: 'delete', id: loopId, ts: Date.now() });
        if (currentUser && navigator.onLine) processQueue();
        else if (!navigator.onLine) { setSyncStatus('offline', 'Saved offline'); scheduleRetry(); }
      },
      undeleteLoop(loopId) {
        if (!loopId) return;
        enqueue({ op: 'undelete', id: loopId, ts: Date.now() });
        if (currentUser && navigator.onLine) processQueue();
        else if (!navigator.onLine) { setSyncStatus('offline', 'Saved offline'); scheduleRetry(); }
      },

      async processQueue() {
        if (!currentUser) return { ok: true, pending: true };
        return await processQueue();
      },

      async retry() {
        if (!currentUser) return { ok: true, pending: true };
        setSyncStatus('syncing', 'Syncing…');
        try {
          const r = await processQueue();
          if (!r.ok) return r;
          await pullAll();
          setupRealtime({ skipInitialPull: true });
          return { ok: true };
        } catch(e) {
          setSyncStatus('error', 'Sync issue');
          return { ok: false, error: e };
        }
      },

      // Called from visibilitychange / focus / online handlers. Verifies the
      // realtime channel is still alive — if not, rebuilds it (which does a
      // pullAll on SUBSCRIBED to catch up on missed events).
      ensureRealtime() {
        if (!currentUser) return;
        if (!channel || (!channelHealthy && !channelConnecting)) setupRealtime();
      },

      async sendMagicLink(email) {
        const redirect = CFG.EMAIL_REDIRECT_TO || (IS_FILE ? null : `${location.origin}${location.pathname}`);
        if (!redirect) throw new Error('Set EMAIL_REDIRECT_TO in open-loops-config.js (required when running from file://).');
        const { error } = await db.auth.signInWithOtp({ email, options: { emailRedirectTo: redirect } });
        if (error) throw error;
      },

      async signOut() { await db.auth.signOut(); },
      isLoggedIn() { return !!currentUser; }
    };
  })();

  function setSyncStatus(key, text) {
    view.syncStatus = key;
    view.syncText = text;
    renderHeader();
  }

  // ── THEME ──
  function setTheme(theme) {
    if (theme !== 'light' && theme !== 'dark') theme = 'dark';
    view.theme = theme;
    document.documentElement.setAttribute('data-theme', theme);
    try { localStorage.setItem(THEME_KEY, theme); } catch(e) {}
    // Swap the theme-color meta so browser chrome (Android/iOS) follows along.
    const meta = document.querySelector('meta[name="theme-color"]');
    if (meta) meta.setAttribute('content', theme === 'light' ? '#f7f7f9' : '#0c0c0d');
    renderThemeIcon();
  }

  function loadTheme() {
    let saved = null;
    try { saved = localStorage.getItem(THEME_KEY); } catch(e) {}
    if (saved === 'light' || saved === 'dark') {
      setTheme(saved);
      return;
    }
    // Fall back to system preference on first run.
    const prefersLight = window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches;
    setTheme(prefersLight ? 'light' : 'dark');
  }

  function renderThemeIcon() {
    const btn = document.getElementById('theme-toggle');
    if (!btn) return;
    const isDark = view.theme === 'dark';
    // Dark mode → show moon (click to go light). Light mode → show sun.
    btn.innerHTML = isDark
      ? `<svg viewBox="0 0 16 16" fill="none" aria-hidden="true"><path d="M13 9.5A5.5 5.5 0 0 1 6.5 3a5.5 5.5 0 1 0 6.5 6.5z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`
      : `<svg viewBox="0 0 16 16" fill="none" aria-hidden="true"><circle cx="8" cy="8" r="3" stroke="currentColor" stroke-width="1.5"/><path d="M8 1.5v1.5M8 13v1.5M1.5 8h1.5M13 8h1.5M3.2 3.2l1.05 1.05M11.75 11.75l1.05 1.05M3.2 12.8l1.05-1.05M11.75 4.25l1.05-1.05" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>`;
    btn.setAttribute('aria-label', isDark ? 'Switch to light theme' : 'Switch to dark theme');
    btn.setAttribute('title', isDark ? 'Switch to light theme' : 'Switch to dark theme');
  }

  // ── PWA INSTALL PROMPT ──
  // Chromium fires this when the app is installable; we stash the event and
  // reveal the install button so the user can trigger it intentionally.
  window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault();
    deferredInstallPrompt = e;
    const btn = document.getElementById('install-btn');
    if (btn) btn.hidden = false;
  });

  window.addEventListener('appinstalled', () => {
    deferredInstallPrompt = null;
    const btn = document.getElementById('install-btn');
    if (btn) btn.hidden = true;
    toast('Installed!');
  });

  // ── INIT ──
  loadTheme();
  renderAll(); // First paint

  // Kick off auth check. Sign-in is required because Supabase is the
  // cross-device source of truth for loop data.
  if (!hasSupabaseCfg()) {
    setTimeout(() => {
      authReady = true;
      renderAuthGate();
    }, 0);
  } else {
    Sync.init();
  }

  // ── DEBUG HELPERS ──
  // Exposed on window for troubleshooting from the browser console.
  // Not used by the app itself.
  //   window.openLoopsDebug.queue()      → show pending (not-yet-synced) ops
  //   window.openLoopsDebug.dead()       → show ops that failed > 5 times
  //   window.openLoopsDebug.clearDead()  → clear the dead-letter queue
  //   window.openLoopsDebug.retry()      → force a queue drain + pull
  window.openLoopsDebug = {
    queue() {
      try {
        const key = scopedKey(OFFLINE_QUEUE_KEY_BASE);
        return key ? JSON.parse(localStorage.getItem(key) || '[]') : [];
      }
      catch(_) { return []; }
    },
    dead() {
      try {
        const key = scopedKey(DEAD_QUEUE_KEY_BASE);
        return key ? JSON.parse(localStorage.getItem(key) || '[]') : [];
      }
      catch(_) { return []; }
    },
    legacy() {
      try {
        return {
          data: localStorage.getItem(LEGACY_STORAGE_QUARANTINE_KEY),
          queue: JSON.parse(localStorage.getItem(LEGACY_OFFLINE_QUEUE_QUARANTINE_KEY) || '[]'),
          dead: JSON.parse(localStorage.getItem(LEGACY_DEAD_QUEUE_QUARANTINE_KEY) || '[]')
        };
      } catch(_) { return {}; }
    },
    clearDead() {
      const key = scopedKey(DEAD_QUEUE_KEY_BASE);
      if (key) localStorage.removeItem(key);
      return 'cleared';
    },
    async retry() {
      if (!Sync.isLoggedIn()) return 'not signed in';
      return await Sync.retry();
    }
  };

  // ── SERVICE WORKER ──
  // Install handler in open-loops-sw.js calls skipWaiting(), so a new worker
  // takes control immediately after installing. We watch for the 'activated'
  // state (not 'installed') and reload once it's actually in charge.
  if ('serviceWorker' in navigator && !IS_FILE) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./open-loops-sw.js')
        .then(registration => {
          // Poll for updates once a minute
          setInterval(() => registration.update(), 60000);

          registration.addEventListener('updatefound', () => {
            const newWorker = registration.installing;
            if (!newWorker) return;
            newWorker.addEventListener('statechange', () => {
              // Only reload when the new worker is actually controlling the
              // page. Reloading earlier (on 'installed') serves the old cache.
              if (newWorker.state === 'activated' && navigator.serviceWorker.controller) {
                toast('Updated — reloading…', { duration: 1500 });
                setTimeout(() => window.location.reload(), 1500);
              }
            });
          });
        })
        .catch(() => {});
    });
  }
})();
</script>
</body>
</html>
