<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Open Loops">
<meta name="theme-color" content="#0c0c0d">
<meta name="description" content="A calm place for unfinished things.">
<title>Open Loops</title>
<link rel="manifest" href="./open-loops-manifest.json">
<link rel="icon" href="./open-loops-icon-192.png">
<link rel="apple-touch-icon" href="./open-loops-icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&family=Bricolage+Grotesque:opsz,wght@12..96,300;12..96,400;12..96,500;12..96,600&display=swap" rel="stylesheet">
<script src="./open-loops-config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.103.3/dist/umd/supabase.js"
  integrity="sha384-hCWGwlkWlatZlBB+xRL7caQ0wei4AIvA80dQT3CEhafaMinAJQdfdb99y48Oai+Q"
  crossorigin="anonymous"></script>
<style>
/* ── BLOODLINE DESIGN SYSTEM ── */
/* Near-black #0c0c0d × vivid crimson #ff2d55 × JetBrains Mono + Bricolage Grotesque */

:root, [data-theme="dark"] {
  --bg: #0c0c0d;
  --surface: #131315;
  --surface-2: #1a1a1d;
  --surface-3: #222226;
  --border: rgba(255,255,255,0.07);
  --border-soft: rgba(255,255,255,0.04);
  --text: #f0f0f2;
  --text-2: rgba(240,240,242,0.62);
  --text-3: rgba(240,240,242,0.32);
  --accent: #ff2d55;
  --accent-hot: #ff5070;
  --accent-deep: #cc1a3d;
  --accent-ink: #fff;
  --accent-dim: rgba(255,45,85,0.12);
  --accent-glow: rgba(255,45,85,0.07);
  --do: #30d158;
  --do-dim: rgba(48,209,88,0.1);
  --decide: #ffd60a;
  --decide-dim: rgba(255,214,10,0.1);
  --ask: #0a84ff;
  --ask-dim: rgba(10,132,255,0.1);
  --schedule: #bf5af2;
  --schedule-dim: rgba(191,90,242,0.1);
  --let_go: rgba(240,240,242,0.28);
  --let_go-dim: rgba(240,240,242,0.06);
  --r-sm: 6px;
  --r-md: 10px;
  --r-lg: 14px;
  --r-xl: 18px;
  --mono: 'JetBrains Mono', ui-monospace, monospace;
  --sans: 'Bricolage Grotesque', system-ui, sans-serif;
  --sidebar-width: 220px;
}

[data-theme="light"] {
  --bg: #f7f7f9;
  --surface: #ffffff;
  --surface-2: #f0f0f3;
  --surface-3: #e6e6ea;
  --border: rgba(0,0,0,0.09);
  --border-soft: rgba(0,0,0,0.05);
  --text: #0f0f12;
  --text-2: rgba(15,15,18,0.6);
  --text-3: rgba(15,15,18,0.38);
  --accent: #e01040;
  --accent-hot: #ff2d55;
  --accent-deep: #a80c2e;
  --accent-ink: #fff;
  --accent-dim: rgba(224,16,64,0.1);
  --accent-glow: rgba(224,16,64,0.06);
  --do: #1a8c3a;
  --do-dim: rgba(26,140,58,0.1);
  --decide: #a07800;
  --decide-dim: rgba(160,120,0,0.1);
  --ask: #0060cc;
  --ask-dim: rgba(0,96,204,0.1);
  --schedule: #8040cc;
  --schedule-dim: rgba(128,64,204,0.1);
  --let_go: rgba(15,15,18,0.35);
  --let_go-dim: rgba(15,15,18,0.06);
}

*, *::before, *::after { box-sizing: border-box; }
html { scroll-behavior: smooth; }

body {
  margin: 0;
  min-height: 100vh;
  font-family: var(--sans);
  font-size: 15px;
  color: var(--text);
  background: var(--bg);
  background-image: radial-gradient(ellipse 60% 40% at 96% 0%, rgba(255,45,85,0.10) 0%, transparent 60%);
  -webkit-font-smoothing: antialiased;
  transition: background-color 0.2s ease, color 0.2s ease;
}

[data-theme="light"] body {
  background-image: radial-gradient(ellipse 60% 40% at 96% 0%, rgba(224,16,64,0.06) 0%, transparent 60%);
}

button, input, textarea { font: inherit; }
button { cursor: pointer; border: none; background: none; color: inherit; }
a { color: inherit; text-decoration: none; }

/* ── LAYOUT ── */
.app {
  min-height: 100vh;
  display: grid;
  grid-template-rows: auto 1fr;
}

.app-body {
  display: flex;
  flex-direction: column;
  min-height: 0;
}

.sidebar { display: none; }
.context-panel { display: none !important; }

@media (min-width: 768px) {
  .app-body { flex-direction: column; align-items: center; }
  .main { max-width: 720px; padding: 0 24px 112px; }
}

@media (min-width: 1024px) {
  .main { max-width: 760px; padding: 0 28px 112px; }
}

/* ── TOPBAR ── */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 20px;
  border-bottom: 1px solid var(--border-soft);
  position: sticky;
  top: 0;
  z-index: 10;
  background: color-mix(in srgb, var(--bg) 90%, transparent);
  backdrop-filter: blur(16px);
  gap: 12px;
}

/* ── BRAND ── */
.brand {
  display: flex;
  align-items: center;
  gap: 10px;
}

.brand-mark {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  border: 2px solid var(--accent);
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  flex-shrink: 0;
  box-shadow: 0 0 0 4px var(--accent-glow);
}

.brand-mark::before {
  content: '';
  position: absolute;
  inset: 4px;
  border-radius: 50%;
  border: 1.5px solid rgba(255,45,85,0.35);
}

.brand-mark svg {
  width: 10px;
  height: 10px;
  position: relative;
  z-index: 1;
}
.brand-mark svg path { stroke: var(--accent); }

.brand-name {
  font-family: var(--sans);
  font-size: 14px;
  font-weight: 600;
  letter-spacing: -0.01em;
  color: var(--text);
}

.topbar-right {
  display: flex;
  align-items: center;
  gap: 6px;
}

.new-loop-btn { display: none; }

@media (min-width: 768px) {
  .new-loop-btn { display: inline-flex; }
}

/* ── PILL BUTTON (sync status) ── */
.pill-btn {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 5px 10px;
  border-radius: var(--r-sm);
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 400;
  letter-spacing: 0.06em;
  border: 1px solid var(--border);
  color: var(--text-3);
  transition: all 0.15s;
  background: transparent;
}
.pill-btn:hover { border-color: rgba(255,255,255,0.12); color: var(--text-2); }
.pill-btn.synced { color: var(--do); border-color: rgba(48,209,88,0.2); }
.pill-btn.syncing { color: var(--accent); border-color: rgba(255,45,85,0.22); }
.pill-btn.offline { color: var(--ask); border-color: rgba(10,132,255,0.22); }
.pill-btn.error { color: var(--accent); border-color: rgba(255,45,85,0.2); }
/* idle = signed-out / pre-auth state. Same neutral look as the default. */
.pill-btn.idle { color: var(--text-3); border-color: var(--border); }

/* ── ICON BUTTON ── */
.icon-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 32px;
  height: 32px;
  border-radius: var(--r-sm);
  border: 1px solid var(--border);
  color: var(--text-3);
  background: transparent;
  transition: all 0.15s;
  padding: 0;
}
.icon-btn:hover {
  border-color: rgba(255,255,255,0.1);
  color: var(--text-2);
  background: var(--surface-2);
}
.icon-btn svg { width: 14px; height: 14px; }
#install-btn[hidden] { display: none !important; }

.dot {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: currentColor;
  flex-shrink: 0;
}

/* ── MAIN ── */
.main {
  padding: 0 18px 100px;
  max-width: 680px;
  margin: 0 auto;
  width: 100%;
}

/* ── TABS ── */
.tabs {
  display: none;
  border-bottom: 1px solid var(--border-soft);
  margin-bottom: 0;
  gap: 0;
}

.tab {
  padding: 10px 14px 12px;
  font-family: var(--mono);
  font-size: 9.5px;
  font-weight: 400;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-3);
  position: relative;
  transition: color 0.15s;
  cursor: pointer;
}
.tab:hover { color: var(--text-2); }
.tab.active {
  color: var(--accent);
  font-weight: 500;
}
.tab.active::after {
  content: "";
  position: absolute;
  bottom: -1px;
  left: 0;
  right: 0;
  height: 1.5px;
  background: var(--accent);
}

.tab-count {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 16px;
  height: 16px;
  padding: 0 4px;
  border-radius: 3px;
  font-size: 9px;
  font-weight: 600;
  background: var(--surface-3);
  color: var(--text-3);
  margin-left: 5px;
  vertical-align: middle;
  font-family: var(--mono);
}
.tab.active .tab-count {
  background: var(--accent-dim);
  color: var(--accent);
}

/* ── REENTRY ── */
.reentry {
  background: var(--surface);
  border: 1px solid var(--border);
  border-right: 3px solid var(--accent);
  border-radius: var(--r-lg);
  padding: 18px 20px;
  margin-bottom: 14px;
  position: relative;
  overflow: hidden;
  animation: fadeSlideDown 0.25s ease;
}

.reentry::before {
  content: "";
  position: absolute;
  top: 0; right: 0;
  width: 200px;
  height: 100%;
  background: linear-gradient(90deg, transparent, var(--accent-glow));
  pointer-events: none;
}

.reentry-eyebrow {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 6px;
  font-weight: 500;
}

.reentry-title {
  font-size: 1.4rem;
  font-weight: 600;
  line-height: 1.2;
  margin: 0 0 8px;
  letter-spacing: -0.02em;
  color: var(--text);
}

.reentry-note {
  font-size: 13px;
  color: var(--text-2);
  line-height: 1.6;
  margin: 0 0 14px;
}

.reentry-actions {
  display: flex;
  gap: 8px;
}

/* ── INBOX NOTICE ── */
.inbox-notice {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 10px 14px;
  border-radius: var(--r-md);
  border: 1px solid var(--border);
  background: var(--surface);
  margin-bottom: 14px;
  animation: fadeSlideDown 0.2s ease;
}

.inbox-notice-left {
  display: flex;
  align-items: center;
  gap: 10px;
}

.inbox-badge {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 26px;
  height: 26px;
  border-radius: var(--r-sm);
  background: var(--surface-3);
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 600;
  color: var(--text-2);
}

.inbox-text {
  font-size: 12.5px;
  color: var(--text-2);
}

/* ── SECTION ── */
.section-header {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  margin-bottom: 10px;
}

.section-label {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--text-3);
  font-weight: 400;
}

.section-count {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text-3);
}

/* ── LOOP CARD ── */
.loop-stack {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.loop-card {
  background: var(--surface);
  border: 1px solid var(--border-soft);
  border-right: 2.5px solid var(--border);
  border-radius: var(--r-md);
  padding: 14px 16px 13px 15px;
  transition: border-color 0.18s, background 0.18s, transform 0.18s, box-shadow 0.18s;
  animation: fadeSlideDown 0.22s ease backwards;
  cursor: default;
  position: relative;
}

.loop-card::before {
  content: '';
  position: absolute;
  top: 0; right: -2.5px; bottom: 0;
  width: 2.5px;
  border-radius: 0 var(--r-md) var(--r-md) 0;
}

.loop-card.kind-do    { border-right-color: var(--do); }
.loop-card.kind-decide{ border-right-color: var(--decide); }
.loop-card.kind-ask   { border-right-color: var(--ask); }
.loop-card.kind-schedule { border-right-color: var(--schedule); }
.loop-card.kind-let_go   { border-right-color: var(--let_go); }
.loop-card.kind-inbox    { border-right-color: var(--border); }

.loop-card:hover {
  border-color: rgba(255,255,255,0.08);
  background: var(--surface-2);
  transform: translateY(-1px);
  box-shadow: 0 12px 32px rgba(0,0,0,0.2);
}

.loop-card.highlighted {
  border-color: rgba(255,45,85,0.25);
  background: var(--surface-2);
  box-shadow: 0 0 0 2px var(--accent-glow);
}

.loop-card[draggable="true"] { cursor: grab; }
.loop-card.dragging { opacity: 0.48; transform: scale(0.982); }
.loop-card.drag-over {
  border-color: var(--accent);
  box-shadow: 0 0 0 2px var(--accent-glow);
}

.drag-handle {
  width: 26px;
  height: 26px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  color: var(--text-3);
  border-radius: var(--r-sm);
  flex-shrink: 0;
  cursor: grab;
}
.drag-handle:hover { background: var(--surface-3); color: var(--text-2); }

.loop-card-top-left {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  min-width: 0;
}

.loop-card-tools {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  flex-shrink: 0;
}

.reorder-controls {
  display: inline-flex;
  align-items: center;
  gap: 1px;
  padding: 2px;
  border: 1px solid var(--border-soft);
  border-radius: 7px;
  background: var(--surface-2);
}

.reorder-btn {
  width: 24px;
  height: 24px;
  border-radius: 5px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  color: var(--text-3);
  transition: color 0.15s, background 0.15s, opacity 0.15s;
}
.reorder-btn:hover:not(:disabled) { background: var(--surface-3); color: var(--text); }
.reorder-btn:disabled { opacity: 0.22; cursor: not-allowed; }
.reorder-btn svg { width: 12px; height: 12px; }

/* ── CAPACITY PANEL ── */
.active-cap-panel {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 14px;
  padding: 12px 14px;
  margin-bottom: 12px;
  background: var(--surface);
  border: 1px solid var(--border-soft);
  border-radius: var(--r-md);
  animation: fadeSlideDown 0.18s ease;
}

.active-cap-copy { min-width: 0; }

.active-cap-label {
  font-family: var(--mono);
  font-size: 8.5px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--text-3);
  font-weight: 400;
  margin-bottom: 4px;
}

.active-cap-main {
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
  line-height: 1.2;
  letter-spacing: -0.02em;
}

.active-cap-controls {
  display: inline-flex;
  gap: 3px;
  padding: 3px;
  border-radius: 8px;
  background: var(--surface-2);
  border: 1px solid var(--border-soft);
  flex-shrink: 0;
}

.active-cap-btn {
  min-width: 30px;
  padding: 5px 8px;
  border-radius: 5px;
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 500;
  color: var(--text-3);
  transition: all 0.15s;
}
.active-cap-btn:hover { color: var(--text); background: var(--surface-3); }
.active-cap-btn.active {
  color: var(--accent);
  background: var(--accent-dim);
  font-weight: 600;
}

/* ── ROUTE GRID ── */
.route-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 7px;
  margin: 14px 0 18px;
}

.route-option {
  border: 1px solid var(--border-soft);
  background: var(--surface-2);
  color: var(--text-2);
  border-radius: var(--r-md);
  padding: 11px 10px;
  text-align: left;
  transition: all 0.15s;
}
.route-option:hover { border-color: var(--border); color: var(--text); }
.route-option.selected {
  border-color: var(--accent);
  color: var(--text);
  background: var(--accent-dim);
}
.route-option strong {
  display: block;
  font-size: 12.5px;
  font-weight: 600;
  margin-bottom: 2px;
  color: inherit;
}
.route-option span {
  display: block;
  font-family: var(--mono);
  font-size: 9.5px;
  line-height: 1.35;
  color: var(--text-3);
  letter-spacing: 0.04em;
}

/* ── LOOP CARD INTERNALS ── */
.loop-card-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 10px;
  margin-bottom: 7px;
}

/* ── KIND CHIP ── */
.kind-chip {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 2px 8px;
  border-radius: 4px;
  font-family: var(--mono);
  font-size: 9px;
  font-weight: 500;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  flex-shrink: 0;
}

.kind-chip.do     { background: var(--do-dim);       color: var(--do); }
.kind-chip.decide { background: var(--decide-dim);    color: var(--decide); }
.kind-chip.ask    { background: var(--ask-dim);       color: var(--ask); }
.kind-chip.schedule { background: var(--schedule-dim); color: var(--schedule); }
.kind-chip.let_go { background: var(--let_go-dim);   color: var(--let_go); }
.kind-chip.inbox  { background: var(--surface-3);     color: var(--text-3); }

.kind-dot {
  width: 4px;
  height: 4px;
  border-radius: 50%;
  background: currentColor;
  flex-shrink: 0;
}

.card-overflow {
  width: 26px;
  height: 26px;
  border-radius: var(--r-sm);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-3);
  transition: all 0.15s;
  flex-shrink: 0;
}
.card-overflow:hover { background: var(--surface-3); color: var(--text-2); }

.loop-title {
  font-size: 14.5px;
  font-weight: 400;
  color: var(--text);
  line-height: 1.5;
  margin: 0 0 6px;
  letter-spacing: -0.01em;
  text-wrap: pretty;
}

.loop-next {
  font-size: 11.5px;
  color: var(--text-2);
  line-height: 1.5;
  display: flex;
  gap: 6px;
  align-items: baseline;
}

.loop-next-label {
  font-family: var(--mono);
  font-size: 8.5px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-3);
  flex-shrink: 0;
}

.loop-card-bottom {
  display: flex;
  align-items: center;
  justify-content: flex-end;
  gap: 6px;
  margin-top: 10px;
}

/* ── BUTTONS ── */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 7px 14px;
  border-radius: var(--r-sm);
  font-size: 12.5px;
  font-weight: 600;
  transition: all 0.15s;
  cursor: pointer;
  border: none;
  letter-spacing: 0.01em;
}

.btn-ghost {
  background: transparent;
  color: var(--text-2);
  border: 1px solid var(--border);
}
.btn-ghost:hover { background: var(--surface-2); color: var(--text); border-color: rgba(255,255,255,0.1); }

.btn-primary {
  background: var(--accent);
  color: var(--accent-ink);
  font-weight: 700;
  box-shadow: 0 6px 18px rgba(255,45,85,0.28);
}
.btn-primary:hover {
  transform: translateY(-1px);
  background: var(--accent-hot);
  box-shadow: 0 8px 24px rgba(255,45,85,0.36);
}
.btn-primary:disabled { opacity: 0.38; cursor: not-allowed; transform: none; box-shadow: none; }

.btn-subtle {
  background: var(--surface-2);
  color: var(--text-2);
  border: 1px solid var(--border);
}
.btn-subtle:hover { background: var(--surface-3); color: var(--text); }

.btn-sm {
  padding: 4px 9px;
  font-size: 11.5px;
  border-radius: 5px;
}

.btn-action {
  background: var(--surface-3);
  color: var(--text-2);
  border: 1px solid var(--border);
  padding: 5px 11px;
  font-size: 11.5px;
  font-weight: 600;
  border-radius: var(--r-sm);
  font-family: var(--mono);
  letter-spacing: 0.04em;
}
.btn-action:hover { color: var(--text); border-color: rgba(255,255,255,0.12); }
.btn-action.btn-primary {
  background: var(--accent);
  color: var(--accent-ink);
  border-color: transparent;
}
.btn-action.btn-primary:hover {
  background: var(--accent-hot);
  box-shadow: 0 6px 18px rgba(255,45,85,0.28);
}
.btn-action.kind-do:hover    { color: var(--do);       border-color: rgba(48,209,88,0.3);   background: var(--do-dim); }
.btn-action.kind-decide:hover{ color: var(--decide);   border-color: rgba(255,214,10,0.3);  background: var(--decide-dim); }
.btn-action.kind-ask:hover   { color: var(--ask);      border-color: rgba(10,132,255,0.3);  background: var(--ask-dim); }
.btn-action.kind-schedule:hover { color: var(--schedule); border-color: rgba(191,90,242,0.3); background: var(--schedule-dim); }
.btn-action.kind-let_go:hover   { color: var(--text);  background: var(--surface-3); }

/* ── SHOW MORE ── */
.show-more {
  width: 100%;
  padding: 9px;
  text-align: center;
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-3);
  margin-top: 2px;
  border-radius: var(--r-md);
  transition: all 0.15s;
}
.show-more:hover { color: var(--text-2); background: var(--surface); }

/* ── STATUS STRIP ── */
.status-strip {
  display: flex;
  gap: 8px;
  margin-top: 28px;
}

.strip-btn {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 11px 13px;
  border-radius: var(--r-md);
  border: 1px solid var(--border-soft);
  background: var(--surface);
  font-size: 12.5px;
  color: var(--text-2);
  transition: all 0.15s;
}
.strip-btn:hover { border-color: var(--border); color: var(--text); background: var(--surface-2); }

.strip-badge {
  display: flex;
  align-items: center;
  justify-content: center;
  min-width: 20px;
  height: 20px;
  border-radius: 4px;
  background: var(--surface-3);
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 600;
  color: var(--text-3);
}

/* ── FAB ── */
.fab {
  position: fixed;
  bottom: calc(68px + env(safe-area-inset-bottom));
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 12px 22px;
  border-radius: var(--r-md);
  background: var(--accent);
  color: var(--accent-ink);
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.02em;
  box-shadow: 0 4px 6px rgba(0,0,0,0.3), 0 12px 30px rgba(255,45,85,0.32);
  z-index: 5;
  transition: all 0.2s;
  white-space: nowrap;
}
.fab:hover {
  transform: translateX(-50%) translateY(-2px);
  background: var(--accent-hot);
  box-shadow: 0 6px 8px rgba(0,0,0,0.3), 0 16px 40px rgba(255,45,85,0.4);
}
.fab:active { transform: translateX(-50%) translateY(0); }

/* ── BOTTOM NAV ── */
.bottom-nav {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  z-index: 9;
  display: flex;
  background: color-mix(in srgb, var(--bg) 94%, transparent);
  backdrop-filter: blur(16px);
  border-top: 1px solid var(--border-soft);
  padding: 6px 4px calc(6px + env(safe-area-inset-bottom));
}

.bottom-nav-btn {
  flex: 1;
  min-width: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 3px;
  color: var(--text-3);
  padding: 7px 4px;
  font-family: var(--mono);
  font-size: 8.5px;
  letter-spacing: 0.06em;
  position: relative;
}

.bottom-nav-btn.active { color: var(--accent); }

.bottom-nav-icon { width: 18px; height: 18px; }

.bottom-nav-badge {
  position: absolute;
  top: 5px;
  right: calc(50% - 22px);
  min-width: 14px;
  height: 14px;
  border-radius: 3px;
  background: var(--accent);
  color: #fff;
  font-family: var(--mono);
  font-size: 8px;
  font-weight: 700;
  line-height: 14px;
  padding: 0 3px;
}

/* ── OVERLAY ── */
.overlay-root {
  position: fixed;
  inset: 0;
  z-index: 50;
  pointer-events: none;
}

.overlay-backdrop {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.75);
  backdrop-filter: blur(6px);
  pointer-events: auto;
  animation: fadeIn 0.2s ease;
}

.overlay-panel {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  pointer-events: none;
}

.overlay-card {
  width: min(100%, 540px);
  max-height: calc(100vh - 40px);
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior: contain;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-xl);
  padding: 22px;
  pointer-events: auto;
  animation: slideUp 0.25s cubic-bezier(0.16,1,0.3,1);
  position: relative;
}

.overlay-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 18px;
}

.overlay-meta {
  display: flex;
  flex-direction: column;
  gap: 3px;
}

.overlay-eyebrow {
  font-family: var(--mono);
  font-size: 8.5px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--accent);
  font-weight: 500;
}

.overlay-step {
  font-size: 11.5px;
  color: var(--text-3);
  font-family: var(--mono);
}

.overlay-close {
  width: 30px;
  height: 30px;
  border-radius: var(--r-sm);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-3);
  transition: all 0.15s;
}
.overlay-close:hover { background: var(--surface-3); color: var(--text); }

.overlay-title {
  font-size: clamp(1.3rem, 4vw, 1.75rem);
  font-weight: 700;
  margin: 0 0 6px;
  line-height: 1.15;
  letter-spacing: -0.03em;
  color: var(--text);
}

.overlay-subtitle {
  font-size: 13px;
  color: var(--text-2);
  line-height: 1.6;
  margin: 0 0 18px;
}

/* ── TEXTAREA ── */
.big-input {
  width: 100%;
  min-height: 110px;
  padding: 12px 14px;
  border-radius: var(--r-md);
  border: 1px solid var(--border);
  background: var(--surface-2);
  color: var(--text);
  font-size: 14.5px;
  line-height: 1.6;
  resize: none;
  transition: border-color 0.15s;
  font-family: var(--sans);
}
.big-input:focus {
  outline: none;
  border-color: rgba(255,45,85,0.4);
  box-shadow: 0 0 0 2px var(--accent-glow);
}
.big-input::placeholder { color: var(--text-3); }

.input-hint {
  font-size: 11.5px;
  color: var(--text-3);
  margin-top: 7px;
  line-height: 1.5;
}

.input-hint-row {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 12px;
}
.input-hint-row .input-hint { margin-top: 7px; flex: 1; }

.char-counter {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text-3);
  font-variant-numeric: tabular-nums;
  margin-top: 7px;
  flex-shrink: 0;
}
.char-counter.near-limit { color: var(--decide); }
.char-counter.at-limit { color: var(--accent); }

.inline-edit-meta {
  display: flex;
  justify-content: flex-end;
  margin-top: 5px;
}

/* ── KIND CHOICES ── */
.kind-grid {
  display: flex;
  flex-direction: column;
  gap: 7px;
  margin-bottom: 18px;
}

.kind-option {
  display: flex;
  align-items: flex-start;
  gap: 11px;
  padding: 12px 14px;
  border-radius: var(--r-md);
  border: 1px solid var(--border-soft);
  background: var(--surface-2);
  text-align: left;
  width: 100%;
  transition: all 0.15s;
}
.kind-option:hover { border-color: var(--border); background: var(--surface-3); }
.kind-option.selected { border-color: currentColor; }
.kind-option.selected.do       { color: var(--do);       background: var(--do-dim); }
.kind-option.selected.decide   { color: var(--decide);   background: var(--decide-dim); }
.kind-option.selected.ask      { color: var(--ask);      background: var(--ask-dim); }
.kind-option.selected.schedule { color: var(--schedule); background: var(--schedule-dim); }
.kind-option.selected.let_go   { background: var(--let_go-dim); border-color: var(--let_go); }

.kind-option-dot {
  width: 9px;
  height: 9px;
  border-radius: 50%;
  border: 1.5px solid currentColor;
  margin-top: 3px;
  flex-shrink: 0;
  transition: background 0.15s;
}
.kind-option.selected .kind-option-dot { background: currentColor; }

.kind-option-label { font-size: 13px; font-weight: 600; color: var(--text); display: block; margin-bottom: 1px; }
.kind-option.selected .kind-option-label { color: inherit; }
.kind-option-desc { font-size: 11.5px; color: var(--text-2); line-height: 1.5; }
.kind-option.selected .kind-option-desc { color: inherit; opacity: 0.72; }

/* ── PREVIEW CARD ── */
.preview-loop {
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  padding: 14px;
  margin-bottom: 18px;
}

.preview-loop-title {
  font-size: 14px;
  font-weight: 400;
  color: var(--text);
  margin: 6px 0 5px;
  line-height: 1.4;
}

/* ── DRAWER ── */
.drawer-list {
  display: flex;
  flex-direction: column;
  gap: 7px;
  max-height: 55vh;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  margin-bottom: 14px;
}

.drawer-item {
  background: var(--surface-2);
  border: 1px solid var(--border-soft);
  border-radius: var(--r-md);
  padding: 11px 13px;
}

.drawer-item-title {
  font-size: 13px;
  color: var(--text);
  margin-bottom: 3px;
  line-height: 1.4;
}

.drawer-item-note {
  font-size: 11.5px;
  color: var(--text-2);
  line-height: 1.5;
}

.drawer-item-actions {
  display: flex;
  gap: 6px;
  margin-top: 9px;
}

/* ── MENU ── */
.menu-list {
  display: flex;
  flex-direction: column;
  gap: 3px;
  margin-bottom: 14px;
}

.menu-item {
  display: flex;
  align-items: center;
  gap: 9px;
  padding: 9px 11px;
  border-radius: var(--r-sm);
  font-size: 13px;
  color: var(--text-2);
  transition: all 0.15s;
  text-align: left;
  width: 100%;
  border: 1px solid transparent;
}
.menu-item:hover { background: var(--surface-2); color: var(--text); }
.menu-item.danger:hover { background: rgba(255,45,85,0.08); color: var(--accent); border-color: rgba(255,45,85,0.12); }

/* ── SYNC ── */
.sync-info {
  background: var(--surface-2);
  border: 1px solid var(--border-soft);
  border-radius: var(--r-md);
  padding: 11px 13px;
  font-size: 12px;
  color: var(--text-2);
  line-height: 1.6;
  margin-bottom: 14px;
}

.email-row {
  display: flex;
  gap: 8px;
  margin-bottom: 14px;
}

.email-input {
  flex: 1;
  padding: 9px 12px;
  border-radius: var(--r-sm);
  border: 1px solid var(--border);
  background: var(--surface-2);
  color: var(--text);
  font-size: 13px;
  transition: border-color 0.15s;
}
.email-input:focus { outline: none; border-color: rgba(255,45,85,0.4); }
.email-input::placeholder { color: var(--text-3); }

/* ── SETTINGS ROWS ── */
.settings-row {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 16px;
  padding: 14px 0;
  border-top: 1px solid var(--border-soft);
}
.settings-row:first-of-type { border-top: none; }
.settings-row-label { flex: 1; min-width: 0; }
.settings-row-title {
  font-size: 13.5px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 3px;
}
.settings-row-help {
  font-size: 11.5px;
  color: var(--text-2);
  line-height: 1.5;
}
.settings-cap-group {
  display: inline-flex;
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
  overflow: hidden;
  flex-shrink: 0;
}
.settings-cap-btn {
  padding: 6px 13px;
  background: transparent;
  color: var(--text-2);
  font-family: var(--mono);
  font-size: 12px;
  font-weight: 500;
  border: none;
  border-right: 1px solid var(--border);
  transition: all 0.15s;
}
.settings-cap-btn:last-child { border-right: none; }
.settings-cap-btn:hover { color: var(--text); background: var(--surface-2); }
.settings-cap-btn.selected {
  background: var(--accent);
  color: #fff;
  font-weight: 700;
}
.settings-cap-btn.selected:hover { background: var(--accent-hot); }

.settings-section {
  padding: 14px 0;
  border-top: 1px solid var(--border-soft);
}
.settings-section:first-of-type { border-top: none; }
.settings-label {
  font-size: 13.5px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 5px;
}
.settings-helper {
  font-size: 11.5px;
  color: var(--text-2);
  line-height: 1.5;
  margin: 0 0 10px;
}
.seg-row {
  display: flex;
  gap: 3px;
  background: var(--surface-2);
  padding: 3px;
  border-radius: var(--r-sm);
}
.seg-row button {
  flex: 1;
  padding: 7px 10px;
  border-radius: 4px;
  background: transparent;
  color: var(--text-3);
  border: none;
  font-size: 12.5px;
  font-weight: 500;
  transition: all 0.15s;
}
.seg-row button.active {
  background: var(--surface);
  color: var(--text);
  box-shadow: 0 1px 2px rgba(0,0,0,0.2);
}
.seg-row button:hover:not(.active) { color: var(--text-2); }

/* ── EMPTY STATE ── */
.empty-state {
  padding: 44px 20px;
  text-align: center;
  color: var(--text-3);
  font-size: 12.5px;
  line-height: 1.7;
  border: 1px dashed var(--border-soft);
  border-radius: var(--r-lg);
}
.empty-state strong {
  display: block;
  color: var(--text-2);
  margin-bottom: 3px;
  font-weight: 600;
}

/* ── TAB PANELS ── */
.tab-panel { display: none; }
.tab-panel.active { display: block; animation: fadeIn 0.15s ease; }

/* ── NOTICE BANNER ── */
.notice-banner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 9px 13px;
  border-radius: var(--r-md);
  background: rgba(255,45,85,0.07);
  border: 1px solid rgba(255,45,85,0.14);
  margin-bottom: 10px;
  font-size: 12px;
  color: rgba(255,100,120,0.9);
}

/* ── INLINE EDIT ── */
.inline-edit-input {
  width: 100%;
  background: var(--surface-2);
  border: 1px solid rgba(255,45,85,0.4);
  border-radius: 5px;
  padding: 6px 8px;
  font-size: 14px;
  color: var(--text);
  line-height: 1.5;
  resize: none;
  box-shadow: 0 0 0 2px var(--accent-glow);
}
.inline-edit-input:focus { outline: none; }

/* ── TOAST ── */
.toast {
  position: fixed;
  bottom: calc(80px + env(safe-area-inset-bottom));
  left: 50%;
  transform: translateX(-50%) translateY(10px);
  background: var(--surface-3);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 9px 16px;
  border-radius: var(--r-sm);
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.04em;
  opacity: 0;
  pointer-events: none;
  transition: all 0.2s;
  z-index: 100;
  white-space: nowrap;
}
.toast.visible { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast.has-action.visible { pointer-events: auto; }
.toast-action {
  margin-left: 10px;
  color: var(--accent);
  font-weight: 600;
  font-size: 11px;
  padding: 1px 5px;
  border-radius: 3px;
  transition: background 0.15s;
}
.toast-action:hover { background: var(--accent-dim); }

/* ── ANIMATIONS ── */
@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

@keyframes fadeSlideDown {
  from { opacity: 0; transform: translateY(-8px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(20px) scale(0.98); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

/* ── OVERLAY ACTIONS ── */
.overlay-actions {
  display: flex;
  gap: 8px;
  justify-content: flex-end;
  margin-top: 18px;
}

/* ── MOBILE ── */
@media (max-width: 767px) {
  .main { padding: 0 14px 100px; }
  .active-cap-panel { align-items: flex-start; flex-direction: column; }
  .route-grid { grid-template-columns: 1fr; }
  .topbar { padding: 12px 16px; }
  .reentry-title { font-size: 1.25rem; }
  .overlay-panel { padding: 12px; align-items: flex-end; }
  .overlay-card { width: 100%; max-height: 86vh; border-radius: 16px 16px 0 0; }
}

@media (min-width: 768px) {
  .fab { display: none; }
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    transition-duration: 0.01ms !important;
  }
}

/* ── SYNC ERROR BANNER ── */
.sync-error-banner {
  position: fixed;
  top: 66px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(255,45,85,0.1);
  border: 1px solid rgba(255,45,85,0.22);
  padding: 9px 14px;
  border-radius: var(--r-md);
  display: flex;
  align-items: center;
  gap: 10px;
  z-index: 999;
  max-width: 90%;
  box-shadow: 0 4px 16px rgba(0,0,0,0.2);
  animation: slideDown 0.3s ease;
}

@keyframes slideDown {
  from { opacity: 0; transform: translateX(-50%) translateY(-10px); }
  to { opacity: 1; transform: translateX(-50%) translateY(0); }
}

.sync-error-msg {
  flex: 1;
  font-size: 12.5px;
  color: var(--text);
}
.sync-error-msg strong { color: var(--accent); font-weight: 700; }

.sync-error-retry {
  padding: 5px 11px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 5px;
  font-family: var(--mono);
  font-size: 10.5px;
  font-weight: 600;
  letter-spacing: 0.04em;
  cursor: pointer;
  transition: all 0.15s;
}
.sync-error-retry:hover { background: var(--accent-hot); transform: translateY(-1px); }

.sync-error-dismiss {
  padding: 4px 7px;
  background: transparent;
  color: var(--text-3);
  border: none;
  font-size: 15px;
  cursor: pointer;
  transition: color 0.15s;
}
.sync-error-dismiss:hover { color: var(--text); }

@media (max-width: 600px) {
  .sync-error-banner { top: 58px; max-width: 95%; }
}

/* ── SIDEBAR ── */
.sidebar-section {
  padding: 18px 14px;
  border-bottom: 1px solid var(--border-soft);
}
.sidebar-section:last-child { border-bottom: none; flex: 1; }
.sidebar-title {
  font-family: var(--mono);
  font-size: 8.5px;
  text-transform: uppercase;
  letter-spacing: 0.14em;
  color: var(--text-3);
  margin-bottom: 10px;
  font-weight: 400;
}
.sidebar-stats { display: flex; flex-direction: column; gap: 6px; }
.stat-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 7px 9px;
  border-radius: var(--r-sm);
  font-size: 12.5px;
  transition: background 0.15s;
}
.stat-row:hover { background: var(--surface); }
.stat-label {
  display: flex;
  align-items: center;
  gap: 8px;
  color: var(--text-2);
}
.stat-badge { width: 5px; height: 5px; border-radius: 50%; }
.stat-count { color: var(--text); font-weight: 600; font-size: 13px; }
.sidebar-tabs { display: flex; flex-direction: column; gap: 3px; }
.sidebar-tab {
  padding: 9px 11px;
  border-radius: var(--r-sm);
  font-size: 12.5px;
  color: var(--text-2);
  display: flex;
  align-items: center;
  justify-content: space-between;
  transition: all 0.15s;
  cursor: pointer;
}
.sidebar-tab:hover { background: var(--surface); color: var(--text); }
.sidebar-tab.active { background: var(--surface-2); color: var(--text); font-weight: 600; }
.sidebar-tab .tab-count {
  background: var(--surface-3);
  color: var(--text-3);
  min-width: 18px;
  height: 18px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  border-radius: 3px;
  font-family: var(--mono);
  font-size: 9px;
  font-weight: 600;
  padding: 0 5px;
}
.sidebar-tab.active .tab-count { background: var(--accent-dim); color: var(--accent); }
.sidebar-actions { padding: 10px; }
.sidebar-capture-btn {
  width: 100%;
  padding: 11px;
  background: var(--accent);
  color: #fff;
  border-radius: var(--r-md);
  font-weight: 700;
  font-size: 12.5px;
  letter-spacing: 0.02em;
  transition: all 0.2s;
  box-shadow: 0 6px 18px rgba(255,45,85,0.26);
}
.sidebar-capture-btn:hover {
  background: var(--accent-hot);
  transform: translateY(-1px);
  box-shadow: 0 8px 22px rgba(255,45,85,0.34);
}

/* ── CONTEXT PANEL ── */
.context-panel-section { margin-bottom: 20px; }
.context-panel-section:last-child { margin-bottom: 0; }
.context-panel-title {
  font-family: var(--mono);
  font-size: 8.5px;
  text-transform: uppercase;
  letter-spacing: 0.14em;
  color: var(--text-3);
  margin-bottom: 10px;
  font-weight: 400;
}
.quick-action-btn {
  width: 100%;
  padding: 11px 14px;
  border-radius: var(--r-md);
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  font-size: 12.5px;
  font-weight: 500;
  display: flex;
  align-items: center;
  gap: 8px;
  transition: all 0.15s;
  margin-bottom: 7px;
  text-align: left;
}
.quick-action-btn:hover { border-color: rgba(255,255,255,0.1); background: var(--surface-2); transform: translateY(-1px); }
.quick-action-btn .shortcut {
  margin-left: auto;
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text-3);
  padding: 2px 5px;
  border-radius: 3px;
  background: var(--surface-3);
}

@media (min-width: 768px) {
  .tabs { display: none; }
}

/* ── AUTH GATE ── */
.auth-gate {
  position: fixed;
  inset: 0;
  z-index: 200;
  background: var(--bg);
  background-image: radial-gradient(ellipse 70% 50% at 96% 0%, rgba(255,45,85,0.12) 0%, transparent 60%);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}

.auth-gate-card {
  width: 100%;
  max-width: 400px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-xl);
  padding: 36px 32px 32px;
  display: flex;
  flex-direction: column;
  gap: 0;
}

.auth-gate-logo {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 28px;
}

.auth-gate-logo-mark {
  width: 30px;
  height: 30px;
  border-radius: 50%;
  border: 2px solid var(--accent);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  box-shadow: 0 0 0 4px var(--accent-glow);
  position: relative;
}
.auth-gate-logo-mark::before {
  content: '';
  position: absolute;
  inset: 5px;
  border-radius: 50%;
  border: 1.5px solid rgba(255,45,85,0.35);
}
.auth-gate-logo-mark svg { position: relative; z-index: 1; }
.auth-gate-logo-mark svg path { stroke: var(--accent); }

.auth-gate-logo-name {
  font-size: 14px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: -0.01em;
}

.auth-gate-headline {
  font-size: 1.9rem;
  font-weight: 700;
  color: var(--text);
  line-height: 1.15;
  margin: 0 0 10px;
  letter-spacing: -0.03em;
}

.auth-gate-sub {
  font-size: 13.5px;
  color: var(--text-2);
  line-height: 1.6;
  margin: 0 0 24px;
}

.auth-gate-email-row {
  display: flex;
  flex-direction: column;
  gap: 9px;
  margin-bottom: 14px;
}

.auth-gate-input {
  width: 100%;
  padding: 12px 14px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: var(--r-md);
  color: var(--text);
  font-size: 14.5px;
  outline: none;
  transition: border-color 0.15s;
  font-family: var(--sans);
}
.auth-gate-input:focus { border-color: rgba(255,45,85,0.45); }

.auth-gate-btn {
  width: 100%;
  padding: 12px 14px;
  background: var(--accent);
  color: #fff;
  border-radius: var(--r-md);
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  border: none;
  transition: all 0.15s;
  box-shadow: 0 6px 20px rgba(255,45,85,0.28);
}
.auth-gate-btn:hover { background: var(--accent-hot); transform: translateY(-1px); }
.auth-gate-btn:disabled { opacity: 0.45; cursor: not-allowed; }

.auth-gate-hint {
  font-family: var(--mono);
  font-size: 10.5px;
  color: var(--text-3);
  text-align: center;
  margin-top: 10px;
  line-height: 1.5;
  letter-spacing: 0.04em;
}

.auth-gate-sent {
  text-align: center;
  padding: 18px 0;
}

.auth-gate-sent-icon { font-size: 2.2rem; margin-bottom: 10px; }

.auth-gate-sent-title {
  font-size: 1.25rem;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 6px;
  letter-spacing: -0.02em;
}

.auth-gate-sent-body {
  font-size: 13px;
  color: var(--text-2);
  line-height: 1.6;
}

.auth-gate-features {
  display: flex;
  flex-direction: column;
  gap: 7px;
  margin-bottom: 24px;
}

.auth-gate-feature {
  display: flex;
  align-items: flex-start;
  gap: 9px;
  font-size: 13px;
  color: var(--text-2);
  line-height: 1.5;
}

.auth-gate-feature-dot {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: var(--accent);
  margin-top: 5px;
  flex-shrink: 0;
}

/* ── ONBOARDING ── */
.onboarding-overlay {
  position: fixed;
  inset: 0;
  z-index: 300;
  background: rgba(0,0,0,0.8);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}

.onboarding-card {
  width: 100%;
  max-width: 460px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-xl);
  padding: 36px 32px 32px;
  position: relative;
  animation: onboarding-in 0.3s ease;
}

@keyframes onboarding-in {
  from { opacity: 0; transform: translateY(14px) scale(0.97); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

.onboarding-step-indicator {
  display: flex;
  gap: 5px;
  margin-bottom: 24px;
}

.onboarding-dot {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: var(--border);
  transition: background 0.2s, transform 0.2s;
}
.onboarding-dot.active { background: var(--accent); transform: scale(1.35); }
.onboarding-dot.done { background: rgba(255,45,85,0.3); }

.onboarding-eyebrow {
  font-family: var(--mono);
  font-size: 9px;
  font-weight: 500;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 8px;
}

.onboarding-title {
  font-size: 1.65rem;
  font-weight: 700;
  color: var(--text);
  line-height: 1.15;
  margin: 0 0 12px;
  letter-spacing: -0.03em;
}

.onboarding-body {
  font-size: 13.5px;
  color: var(--text-2);
  line-height: 1.7;
  margin: 0 0 22px;
}

.onboarding-visual {
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  padding: 14px 16px;
  margin-bottom: 24px;
  font-size: 12.5px;
  color: var(--text-2);
}

.onboarding-visual-row {
  display: flex;
  align-items: center;
  gap: 9px;
  padding: 7px 0;
  border-bottom: 1px solid var(--border-soft);
  color: var(--text);
  font-size: 12.5px;
}
.onboarding-visual-row:last-child { border-bottom: none; }

.onboarding-actions {
  display: flex;
  gap: 9px;
  align-items: center;
}

.onboarding-btn-primary {
  flex: 1;
  padding: 12px 14px;
  background: var(--accent);
  color: #fff;
  border-radius: var(--r-md);
  font-size: 13.5px;
  font-weight: 700;
  cursor: pointer;
  border: none;
  transition: all 0.15s;
  box-shadow: 0 6px 18px rgba(255,45,85,0.26);
}
.onboarding-btn-primary:hover { background: var(--accent-hot); transform: translateY(-1px); }

.onboarding-btn-ghost {
  padding: 12px 14px;
  background: none;
  color: var(--text-2);
  border: 1px solid var(--border);
  border-radius: var(--r-md);
  font-size: 13.5px;
  cursor: pointer;
  transition: color 0.15s, border-color 0.15s;
}
.onboarding-btn-ghost:hover { color: var(--text); border-color: rgba(255,255,255,0.12); }

.onboarding-skip {
  text-align: center;
  margin-top: 14px;
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.06em;
  color: var(--text-3);
}

.inline-link {
  background: none;
  border: none;
  padding: 2px 3px;
  color: var(--text-2);
  text-decoration: underline;
  font: inherit;
  cursor: pointer;
  border-radius: 3px;
}
.inline-link:hover { color: var(--text); }
.inline-link:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

/* ── APP LOCKED STATE ── */
.app-locked .app-body {
  pointer-events: none;
  filter: blur(2px);
  opacity: 0.2;
  user-select: none;
}
.app-locked .topbar-right {
  pointer-events: none;
  opacity: 0.2;
}
</style>
</head>
<body>

<div class="app" id="app">
  <header class="topbar">
    <div class="brand">
      <div class="brand-mark">
        <svg viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M7 2.2 A4.8 4.8 0 1 1 11.3 10" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          <path d="M11.3 10 L9.6 8.8 M11.3 10 L12.8 8.8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <span class="brand-name">Open Loops</span>
    </div>
    <div class="topbar-right">
      <button class="btn btn-primary btn-sm new-loop-btn" type="button" data-action="open-capture">+ New loop</button>
      <button class="icon-btn" id="install-btn" type="button" data-action="install-app" title="Install app" aria-label="Install app" hidden>
        <svg viewBox="0 0 16 16" fill="none" aria-hidden="true"><path d="M8 2v8m0 0l-3-3m3 3l3-3M3 13h10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <button class="icon-btn" id="theme-toggle" type="button" data-action="toggle-theme" title="Toggle theme" aria-label="Toggle theme">
        <svg id="theme-icon-dark" viewBox="0 0 16 16" fill="none" aria-hidden="true"><path d="M13 9.5A5.5 5.5 0 0 1 6.5 3a5.5 5.5 0 1 0 6.5 6.5z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <button class="icon-btn" id="settings-btn" type="button" data-action="open-settings" title="Settings" aria-label="Settings">
        <svg viewBox="0 0 16 16" fill="none" aria-hidden="true"><circle cx="8" cy="8" r="2" stroke="currentColor" stroke-width="1.4"/><path d="M12.5 8c0-.3 0-.7-.1-1l1.4-1.1-1-1.7-1.7.7c-.5-.4-1-.7-1.6-.9L9.2 2H6.8l-.3 2c-.6.2-1.1.5-1.6.9l-1.7-.7-1 1.7L3.6 7C3.5 7.3 3.5 7.7 3.5 8s0 .7.1 1l-1.4 1.1 1 1.7 1.7-.7c.5.4 1 .7 1.6.9l.3 2h2.4l.3-2c.6-.2 1.1-.5 1.6-.9l1.7.7 1-1.7L12.4 9c.1-.3.1-.7.1-1z" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/></svg>
      </button>
      <button class="pill-btn" id="sync-pill" type="button" data-action="open-sync">
        <span class="dot"></span>
        <span id="sync-label">Sync</span>
      </button>
    </div>
  </header>

  <div class="app-body">
    <aside class="sidebar" id="sidebar"></aside>

<nav class="bottom-nav" id="bottom-nav"></nav>

<div class="overlay-root" id="overlay-root"></div>
<div id="auth-gate-root"></div>
<div id="onboarding-root"></div>
<div class="toast" id="toast" role="status" aria-live="polite" aria-atomic="true"></div>

<!-- Sync error banner (Morning Brief pattern) -->
<div class="sync-error-banner" id="sync-error-banner" style="display:none;">
  <div class="sync-error-msg">
    <strong>Sync issue.</strong> Your changes are saved on this device.
  </div>
  <button class="sync-error-retry" data-action="sync-retry">Retry</button>
  <button class="sync-error-dismiss" data-action="dismiss-sync-banner">✕</button>
</div>

<script>
(() => {
  const CFG = window.OL_CONFIG || {};
  const STORAGE_KEY_BASE   = CFG.STORAGE_KEY ? CFG.STORAGE_KEY + '_v2'          : 'open_loops_data_v2';
  const ONBOARDING_KEY_BASE = CFG.STORAGE_KEY ? CFG.STORAGE_KEY + '_onboarded'  : 'open_loops_onboarded';
  const THEME_KEY      = CFG.STORAGE_KEY ? CFG.STORAGE_KEY + '_theme'      : 'open_loops_theme';
  const LOOP_CAP_KEY_BASE   = CFG.STORAGE_KEY ? CFG.STORAGE_KEY + '_cap'        : 'open_loops_cap';
  const REENTRY_KEY_BASE    = CFG.STORAGE_KEY ? CFG.STORAGE_KEY + '_reentry_dismissed' : 'open_loops_reentry_dismissed';
  const LEGACY_STORAGE_KEY  = STORAGE_KEY_BASE;
  const LEGACY_STORAGE_QUARANTINE_KEY = `${STORAGE_KEY_BASE}_legacy_unscoped`;
  const IS_FILE = location.protocol === 'file:';

  // UX constraints
  const MAX_LOOP_TEXT_LEN = 500;
  const ALLOWED_LOOP_CAPS = [3, 5, 7];
  const DEFAULT_LOOP_CAP  = 5;
  const DEFAULT_TOAST_MS  = 4000;

  // Display labels — drive all user-visible copy from one map so they stay
  // consistent across tabs, empty states, and chips. Internal status keys
  // stay as 'inbox' / 'active' / 'waiting' / 'released' for backwards
  // compat with existing localStorage and the Supabase schema.
  const TAB_LABEL = {
    inbox:    'Raw',
    active:   'Active',
    waiting:  'Parked',
    released: 'Closed',
  };

  function supabaseConfigIssue() {
    const url = String(CFG.SUPABASE_URL || '').trim();
    const key = String(CFG.SUPABASE_KEY || '').trim();
    const placeholders = ['YOUR_PROJECT', 'YOUR_PUBLISHABLE_KEY', 'YOUR_SUPABASE', 'YOUR_ANON_KEY'];

    if (!url || !key) return 'Supabase URL and publishable key are required before anyone can sign in.';
    if (placeholders.some(token => url.includes(token) || key.includes(token))) {
      return 'open-loops-config.js still contains placeholder Supabase values.';
    }

    try {
      const parsed = new URL(url);
      if (parsed.protocol !== 'https:' || !parsed.hostname.endsWith('.supabase.co')) {
        return 'Supabase URL should look like https://your-project.supabase.co.';
      }
    } catch (_) {
      return 'Supabase URL is not a valid URL.';
    }

    if (key.length < 20) return 'Supabase publishable key looks incomplete.';
    return null;
  }

  function hasSupabaseCfg() {
    return !supabaseConfigIssue();
  }

  function supabaseClientIssue() {
    if (!hasSupabaseCfg()) return supabaseConfigIssue();
    if (!window.supabase) return 'The Supabase sign-in library could not load. Check your connection and reload.';
    return null;
  }

  const VALID_KINDS = new Set(['do', 'decide', 'ask', 'schedule', 'let_go']);
  const VALID_STATUSES = new Set(['active', 'waiting', 'released', 'inbox']);

  const kindMeta = {
    do:       { label: 'Do',       action: 'Mark done',  question: 'What is the one next visible step?', helper: 'Concrete enough that you could start right now without planning.' },
    decide:   { label: 'Decide',   action: 'Decide',     question: 'What decision needs to be made?',    helper: 'Name the decision cleanly — stop holding the whole swirl.' },
    ask:      { label: 'Ask',      action: 'Reach out',  question: 'Who do you need something from?',    helper: 'One person, one ask. Nothing more.' },
    schedule: { label: 'Schedule', action: 'Add to cal', question: 'What needs time on a calendar?',     helper: 'Treat time as the missing ingredient.' },
    let_go:   { label: 'Let go',   action: 'Release',    question: 'What are you choosing to release?',  helper: 'The goal is relief, not proving the thought was silly.' },
    inbox:    { label: 'Raw', action: 'Define',    question: '',                                   helper: '' }
  };

  function nowIso() { return new Date().toISOString(); }
  function uid(p) {
    if (window.crypto && typeof window.crypto.randomUUID === 'function') return `${p}-${window.crypto.randomUUID()}`;
    return `${p}-${Math.random().toString(36).slice(2,9)}-${Date.now().toString(36)}`;
  }
  // Position is a double precision ordering value: bigger = higher in the
  // list. New rows get the current epoch-seconds so they land at the top.
  // Reorder computes midpoints between neighbors, so we rarely need to
  // rebalance (at millisecond resolution, ~50 drops between the same two
  // items before we run out of float headroom — still fine in practice).
  function nowPosition() { return Date.now() / 1000; }

  function seedState() {
    return {
      version: 2,
      lastLoopId: null,
      activeTab: 'now',
      loops: []
    };
  }

  function mk(id, rawText, kind, status, promptAnswer) {
    const t = nowIso();
    return { id, rawText, kind, status, promptAnswer, position: nowPosition(), createdAt: t, updatedAt: t };
  }

  function sanitize(loop) {
    // Fall back to epoch-of-createdAt so existing localStorage data from
    // before the position column gets a deterministic order on first load.
    let pos = typeof loop.position === 'number' && isFinite(loop.position)
      ? loop.position
      : (loop.createdAt ? new Date(loop.createdAt).getTime() / 1000 : nowPosition());
    return {
      id: loop.id || uid('l'),
      rawText: (loop.rawText || 'Untitled').trim().slice(0, MAX_LOOP_TEXT_LEN),
      kind: VALID_KINDS.has(loop.kind) ? loop.kind : null,
      status: VALID_STATUSES.has(loop.status) ? loop.status : 'active',
      promptAnswer: (loop.promptAnswer || '').trim().slice(0, MAX_LOOP_TEXT_LEN),
      position: pos,
      createdAt: loop.createdAt || nowIso(),
      updatedAt: loop.updatedAt || nowIso()
    };
  }

  // ── STATE ──
  let data = seedState();
  let view = {
    activeTab: 'now',
    overlay: null,
    highlightedId: null,
    reentryDismissedFor: null,
    expanded: false,
    syncStatus: 'idle',
    syncText: 'Sync',
    inlineEditId: null,
    draggingLoopId: null,
    // Auth gate state
    authGateSent: false,     // magic link sent confirmation
    authGateEmail: '',       // email being typed
    // Onboarding state
    onboardingStep: -1,      // -1 = hidden; 0-3 = active step
    // Theme: 'dark' | 'light'. Persisted in localStorage.
    theme: 'dark',
    // How many Active loops to show before "Show more". User-configurable.
    loopCap: DEFAULT_LOOP_CAP,
    // Element to restore focus to when current overlay closes.
    overlayOpenerEl: null,
  };
  let toastTimer = null;
  let deferredInstallPrompt = null; // set by 'beforeinstallprompt' event
  let currentLocalUserId = null;
  // Set to true once Sync.init() resolves so we don't flash the lock screen
  // during the async auth check on cold start.
  let authReady = false;
  // Magic-link cooldown: Supabase rate-limits magic link sends (3/hour/email
  // on free tier). A user tapping "Send link" repeatedly can lock themselves
  // out. Enforce a 60s client-side cooldown between sends.
  const MAGIC_LINK_COOLDOWN_MS = 60000;
  let lastMagicLinkAt = 0;

  // ── PERSIST ──
  function scopedKey(base, userId = currentLocalUserId) {
    return userId ? `${base}:${userId}` : null;
  }

  function setLocalUser(user) {
    currentLocalUserId = user && user.id ? user.id : null;
  }

  function resetLocalAppState() {
    data = seedState();
    view.activeTab = 'now';
    view.overlay = null;
    view.highlightedId = null;
    view.reentryDismissedFor = null;
    view.expanded = false;
    view.inlineEditId = null;
    view.draggingLoopId = null;
    view.overlayOpenerEl = null;
    view.onboardingStep = -1;
    view.loopCap = DEFAULT_LOOP_CAP;
  }

  function quarantineLegacyLocalData() {
    let moved = false;
    try {
      const raw = localStorage.getItem(LEGACY_STORAGE_KEY);
      if (!raw) return;
      const existing = localStorage.getItem(LEGACY_STORAGE_QUARANTINE_KEY);
      if (!existing) localStorage.setItem(LEGACY_STORAGE_QUARANTINE_KEY, raw);
      localStorage.removeItem(LEGACY_STORAGE_KEY);
      moved = true;
    } catch(e) {}
    return moved;
  }

  function hasLegacyQuarantinedData() {
    try {
      return !!(
        localStorage.getItem(LEGACY_STORAGE_QUARANTINE_KEY) ||
        localStorage.getItem(LEGACY_OFFLINE_QUEUE_QUARANTINE_KEY) ||
        localStorage.getItem(LEGACY_DEAD_QUEUE_QUARANTINE_KEY)
      );
    } catch(e) { return false; }
  }

  function load() {
    if (!currentLocalUserId) {
      resetLocalAppState();
      return;
    }
    resetLocalAppState();
    try {
      const raw = localStorage.getItem(scopedKey(STORAGE_KEY_BASE));
      if (raw) {
        const parsed = JSON.parse(raw);
        if (parsed && Array.isArray(parsed.loops)) {
          data = { version: 2, lastLoopId: parsed.lastLoopId || null, activeTab: 'now', loops: parsed.loops.map(sanitize) };
          view.activeTab = parsed.activeTab || 'now';
        }
      }
    } catch(e) {}
    // Reentry dismissal (survives reload)
    try {
      const r = localStorage.getItem(scopedKey(REENTRY_KEY_BASE));
      if (r) view.reentryDismissedFor = r;
    } catch(e) {}
    // Loop cap
    try {
      const c = parseInt(localStorage.getItem(scopedKey(LOOP_CAP_KEY_BASE)) || '', 10);
      if (ALLOWED_LOOP_CAPS.includes(c)) view.loopCap = c;
    } catch(e) {}
  }

  function save() {
    const key = scopedKey(STORAGE_KEY_BASE);
    if (!key) return;
    try {
      localStorage.setItem(key, JSON.stringify({ version: 2, lastLoopId: data.lastLoopId, activeTab: view.activeTab, loops: data.loops }));
    } catch(e) {}
  }

  function saveReentryDismissed(id) {
    view.reentryDismissedFor = id || null;
    const key = scopedKey(REENTRY_KEY_BASE);
    if (!key) return;
    try {
      if (id) localStorage.setItem(key, id);
      else    localStorage.removeItem(key);
    } catch(e) {}
  }

  function saveLoopCap(n) {
    if (!ALLOWED_LOOP_CAPS.includes(n)) return;
    view.loopCap = n;
    const key = scopedKey(LOOP_CAP_KEY_BASE);
    if (!key) return;
    try { localStorage.setItem(key, String(n)); } catch(e) {}
  }

  // ── QUERIES ──
  // Display order is position desc (highest = top). Array order in
  // data.loops is kept roughly in sync but realtime updates and createLoop
  // can reorder it; byStatus sorts defensively on every call so render
  // functions always see the same order.
  function byStatus(s) {
    return data.loops
      .filter(l => l.status === s)
      .sort((a, b) => (b.position || 0) - (a.position || 0));
  }
  function getLoop(id) { return data.loops.find(l => l.id === id) || null; }
  function suggested() {
    if (data.lastLoopId) {
      const l = getLoop(data.lastLoopId);
      if (l && l.status === 'active') return l;
    }
    return byStatus('active')[0] || null;
  }

  // ── MUTATIONS ──
  // Return a position value strictly greater than every existing loop's
  // position — used when creating a new loop (it should land at the top).
  function topPosition() {
    if (!data.loops.length) return nowPosition();
    const max = data.loops.reduce((m, l) => (l.position > m ? l.position : m), -Infinity);
    // Step by 1s so newly-created loops within the same second don't tie.
    return Math.max(max, nowPosition()) + 1;
  }

  function createLoop({rawText, kind, promptAnswer, status}) {
    const l = sanitize({
      id: uid('l'),
      rawText, kind, promptAnswer, status,
      position: topPosition(),
      createdAt: nowIso(),
      updatedAt: nowIso()
    });
    data.loops.unshift(l);
    if (l.status === 'active') data.lastLoopId = l.id;
    return l;
  }

  function updateLoop(id, patch) {
    const l = getLoop(id);
    if (!l) return null;
    Object.assign(l, patch, { updatedAt: nowIso() });
    // Warn rather than silently coerce: a bad value here usually means a
    // schema drift, a future feature flag, or a corrupted sync payload.
    if (l.kind !== null && l.kind !== undefined && !VALID_KINDS.has(l.kind)) {
      console.warn(`[open-loops] Coercing invalid kind "${l.kind}" to null on loop ${l.id}`);
      l.kind = null;
    }
    if (!VALID_STATUSES.has(l.status)) {
      console.warn(`[open-loops] Coercing invalid status "${l.status}" to "active" on loop ${l.id}`);
      l.status = 'active';
    }
    if (typeof l.rawText === 'string' && l.rawText.length > MAX_LOOP_TEXT_LEN) {
      l.rawText = l.rawText.slice(0, MAX_LOOP_TEXT_LEN);
    }
    if (l.status === 'active') data.lastLoopId = l.id;
    return l;
  }

  function removeLoop(id) {
    data.loops = data.loops.filter(l => l.id !== id);
    if (data.lastLoopId === id) data.lastLoopId = suggested()?.id || null;
  }

  // Move dragId to the slot occupied by targetId (among active loops, in
  // display order = position desc). Computes a new `position` for dragId as
  // the midpoint between its new neighbours so no other row needs to change.
  //
  // Returns { ok: true, newPosition } on success so the caller can sync a
  // single-row UPDATE for the moved loop. Returns { ok: false } if the move
  // is a no-op (same spot, missing ids, etc).
  //
  // Float-space rebalancing note: double precision gives us ~15-17 decimal
  // digits. If a user drags the *same* pair of neighbours repeatedly (which
  // halves the gap each time), we lose precision after ~50 drops. Detected
  // via an MIN_GAP threshold — below that we trigger a per-user rebalance
  // that spreads all active positions out evenly. Cheap, local, rare.
  const POSITION_MIN_GAP = 1e-9;

  function rebalanceActivePositions() {
    // Reassign positions on active loops in their current display order,
    // spaced by 1.0. Returns a list of { id, position } for sync.
    const active = data.loops
      .filter(l => l.status === 'active')
      .sort((a, b) => (b.position || 0) - (a.position || 0));
    const base = nowPosition();
    const changes = [];
    active.forEach((l, i) => {
      // Largest position at the top of the list → descending by index.
      const p = base + (active.length - i);
      if (l.position !== p) {
        l.position = p;
        l.updatedAt = nowIso();
        changes.push({ id: l.id, position: p });
      }
    });
    return changes;
  }

  function moveActiveLoop(dragId, targetId) {
    if (!dragId || !targetId || dragId === targetId) return { ok: false };
    // Build the active list in display order (highest position first).
    const active = data.loops
      .filter(l => l.status === 'active')
      .sort((a, b) => (b.position || 0) - (a.position || 0));
    const fromIdx = active.findIndex(l => l.id === dragId);
    const toIdx   = active.findIndex(l => l.id === targetId);
    if (fromIdx < 0 || toIdx < 0) return { ok: false };

    // Simulate the move to figure out dragId's new neighbours.
    const reordered = active.slice();
    const [moved] = reordered.splice(fromIdx, 1);
    reordered.splice(toIdx, 0, moved);
    const newIdx = reordered.indexOf(moved);

    // Compute new position from neighbours (positions sort descending, so
    // "above" = higher position, "below" = lower position).
    const above = newIdx > 0 ? reordered[newIdx - 1].position : null;
    const below = newIdx < reordered.length - 1 ? reordered[newIdx + 1].position : null;

    let newPosition;
    if (above != null && below != null) {
      newPosition = (above + below) / 2;
    } else if (above != null) {
      // Dragged to the bottom (no neighbour below).
      newPosition = above - 1;
    } else if (below != null) {
      // Dragged to the top (no neighbour above).
      newPosition = below + 1;
    } else {
      newPosition = nowPosition();
    }

    // Detect float-precision exhaustion and rebalance if needed.
    const gapAbove = above != null ? Math.abs(above - newPosition) : Infinity;
    const gapBelow = below != null ? Math.abs(newPosition - below) : Infinity;
    if (gapAbove < POSITION_MIN_GAP || gapBelow < POSITION_MIN_GAP) {
      moved.position = newPosition; // apply the move first
      moved.updatedAt = nowIso();
      const changes = rebalanceActivePositions();
      data.lastLoopId = dragId;
      return { ok: true, rebalance: true, changes };
    }

    moved.position = newPosition;
    moved.updatedAt = nowIso();
    data.lastLoopId = dragId;
    return { ok: true, rebalance: false, changes: [{ id: dragId, position: newPosition }] };
  }

  function moveActiveLoopByOffset(loopId, offset) {
    if (!loopId || !offset) return { ok: false };
    const active = data.loops
      .filter(l => l.status === 'active')
      .sort((a, b) => (b.position || 0) - (a.position || 0));
    const idx = active.findIndex(l => l.id === loopId);
    const target = idx >= 0 ? active[idx + offset] : null;
    if (!target) return { ok: false };
    return moveActiveLoop(loopId, target.id);
  }

  function syncPositionChanges(result) {
    if (!result || !result.ok || !Array.isArray(result.changes)) return;
    for (const change of result.changes) {
      Sync.updateLoop(change.id, { position: change.position });
    }
  }

  // ── TOAST ──
  function toast(msg, opts) {
    const el = document.getElementById('toast');
    if (!el) return;
    el.textContent = '';
    el.classList.remove('has-action');
    const span = document.createElement('span');
    span.textContent = msg;
    el.appendChild(span);
    const dur = (opts && opts.duration) || DEFAULT_TOAST_MS;
    if (opts && opts.action && typeof opts.onAction === 'function') {
      el.classList.add('has-action');
      const btn = document.createElement('button');
      btn.className = 'toast-action';
      btn.type = 'button';
      btn.textContent = opts.action;
      btn.addEventListener('click', () => {
        clearTimeout(toastTimer);
        el.classList.remove('visible');
        el.classList.remove('has-action');
        try { opts.onAction(); } catch(e) {}
      });
      el.appendChild(btn);
    }
    el.classList.add('visible');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => {
      el.classList.remove('visible');
      el.classList.remove('has-action');
    }, dur);
  }

  // ── ESCAPE HTML ──
  // Escape all five XML special chars (incl. both quote types) for safe
  // interpolation into attributes or text. Defensive: current callers use
  // double-quoted attrs, but escaping ' too lets us relax that if we ever
  // switch to single-quoted attributes.
  function esc(s) {
    return String(s||'')
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;')
      .replace(/'/g,'&#39;');
  }

  // ── KIND CHIP HTML ──
  function chipHtml(kind) {
    const m = kindMeta[kind] || kindMeta.inbox;
    const cls = kind || 'inbox';
    return `<span class="kind-chip ${cls}"><span class="kind-dot"></span>${m.label}</span>`;
  }

  // ── LOOP CARD ──
  function dragHandleHtml(enabled) {
    if (!enabled) return '';
    return `<span class="drag-handle" title="Drag to reorder" aria-hidden="true">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M5 3.2h.1M9 3.2h.1M5 7h.1M9 7h.1M5 10.8h.1M9 10.8h.1" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/></svg>
    </span>`;
  }

  // â”€â”€ LOOP CARD â”€â”€
  function cardHtml(loop, idx, opts = {}) {
    const m = kindMeta[loop.kind] || kindMeta.inbox;
    const hl = view.highlightedId === loop.id ? ' highlighted' : '';
    const delay = `animation-delay:${idx*0.04}s`;
    // Suppress drag while this card is in inline-edit mode. Otherwise a
    // mid-edit drag triggers re-render before save and the user's typed
    // (but not yet saved) text is silently discarded.
    const isEditing = view.inlineEditId === loop.id;
    const dragEnabled = opts.draggable && !isEditing;
    const draggable = dragEnabled ? ' draggable="true" data-draggable-loop="1"' : '';
    const handle = dragHandleHtml(dragEnabled);
    const canMoveUp = dragEnabled && idx > 0;
    const canMoveDown = dragEnabled && idx < (opts.total || 0) - 1;
    const reorderControls = dragEnabled ? `
      <span class="reorder-controls" aria-label="Reorder loop">
        <button class="reorder-btn" type="button" data-action="move-loop-up" data-loop-id="${esc(loop.id)}" title="Move up" aria-label="Move loop up" ${canMoveUp ? '' : 'disabled'}>
          <svg viewBox="0 0 14 14" fill="none" aria-hidden="true"><path d="M7 3.2 3.8 6.4M7 3.2l3.2 3.2M7 3.2v7.6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <button class="reorder-btn" type="button" data-action="move-loop-down" data-loop-id="${esc(loop.id)}" title="Move down" aria-label="Move loop down" ${canMoveDown ? '' : 'disabled'}>
          <svg viewBox="0 0 14 14" fill="none" aria-hidden="true"><path d="M7 10.8 3.8 7.6M7 10.8l3.2-3.2M7 10.8V3.2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </span>` : '';

    if (isEditing) {
      const editLen = (loop.rawText || '').length;
      const editCounterClass = editLen >= MAX_LOOP_TEXT_LEN
        ? ' at-limit'
        : editLen >= MAX_LOOP_TEXT_LEN - 50 ? ' near-limit' : '';
      return `
        <article class="loop-card kind-${loop.kind || 'inbox'}${hl}" style="${delay}" data-loop-id="${esc(loop.id)}"${draggable}>
          <div class="loop-card-top">
            <div class="loop-card-top-left">${handle}${chipHtml(loop.kind)}</div>

              </button>
            </div>
          </div>
          <textarea class="inline-edit-input" id="inline-edit-${esc(loop.id)}" rows="2" maxlength="${MAX_LOOP_TEXT_LEN}">${esc(loop.rawText)}</textarea>
          <div class="inline-edit-meta">
            <span class="char-counter${editCounterClass}" id="inline-edit-counter-${esc(loop.id)}" aria-live="polite">${editLen}/${MAX_LOOP_TEXT_LEN}</span>
          </div>
          <div class="loop-card-bottom">
            <button class="btn-action btn btn-sm" data-action="inline-edit-save" data-loop-id="${esc(loop.id)}">Save</button>
            <button class="btn-ghost btn btn-sm" data-action="inline-edit-cancel">Cancel</button>
          </div>
        </article>`;
    }

    return `
      <article class="loop-card kind-${loop.kind || 'inbox'}${hl}" style="${delay}" data-loop-id="${esc(loop.id)}"${draggable}>
        <div class="loop-card-top">
          <div class="loop-card-top-left">${handle}${chipHtml(loop.kind)}</div>
          <div class="loop-card-tools">
            ${reorderControls}
            <button class="card-overflow" data-action="open-menu" data-loop-id="${esc(loop.id)}" title="More" aria-label="More options">
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true"><circle cx="3" cy="7" r="1.2" fill="currentColor"/><circle cx="7" cy="7" r="1.2" fill="currentColor"/><circle cx="11" cy="7" r="1.2" fill="currentColor"/></svg>
            </button>
          </div>
        </div>
        <p class="loop-title" data-action="inline-edit-start" data-loop-id="${esc(loop.id)}" title="Click to edit" style="cursor:text">${esc(loop.rawText)}</p>
        <div class="loop-next">
          <span class="loop-next-label">Next</span>
          <span>${esc(loop.promptAnswer || 'No next step set.')}</span>
        </div>
        <div class="loop-card-bottom">
          <button class="btn-action kind-${loop.kind || 'inbox'}" data-action="primary-action" data-loop-id="${esc(loop.id)}">${m.action}</button>
        </div>
      </article>`;
  }

  // ── HOME RENDER ──
  function renderHome() {
    const active = byStatus('active');
    const cap = view.loopCap || DEFAULT_LOOP_CAP;
    const visible = view.expanded ? active : active.slice(0, cap);
    const waiting = byStatus('waiting');
    const released = byStatus('released');
    const inbox = byStatus('inbox');
    const hidden = Math.max(0, active.length - visible.length);

    let html = '';

    html += `
      <div class="tabs">
        <button class="tab ${view.activeTab === 'now' ? 'active' : ''}" data-action="set-tab" data-tab="now">
          ${TAB_LABEL.active} <span class="tab-count">${active.length}</span>
        </button>
        <button class="tab ${view.activeTab === 'later' ? 'active' : ''}" data-action="set-tab" data-tab="later">
          ${TAB_LABEL.waiting} <span class="tab-count">${waiting.length}</span>
        </button>
        <button class="tab ${view.activeTab === 'done' ? 'active' : ''}" data-action="set-tab" data-tab="done">
          ${TAB_LABEL.released} <span class="tab-count">${released.length}</span>
        </button>
        <button class="tab ${view.activeTab === 'inbox' ? 'active' : ''}" data-action="set-tab" data-tab="inbox">
          ${TAB_LABEL.inbox} <span class="tab-count">${inbox.length}</span>
        </button>
      </div>`;

    if (view.activeTab === 'now') {
      html += `<div class="tab-panel active" id="tab-now">`;
      if (visible.length) {
        html += `<div class="loop-stack" data-active-stack="1">${visible.map((l,i) => cardHtml(l,i, { draggable: true, total: visible.length })).join('')}</div>`;
        if (hidden > 0 && !view.expanded) {
          html += `<button class="show-more" data-action="show-more">Show ${hidden} more loop${hidden > 1 ? 's' : ''}</button>`;
        }
      } else {
        html += `<div class="empty-state"><strong>No active loops - your head is clear</strong>Capture a raw loop, then define it when you're ready.</div>`;
      }
      html += `</div>`;
    }

    if (view.activeTab === 'later' || view.activeTab === 'waiting') {
      html += `<div class="tab-panel active" id="tab-later">`;
      if (waiting.length) {
        html += `<div class="loop-stack">`;
        waiting.forEach((loop, i) => {
          html += `
            <article class="loop-card kind-${loop.kind || 'inbox'}" style="animation-delay:${i*0.04}s">
              <div class="loop-card-top">${chipHtml(loop.kind)}<button class="card-overflow" data-action="open-menu" data-loop-id="${esc(loop.id)}" title="More" aria-label="More options"><svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true"><circle cx="3" cy="7" r="1.2" fill="currentColor"/><circle cx="7" cy="7" r="1.2" fill="currentColor"/><circle cx="11" cy="7" r="1.2" fill="currentColor"/></svg></button></div>
              <p class="loop-title">${esc(loop.rawText)}</p>
              <div class="loop-next"><span class="loop-next-label">Note</span><span>${esc(loop.promptAnswer || '-')}</span></div>
              <div class="loop-card-bottom">
                <button class="btn-action" data-action="restore-active" data-loop-id="${esc(loop.id)}">Make active</button>
              </div>
            </article>`;
        });
        html += `</div>`;
      } else {
        html += `<div class="empty-state"><strong>Nothing parked right now</strong>Park loops here when the next move isn't yours yet.</div>`;
      }
      html += `</div>`;
    }

    if (view.activeTab === 'done' || view.activeTab === 'released') {
      html += `<div class="tab-panel active" id="tab-done">`;
      if (released.length) {
        html += `<div class="loop-stack">`;
        released.forEach((loop, i) => {
          html += `
            <article class="loop-card kind-${loop.kind || 'inbox'}" style="animation-delay:${i*0.04}s;opacity:0.72">
              <div class="loop-card-top">${chipHtml(loop.kind)}<button class="card-overflow" data-action="open-menu" data-loop-id="${esc(loop.id)}" title="More" aria-label="More options"><svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true"><circle cx="3" cy="7" r="1.2" fill="currentColor"/><circle cx="7" cy="7" r="1.2" fill="currentColor"/><circle cx="11" cy="7" r="1.2" fill="currentColor"/></svg></button></div>
              <p class="loop-title" style="text-decoration:line-through;color:var(--text-2)">${esc(loop.rawText)}</p>
              <div class="loop-next"><span class="loop-next-label">Note</span><span>${esc(loop.promptAnswer || '-')}</span></div>
              <div class="loop-card-bottom">
                <button class="btn-action" data-action="restore-active" data-loop-id="${esc(loop.id)}">Reopen</button>
              </div>
            </article>`;
        });
        html += `</div>`;
      } else {
        html += `<div class="empty-state"><strong>Nothing closed yet</strong>When a loop is done, close it here.</div>`;
      }
      html += `</div>`;
    }

    if (view.activeTab === 'inbox') {
      html += `<div class="tab-panel active" id="tab-inbox">`;
      if (inbox.length) {
        html += `<div class="loop-stack">`;
        inbox.forEach((loop, i) => {
          html += `
            <article class="loop-card kind-${loop.kind || 'inbox'}" style="animation-delay:${i*0.04}s">
              <div class="loop-card-top">${chipHtml(loop.kind || 'inbox')}<button class="card-overflow" data-action="open-menu" data-loop-id="${esc(loop.id)}" title="More" aria-label="More options"><svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true"><circle cx="3" cy="7" r="1.2" fill="currentColor"/><circle cx="7" cy="7" r="1.2" fill="currentColor"/><circle cx="11" cy="7" r="1.2" fill="currentColor"/></svg></button></div>
              <p class="loop-title">${esc(loop.rawText)}</p>
              <div class="loop-card-bottom">
                <button class="btn-action btn-primary" data-action="define-raw" data-loop-id="${esc(loop.id)}">Define and route</button>
              </div>
            </article>`;
        });
        html += `</div>`;
      } else {
        html += `<div class="empty-state"><strong>No raw loops</strong>Captured loops land here before you define where they belong.</div>`;
      }
      html += `</div>`;
    }

    html += `
      <button class="fab" data-action="open-capture" type="button">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><line x1="7" y1="2" x2="7" y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="2" y1="7" x2="12" y2="7" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        Capture
      </button>`;

    return html;
  }
  function renderCapture(ov) {
    if (!ov) return '';
    const closeBtn = `<button class="overlay-close" data-action="close-overlay" title="Close"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><line x1="4" y1="4" x2="12" y2="12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><line x1="12" y1="4" x2="4" y2="12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg></button>`;

    }).join('');
    const canAdd = ov.rawText.trim() && ov.kind;
    return `
      <div class="overlay-card" role="dialog" aria-modal="true" aria-labelledby="capture-title">

          <div class="overlay-meta"><div class="overlay-eyebrow">New raw loop</div><div class="overlay-step">Capture to Raw</div></div>
          ${closeBtn}
        </div>
        <h2 class="overlay-title" id="capture-title">Get it out of your head.</h2>
        <p class="overlay-subtitle">Name the open loop and choose the kind of attention it needs. It will land in Raw, not Active.</p>
        <textarea class="big-input" id="capture-input" placeholder="One unfinished thing..." maxlength="${MAX_LOOP_TEXT_LEN}" aria-describedby="capture-counter">${esc(ov.rawText)}</textarea>
        <div class="input-hint-row">
          <p class="input-hint">Keep it short enough that Future You recognizes it instantly.</p>
          <span class="char-counter" id="capture-counter" aria-live="polite">${len}/${MAX_LOOP_TEXT_LEN}</span>
