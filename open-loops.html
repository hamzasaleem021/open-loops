  // ── RENDER MAIN ──
  function renderMain() {
    const main = document.getElementById('app-main');
    const app = document.getElementById('app');
    
    if (view.processingMode) {
      if (app) app.classList.add('processing-mode');
      if (main) main.innerHTML = renderProcessing();
    } else {
      if (app) app.classList.remove('processing-mode');
      if (main) main.innerHTML = renderHome();
    }
    
    focusInlineEdit();
  }

  function renderProcessing() {
    const loops = byStatus('active').filter(l => l.kind);
    
    if (!loops.length) {
      return `
        <div class="processing-view">
          <div class="processing-header">
            <div class="processing-title">No loops to process</div>
            <p style="text-align:center;color:var(--text-2);font-size:14px;">
              Capture something to get started.
            </p>
          </div>
        </div>
      `;
    }
    
    // Ensure current index is valid
    if (view.currentLoopIndex >= loops.length) view.currentLoopIndex = 0;
    if (view.currentLoopIndex < 0) view.currentLoopIndex = loops.length - 1;
    
    const loop = loops[view.currentLoopIndex];
    const m = kindMeta[loop.kind] || kindMeta.inbox;
    
    return `
      <div class="processing-view">
        <div class="processing-header">
          <div class="processing-count">Loop ${view.currentLoopIndex + 1} of ${loops.length}</div>
          <div class="processing-title">Processing Mode</div>
        </div>
        
        <div class="processing-card">
          <div style="margin-bottom:16px;">${chipHtml(loop.kind)}</div>
          <div class="processing-loop-text">${esc(loop.rawText)}</div>
          ${loop.promptAnswer ? `<p style="font-size:13px;color:var(--text-2);margin-bottom:20px;padding:12px;background:var(--surface-2);border-radius:8px;">${esc(loop.promptAnswer)}</p>` : ''}
          
          <div class="processing-actions">
            <button class="processing-action-btn do" data-action="processing-complete" data-loop-id="${esc(loop.id)}">
              ${kindMeta.do.label}
              <span class="processing-action-label">1</span>
            </button>
            <button class="processing-action-btn decide" data-action="processing-reclassify" data-loop-id="${esc(loop.id)}" data-kind="decide">
              ${kindMeta.decide.label}
              <span class="processing-action-label">2</span>
            </button>
            <button class="processing-action-btn ask" data-action="processing-reclassify" data-loop-id="${esc(loop.id)}" data-kind="ask">
              ${kindMeta.ask.label}
              <span class="processing-action-label">3</span>
            </button>
            <button class="processing-action-btn schedule" data-action="processing-reclassify" data-loop-id="${esc(loop.id)}" data-kind="schedule">
              ${kindMeta.schedule.label}
              <span class="processing-action-label">4</span>
            </button>
            <button class="processing-action-btn let_go" data-action="processing-release" data-loop-id="${esc(loop.id)}">
              ${kindMeta.let_go.label}
              <span class="processing-action-label">5</span>
            </button>
          </div>
        </div>
        
        <div class="processing-skip">
          <button class="processing-skip-btn" data-action="processing-skip">Skip this loop</button>
        </div>
      </div>
    `;
  }


  function focusInlineEdit() {
    if (view.inlineEditId) {
      const el = document.getElementById(`inline-edit-${view.inlineEditId}`);
      if (el) { el.focus(); el.selectionStart = el.selectionEnd = el.value.length; }
    }
  }

  function renderOverlay() {
    const root = document.getElementById('overlay-root');
    if (!root) return;
    const ov = view.overlay;
    if (!ov) { root.innerHTML = ''; return; }

    let inner = '';
    if (ov.type === 'capture') inner = renderCapture(ov);
    else if (ov.type === 'menu') inner = renderMenu(getLoop(ov.loopId));
    else if (ov.type === 'change-kind') inner = renderChangekind(getLoop(ov.loopId));
    else if (ov.type === 'sync') inner = renderSync();
    else if (ov.type === 'primary-action') inner = renderPrimaryAction(getLoop(ov.loopId));

    root.innerHTML = `
      <div class="overlay-backdrop" data-action="close-overlay"></div>
      <div class="overlay-panel">${inner}</div>`;

    // Focus first input
    const firstInput = root.querySelector('textarea, input[type="email"]');
    if (firstInput) setTimeout(() => firstInput.focus(), 50);
  }

  function renderHeader() {
    const pill = document.getElementById('sync-pill');
    const label = document.getElementById('sync-label');
    if (!pill || !label) return;
    pill.className = `pill-btn ${view.syncStatus}`;
    label.textContent = view.syncText;
  }

  function renderAll() {
    renderHeader();
    renderSidebar();
    renderMain();
    renderContextPanel();
    renderOverlay();
    // Auth + onboarding layers sit on top — always re-evaluate
    if (authReady && !Sync.isLoggedIn()) {
      renderAuthGate();
    } else if (authReady) {
      hideAuthGate();
    }
    if (view.onboardingStep >= 0) renderOnboarding();
  }

  // ── ACTIONS ──
  // Local-only persistence + re-render. Cross-device sync is handled by
  // the explicit Sync.{create,update,delete}Loop calls at each call site.
  function persistAndSync() {
    save();
    renderMain();
  }

  function moveToNextLoop() {
    const loops = byStatus('active').filter(l => l.kind);
    if (!loops.length) {
      view.processingMode = false;
      renderAll();
      return;
    }
    view.currentLoopIndex++;
    if (view.currentLoopIndex >= loops.length) {
      view.currentLoopIndex = 0;
    }
    renderMain();
    renderContextPanel();
  }

  function moveToPrevLoop() {
    const loops = byStatus('active').filter(l => l.kind);
    if (!loops.length) return;
    view.currentLoopIndex--;
    if (view.currentLoopIndex < 0) {
      view.currentLoopIndex = loops.length - 1;
    }
    renderMain();
    renderContextPanel();
  }


  function closeOverlay() {
    view.overlay = null;
    renderOverlay();
  }

  // ── MUTATION GUARD ──
  // Returns true (and shows toast) if user is not logged in.
  function requireLogin() {
    if (Sync.isLoggedIn()) return false;
    toast('Sign in to save your loops.');
    // Bring up auth gate if somehow not visible
    if (authReady) renderAuthGate();
    return true;
  }

  // ── EVENT DELEGATION ──
  document.addEventListener('click', async e => {
    const el = e.target.closest('[data-action]');
    if (!el) return;
    const action = el.dataset.action;
    const loopId = el.dataset.loopId || null;

    // Overlay management
    if (action === 'close-overlay') { closeOverlay(); return; }

    // ── AUTH GATE ACTIONS ──
    if (action === 'auth-gate-send') {
      const input = document.getElementById('auth-gate-email');
      const email = input ? input.value.trim() : view.authGateEmail;
      if (!email) { toast('Enter your email.'); return; }
      view.authGateEmail = email;
      const btn = document.getElementById('auth-gate-btn');
      if (btn) { btn.disabled = true; btn.textContent = 'Sending…'; }
      try {
        await Sync.sendMagicLink(email);
        view.authGateSent = true;
        renderAuthGate();
      } catch(err) {
        if (btn) { btn.disabled = false; btn.textContent = 'Send magic link'; }
        toast(err.message || 'Could not send link. Try again.');
      }
      return;
    }
    if (action === 'auth-gate-reset') {
      view.authGateSent = false;
      view.authGateEmail = '';
      renderAuthGate();
      return;
    }

    // ── ONBOARDING ACTIONS ──
    if (action === 'onboarding-next') {
      const isLast = view.onboardingStep === ONBOARDING_STEPS.length - 1;
      if (isLast) { markOnboardingComplete(); }
      else { view.onboardingStep++; renderOnboarding(); }
      return;
    }
    if (action === 'onboarding-prev') {
      if (view.onboardingStep > 0) { view.onboardingStep--; renderOnboarding(); }
      return;
    }
    if (action === 'onboarding-skip') {
      markOnboardingComplete();
      return;
    }

    // Overlay management

    // Tabs
    if (action === 'set-tab') {
      view.activeTab = el.dataset.tab;
      save();
      renderMain();
      return;
    }

    // FAB
    if (action === 'open-capture') {
      if (requireLogin()) return;
      view.overlay = { type: 'capture', step: 'capture', rawText: '', kind: null, promptAnswer: '', sourceId: null };
      renderOverlay();
      return;
    }

    // Reentry
    if (action === 'continue-reentry') {
      const l = suggested();
      if (l) { view.highlightedId = l.id; data.lastLoopId = l.id; }
      view.reentryDismissedFor = l?.id || null;
      renderMain();
      return;
    }
    if (action === 'dismiss-reentry') {
      view.reentryDismissedFor = suggested()?.id || null;
      renderMain();
      return;
    }

    // Inbox
    if (action === 'clarify-inbox') {
      const next = byStatus('inbox')[0];
      if (next) {
        view.overlay = { type: 'capture', step: 'kind', rawText: next.rawText, kind: null, promptAnswer: next.promptAnswer || '', sourceId: next.id };
        renderOverlay();
      }
      return;
    }

    // Capture flow
    if (action === 'capture-next') {
      const ov = view.overlay;
      if (!ov || ov.type !== 'capture') return;
      const val = document.getElementById('capture-input')?.value.trim();
      if (!val) return;
      ov.rawText = val;
      ov.step = 'kind';
      renderOverlay();
      return;
    }
    if (action === 'capture-back') {
      if (view.overlay?.type === 'capture') { view.overlay.step = 'capture'; renderOverlay(); }
      return;
    }
    if (action === 'pick-kind') {
      if (view.overlay?.type === 'capture') { view.overlay.kind = el.dataset.kind; renderOverlay(); }
      return;
    }
    if (action === 'kind-next') {
      if (view.overlay?.type === 'capture' && view.overlay.kind) { view.overlay.step = 'detail'; renderOverlay(); }
      return;
    }
    if (action === 'kind-back') {
      if (view.overlay?.type === 'capture') { view.overlay.step = 'kind'; renderOverlay(); }
      return;
    }
    if (action === 'finish-capture') {
      if (requireLogin()) return;
      const ov = view.overlay;
      if (!ov || ov.type !== 'capture') return;
      const ans = document.getElementById('detail-input')?.value.trim();
      if (!ans) return;
      ov.promptAnswer = ans;
      let _syncAction = null;
      if (ov.sourceId) {
        const patch = { rawText: ov.rawText, kind: ov.kind, promptAnswer: ans, status: ov.kind === 'let_go' ? 'released' : 'active' };
        updateLoop(ov.sourceId, patch);
        view.highlightedId = ov.sourceId;
        _syncAction = () => Sync.updateLoop(ov.sourceId, patch);
      } else {
        const l = createLoop({ rawText: ov.rawText, kind: ov.kind, promptAnswer: ans, status: ov.kind === 'let_go' ? 'released' : 'active' });
        view.highlightedId = l.id;
        if (l.status === 'released') view.activeTab = 'released';
        else view.activeTab = 'now';
        _syncAction = () => Sync.createLoop(l);
      }
      view.reentryDismissedFor = null;
      closeOverlay();
      await persistAndSync();
      _syncAction();
      toast('Loop saved.');
      return;
    }
    if (action === 'save-for-later') {
      if (requireLogin()) return;
      const ov = view.overlay;
      if (!ov || ov.type !== 'capture') return;
      const raw = document.getElementById('capture-input')?.value.trim();
      if (!raw) return;
      if (ov.sourceId) {
        const patch = { rawText: raw, status: 'inbox' };
        updateLoop(ov.sourceId, patch);
        closeOverlay();
        await persistAndSync();
        Sync.updateLoop(ov.sourceId, patch);
      } else {
        const l = createLoop({ rawText: raw, kind: null, promptAnswer: '', status: 'inbox' });
        closeOverlay();
        await persistAndSync();
        Sync.createLoop(l);
      }
      toast('Saved to inbox.');
      return;
    }

    // Show more
    if (action === 'show-more') { view.expanded = true; renderMain(); return; }

    // Menu open
    if (action === 'open-menu') {
      view.overlay = { type: 'menu', loopId };
      renderOverlay();
      return;
    }

    // Primary action
    if (action === 'primary-action') {
      view.overlay = { type: 'primary-action', loopId };
      renderOverlay();
      return;
    }

    // Primary action outcomes
    if (action === 'complete-done') {
      if (requireLogin()) return;
      const patch = { status: 'released' };
      updateLoop(loopId, patch);
      closeOverlay();
      view.activeTab = 'now';
      await persistAndSync();
      Sync.updateLoop(loopId, patch);
      toast('Released.');
      return;
    }
    if (action === 'complete-progress') {
      closeOverlay();
      toast('Still in progress.');
      return;
    }
    if (action === 'complete-update') {
      closeOverlay();
      const l = getLoop(loopId);
      if (l) {
        view.overlay = { type: 'capture', step: 'detail', rawText: l.rawText, kind: l.kind, promptAnswer: l.promptAnswer, sourceId: loopId };
        renderOverlay();
      }
      return;
    }

    // Status changes
    if (action === 'move-waiting') {
      if (requireLogin()) return;
      const patch = { status: 'waiting' };
      updateLoop(loopId, patch);
      closeOverlay();
      await persistAndSync();
      Sync.updateLoop(loopId, patch);
      toast('Moved to Waiting.');
      return;
    }
    if (action === 'move-released') {
      if (requireLogin()) return;
      const patch = { status: 'released' };
      updateLoop(loopId, patch);
      closeOverlay();
      view.activeTab = 'now';
      await persistAndSync();
      Sync.updateLoop(loopId, patch);
      toast('Released.');
      return;
    }
    if (action === 'restore-active') {
      if (requireLogin()) return;
      const patch = { status: 'active' };
      updateLoop(loopId, patch);
      closeOverlay();
      view.activeTab = 'now';
      await persistAndSync();
      Sync.updateLoop(loopId, patch);
      toast('Returned to Now.');
      return;
    }
    if (action === 'delete-loop') {
      if (requireLogin()) return;
      const target = getLoop(loopId);
      if (!target) { closeOverlay(); return; }
      const snapshot = JSON.parse(JSON.stringify(target));
      const originalIndex = data.loops.findIndex(l => l.id === loopId);
      const wasLast = data.lastLoopId === loopId;
      removeLoop(loopId);
      closeOverlay();
      await persistAndSync();
      Sync.deleteLoop(loopId);
      toast('Loop deleted.', {
        action: 'Undo',
        duration: 8000,
        onAction: async () => {
          if (getLoop(snapshot.id)) return;
          const insertAt = Math.min(Math.max(originalIndex, 0), data.loops.length);
          data.loops.splice(insertAt, 0, snapshot);
          if (wasLast) data.lastLoopId = snapshot.id;
          await persistAndSync();
          // Undo soft-delete on the server so the row reappears everywhere.
          Sync.undeleteLoop(snapshot.id);
          toast('Restored.');
        }
      });
      return;
    }

    // Change kind
    if (action === 'reclarify-kind') {
      closeOverlay();
      view.overlay = { type: 'change-kind', loopId };
      renderOverlay();
      return;
    }
    if (action === 'set-kind-direct') {
      if (requireLogin()) return;
      const newKind = el.dataset.kind;
      const patch = { kind: newKind };
      // Match capture-flow behavior: choosing "Let go" releases the loop.
      if (newKind === 'let_go') patch.status = 'released';
      updateLoop(loopId, patch);
      closeOverlay();
      if (newKind === 'let_go') view.activeTab = 'now';
      await persistAndSync();
      Sync.updateLoop(loopId, patch);
      toast(newKind === 'let_go' ? 'Released.' : 'Kind updated.');
      return;
    }

    // Inline edit
    if (action === 'inline-edit-start') {
      view.inlineEditId = loopId;
      renderMain();
      return;
    }
    if (action === 'inline-edit-open') {
      view.inlineEditId = loopId;
      closeOverlay();
      renderMain();
      return;
    }
    if (action === 'inline-edit-save') {
      if (requireLogin()) return;
      const inp = document.getElementById(`inline-edit-${loopId}`);
      const val = inp ? inp.value.trim() : null;
      if (val) {
        const patch = { rawText: val };
        updateLoop(loopId, patch);
        await persistAndSync();
        Sync.updateLoop(loopId, patch);
        toast('Updated.');
      }
      view.inlineEditId = null;
      renderMain();
      return;
    }
    if (action === 'inline-edit-cancel') {
      view.inlineEditId = null;
      renderMain();
      return;
    }

    // Sync
    if (action === 'open-sync') {
      view.overlay = { type: 'sync' };
      renderOverlay();
      return;
    }
    if (action === 'send-magic-link') {
      const input = document.getElementById('sync-email');
      const email = input ? input.value.trim() : '';
      if (!email) { toast('Enter your email first.'); return; }
      try {
        setSyncStatus('syncing', 'Sending…');
        await Sync.sendMagicLink(email);
        setSyncStatus('idle', 'Check email');
        toast('Magic link sent — check your email.');
      } catch(e) {
        setSyncStatus('error', 'Error');
        toast(e.message || 'Could not send link.');
      }
      return;
    }
    if (action === 'sign-out') {
      await Sync.signOut();
      closeOverlay();
      return;
    }
    if (action === 'sync-retry') {
      renderOverlay();
      const result = await Sync.retry();
      if (result?.ok) toast('Sync restored.');
      else toast('Still having trouble syncing.');
      renderOverlay();
      return;
    }

    // Processing mode
    if (action === 'toggle-processing-mode') {
      view.processingMode = !view.processingMode;
      view.currentLoopIndex = 0;
      renderAll();
      return;
    }

    if (action === 'processing-complete') {
      if (requireLogin()) return;
      const patch = { status: 'released' };
      updateLoop(loopId, patch);
      await persistAndSync();
      Sync.updateLoop(loopId, patch);
      moveToNextLoop();
      toast('Completed!');
      return;
    }

    if (action === 'processing-reclassify') {
      if (requireLogin()) return;
      const newKind = el.dataset.kind;
      const patch = { kind: newKind };
      updateLoop(loopId, patch);
      await persistAndSync();
      Sync.updateLoop(loopId, patch);
      moveToNextLoop();
      toast('Updated!');
      return;
    }

    if (action === 'processing-release') {
      if (requireLogin()) return;
      const patch = { kind: 'let_go', status: 'released' };
      updateLoop(loopId, patch);
      await persistAndSync();
      Sync.updateLoop(loopId, patch);
      moveToNextLoop();
      toast('Released!');
      return;
    }

    if (action === 'processing-skip') {
      moveToNextLoop();
      return;
    }

    // Sidebar tab switching
    if (action === 'switch-tab') {
      view.activeTab = el.dataset.tab;
      save();
      renderMain();
      renderSidebar();
      return;
    }

    // Dismiss sync error banner
    if (action === 'dismiss-sync-banner') {
      const banner = document.getElementById('sync-error-banner');
      if (banner) banner.style.display = 'none';
      return;
    }
  });

  // Input binding for capture + auth gate email tracking
  document.addEventListener('input', e => {
    // Track auth gate email typing in view state
    if (e.target.id === 'auth-gate-email') {
      view.authGateEmail = e.target.value;
      return;
    }
    const ov = view.overlay;
    if (!ov || ov.type !== 'capture') return;
    if (e.target.id === 'capture-input') {
      ov.rawText = e.target.value;
      const btn = document.querySelector('[data-action="capture-next"]');
      if (btn) btn.disabled = !e.target.value.trim();
    }
    if (e.target.id === 'detail-input') {
      ov.promptAnswer = e.target.value;
      const btn = document.querySelector('[data-action="finish-capture"]');
      if (btn) btn.disabled = !e.target.value.trim();
    }
  });

  // Enter key on auth gate email → submit
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && e.target.id === 'auth-gate-email') {
      e.preventDefault();
      const btn = document.getElementById('auth-gate-btn');
      if (btn && !btn.disabled) btn.click();
    }
  }, true); // capture phase so it fires before the main keydown handler

  // Keyboard: Escape closes overlays, Enter saves inline edit, c opens capture
  document.addEventListener('keydown', e => {
    // Ignore if typing in input fields (except for specific cases)
    const isTyping = ['INPUT','TEXTAREA','SELECT'].includes(e.target.tagName);
    
    // Escape key
    if (e.key === 'Escape') {
      if (view.inlineEditId) { view.inlineEditId = null; renderMain(); }
      else if (view.processingMode) { view.processingMode = false; renderAll(); }
      else closeOverlay();
      return;
    }
    
    // Processing mode toggle (p)
    if ((e.key === 'p' || e.key === 'P') && !view.overlay && !view.inlineEditId && !isTyping) {
      e.preventDefault();
      view.processingMode = !view.processingMode;
      view.currentLoopIndex = 0;
      renderAll();
      return;
    }
    
    // Capture (c)
    if (e.key === 'c' && !view.overlay && !view.inlineEditId && !isTyping) {
      e.preventDefault();
      if (requireLogin()) return;
      view.overlay = { type: 'capture', step: 'capture', rawText: '', kind: null, promptAnswer: '', sourceId: null };
      renderOverlay();
      return;
    }
    
    // Processing mode shortcuts
    if (view.processingMode && !view.overlay && !isTyping) {
      const loops = byStatus('active').filter(l => l.kind);
      if (!loops.length) return;
      
      const currentLoop = loops[view.currentLoopIndex];
      if (!currentLoop) return;
      
      // Navigation: j (next), k (previous)
      if (e.key === 'j' || e.key === 'J') {
        e.preventDefault();
        moveToNextLoop();
        return;
      }
      if (e.key === 'k' || e.key === 'K') {
        e.preventDefault();
        moveToPrevLoop();
        return;
      }
      
      // Quick actions: 1-5
      if (e.key === '1') {
        e.preventDefault();
        if (requireLogin()) return;
        const patch = { status: 'released' };
        updateLoop(currentLoop.id, patch);
        persistAndSync();
        Sync.updateLoop(currentLoop.id, patch);
        moveToNextLoop();
        toast('Completed!');
        return;
      }
      if (e.key === '2') {
        e.preventDefault();
        if (requireLogin()) return;
        const patch = { kind: 'decide' };
        updateLoop(currentLoop.id, patch);
        persistAndSync();
        Sync.updateLoop(currentLoop.id, patch);
        moveToNextLoop();
        toast('Updated!');
        return;
      }
      if (e.key === '3') {
        e.preventDefault();
        if (requireLogin()) return;
        const patch = { kind: 'ask' };
        updateLoop(currentLoop.id, patch);
        persistAndSync();
        Sync.updateLoop(currentLoop.id, patch);
        moveToNextLoop();
        toast('Updated!');
        return;
      }
      if (e.key === '4') {
        e.preventDefault();
        if (requireLogin()) return;
        const patch = { kind: 'schedule' };
        updateLoop(currentLoop.id, patch);
        persistAndSync();
        Sync.updateLoop(currentLoop.id, patch);
        moveToNextLoop();
        toast('Updated!');
        return;
      }
      if (e.key === '5') {
        e.preventDefault();
        if (requireLogin()) return;
        const patch = { kind: 'let_go', status: 'released' };
        updateLoop(currentLoop.id, patch);
        persistAndSync();
        Sync.updateLoop(currentLoop.id, patch);
        moveToNextLoop();
        toast('Released!');
        return;
      }
      
      // Edit (e)
      if (e.key === 'e' || e.key === 'E') {
        e.preventDefault();
        view.inlineEditId = currentLoop.id;
        view.processingMode = false;
        renderAll();
        return;
      }
    }
    
    // Inline edit save with Enter
    if (e.key === 'Enter' && e.target.classList.contains('inline-edit-input') && !e.shiftKey) {
      e.preventDefault();
      const loopId = e.target.id.replace('inline-edit-', '');
      const val = e.target.value.trim();
      if (val) {
        if (requireLogin()) return;
        const patch = { rawText: val };
        updateLoop(loopId, patch);
        persistAndSync();
        Sync.updateLoop(loopId, patch);
        toast('Updated.');
      }
      view.inlineEditId = null;
      renderMain();
    }
  });

  // ── AUTO-RETRY ON NETWORK EVENTS ──
  // When we come back online or refocus the tab, drain any queued offline
  // operations. Individual edits already sync immediately when online.
  window.addEventListener('online', async () => {
    if (Sync.isLoggedIn()) {
      await Sync.processQueue();
    }
  });

  window.addEventListener('focus', async () => {
    if (Sync.isLoggedIn()) {
      await Sync.processQueue();
    }
  });

  // ── SUPABASE SYNC (atomic, one-row-per-loop) ──
  // Every edit is a single-row INSERT/UPDATE. PostgreSQL serializes concurrent
  // writes to the same row, so two devices editing different loops never
  // conflict, and two devices editing the same loop serialize rather than
  // overwriting each other's whole state.
  //
  // Offline edits are queued in localStorage and drained on reconnect.
  const OFFLINE_QUEUE_KEY = 'open_loops_offline_queue';

  const Sync = (() => {
    if (!window.supabase || !hasSupabaseCfg()) {
      return {
        init:          async () => {},
        createLoop:    () => {},
        updateLoop:    () => {},
        deleteLoop:    () => {},
        undeleteLoop:  () => {},
        processQueue:  async () => ({ ok: true, pending: true }),
        retry:         async () => ({ ok: true, pending: true }),
        sendMagicLink: async () => { throw new Error('Supabase is not configured in open-loops-config.js.'); },
        signOut:       async () => {},
        isLoggedIn:    () => false
      };
    }

    const db = window.supabase.createClient(CFG.SUPABASE_URL, CFG.SUPABASE_KEY, {
      auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: true }
    });

    let currentUser = null;
    let channel     = null;
    let retryTimer  = null;
    let draining    = false;

    // Echo suppression: when we write a row, the realtime subscription will
    // echo it back. We don't want that echo to clobber a newer in-flight
    // local edit, so we track recently-written ids for a few seconds.
    const recentEchoes = new Map(); // id -> expiry timestamp (ms)
    function markEcho(id) { recentEchoes.set(id, Date.now() + 3000); }
    function isEcho(id) {
      const exp = recentEchoes.get(id);
      if (!exp) return false;
      if (Date.now() > exp) { recentEchoes.delete(id); return false; }
      return true;
    }

    function cleanUrl() {
      if (location.hash || location.search.includes('code='))
        history.replaceState({}, document.title, location.pathname);
    }

    function showSyncErrorBanner() {
      const banner = document.getElementById('sync-error-banner');
      if (banner) banner.style.display = 'flex';
    }
    function hideSyncErrorBanner() {
      const banner = document.getElementById('sync-error-banner');
      if (banner) banner.style.display = 'none';
    }

    // ── Offline queue (localStorage) ──
    // Entry shape: { op: 'create'|'update'|'delete'|'undelete', id, payload?, ts }
    function loadQueue() {
      try {
        const raw = localStorage.getItem(OFFLINE_QUEUE_KEY);
        if (!raw) return [];
        const parsed = JSON.parse(raw);
        return Array.isArray(parsed) ? parsed : [];
      } catch(e) { return []; }
    }
    function saveQueue(q) {
      try {
        if (!q.length) localStorage.removeItem(OFFLINE_QUEUE_KEY);
        else           localStorage.setItem(OFFLINE_QUEUE_KEY, JSON.stringify(q));
      } catch(e) {}
    }
    function enqueue(entry) {
      const q = loadQueue();
      // Coalesce back-to-back updates to the same id so we don't pile up
      // hundreds of small UPDATEs from typing into an inline edit field.
      if (entry.op === 'update' && q.length) {
        const last = q[q.length - 1];
        if (last.op === 'update' && last.id === entry.id) {
          last.payload = { ...last.payload, ...entry.payload };
          last.ts = entry.ts;
          saveQueue(q);
          setSyncStatus('syncing', 'Pending…');
          return;
        }
      }
      q.push(entry);
      saveQueue(q);
      setSyncStatus('syncing', 'Pending…');
    }

    // ── Map between local loop shape and DB row shape ──
    function loopToRow(loop) {
      return {
        id:            loop.id,
        user_id:       currentUser.id,
        raw_text:      loop.rawText || '',
        kind:          VALID_KINDS.has(loop.kind) ? loop.kind : null,
        status:        loop.status || 'active',
        prompt_answer: loop.promptAnswer || '',
        created_at:    loop.createdAt || nowIso()
        // updated_at is set by the DB trigger.
      };
    }
    function rowToLoop(row) {
      return sanitize({
        id:           row.id,
        rawText:      row.raw_text || '',
        kind:         row.kind,
        status:       row.status,
        promptAnswer: row.prompt_answer || '',
        createdAt:    row.created_at,
        updatedAt:    row.updated_at
      });
    }
    function patchToRow(patch) {
      const out = {};
      if ('rawText'      in patch) out.raw_text      = patch.rawText;
      if ('kind'         in patch) out.kind          = VALID_KINDS.has(patch.kind) ? patch.kind : null;
      if ('status'       in patch) out.status        = patch.status;
      if ('promptAnswer' in patch) out.prompt_answer = patch.promptAnswer;
      if ('deleted_at'   in patch) out.deleted_at    = patch.deleted_at;
      if ('completed_at' in patch) out.completed_at  = patch.completed_at;
      return out;
    }

    // ── Single-row network ops ──
    async function netCreate(loop) {
      markEcho(loop.id);
      const { error } = await db.from('loops').insert(loopToRow(loop));
      if (error) throw error;
    }
    async function netUpdate(id, patch) {
      const row = patchToRow(patch);
      if (!Object.keys(row).length) return;
      markEcho(id);
      const { error } = await db.from('loops').update(row).eq('id', id);
      if (error) throw error;
    }
    async function netDelete(id) {
      markEcho(id);
      const { error } = await db.from('loops')
        .update({ deleted_at: nowIso() })
        .eq('id', id);
      if (error) throw error;
    }
    async function netUndelete(id) {
      markEcho(id);
      const { error } = await db.from('loops')
        .update({ deleted_at: null })
        .eq('id', id);
      if (error) throw error;
    }

    async function processQueue() {
      if (draining || !currentUser) return { ok: true, pending: !currentUser };
      const q = loadQueue();
      if (!q.length) { setSyncStatus('synced', 'Synced'); return { ok: true }; }
      draining = true;
      setSyncStatus('syncing', 'Syncing…');
      try {
        while (q.length) {
          const entry = q[0];
          try {
            if      (entry.op === 'create')   await netCreate(entry.payload);
            else if (entry.op === 'update')   await netUpdate(entry.id, entry.payload);
            else if (entry.op === 'delete')   await netDelete(entry.id);
            else if (entry.op === 'undelete') await netUndelete(entry.id);
          } catch(e) {
            console.error('Queue drain error:', e, entry);
            saveQueue(q); // keep the failing entry at the head
            setSyncStatus('error', 'Not saved');
            showSyncErrorBanner();
            scheduleRetry();
            return { ok: false, error: e };
          }
          q.shift();
          saveQueue(q);
        }
        setSyncStatus('synced', 'Synced');
        hideSyncErrorBanner();
        return { ok: true };
      } finally {
        draining = false;
      }
    }

    function scheduleRetry() {
      if (retryTimer) return;
      retryTimer = setTimeout(async () => {
        retryTimer = null;
        if (currentUser && navigator.onLine && loadQueue().length) {
          await processQueue();
        }
      }, 8000);
    }

    // ── Full pull (on login / init) ──
    async function pullAll() {
      if (!currentUser) return;
      setSyncStatus('syncing', 'Syncing…');
      try {
        const { data: rows, error } = await db
          .from('loops')
          .select('*')
          .is('deleted_at', null)
          .order('created_at', { ascending: false });
        if (error) throw error;

        if (!rows || !rows.length) {
          // Empty server. If local has loops (e.g. first sync after a
          // local-only period, or post-migration), seed the server.
          if (data.loops && data.loops.length) {
            const payload = data.loops.map(l => ({
              id:           l.id,
              rawText:      l.rawText,
              kind:         l.kind,
              status:       l.status,
              promptAnswer: l.promptAnswer,
              createdAt:    l.createdAt
            }));
            const { error: upErr } = await db.rpc('batch_upsert_loops', { p_loops: payload });
            if (upErr) throw upErr;
          }
          setSyncStatus('synced', 'Synced');
          hideSyncErrorBanner();
          return;
        }

        // Server has data — server is truth on pull. Replace local state.
        const remoteLoops = rows.map(rowToLoop);
        const keepLast = data.lastLoopId && remoteLoops.some(l => l.id === data.lastLoopId);
        data = {
          version:    2,
          lastLoopId: keepLast ? data.lastLoopId : (remoteLoops.find(l => l.status === 'active')?.id || null),
          activeTab:  view.activeTab || 'now',
          loops:      remoteLoops
        };
        save();
        renderMain();
        setSyncStatus('synced', 'Synced');
        hideSyncErrorBanner();
      } catch(e) {
        console.error('Pull error:', e);
        setSyncStatus('error', 'Sync error');
        showSyncErrorBanner();
      }
    }

    // ── Realtime: apply per-row changes from other devices ──
    function setupRealtime() {
      if (!currentUser || channel) return;
      channel = db.channel(`loops:${currentUser.id}`)
        .on('postgres_changes',
          { event: '*', schema: 'public', table: 'loops', filter: `user_id=eq.${currentUser.id}` },
          payload => {
            const eventType = payload.eventType || payload.event;
            const row = payload.new || payload.old;
            if (!row || !row.id) return;

            // Ignore echoes of our own recent writes.
            if (isEcho(row.id)) return;

            if (eventType === 'DELETE') {
              // Hard delete (rare — we soft-delete).
              data.loops = data.loops.filter(l => l.id !== row.id);
              if (data.lastLoopId === row.id) data.lastLoopId = null;
              save();
              renderMain();
              return;
            }

            const incoming = payload.new;
            if (!incoming) return;

            // Soft delete: drop from local list.
            if (incoming.deleted_at) {
              data.loops = data.loops.filter(l => l.id !== incoming.id);
              if (data.lastLoopId === incoming.id) data.lastLoopId = null;
              save();
              renderMain();
              return;
            }

            const mapped = rowToLoop(incoming);
            const idx = data.loops.findIndex(l => l.id === mapped.id);
            if (idx === -1) {
              // New row from another device — insert at top (matches createLoop).
              data.loops.unshift(mapped);
            } else {
              data.loops[idx] = mapped;
            }
            save();
            renderMain();
          })
        .subscribe();
    }

    db.auth.onAuthStateChange(async (event, session) => {
      if (event === 'SIGNED_IN' && session) {
        currentUser = session.user;
        cleanUrl();
        setSyncStatus('syncing', 'Syncing…');
        // Drain anything captured while signed-out/offline first, then pull.
        if (loadQueue().length) await processQueue();
        await pullAll();
        setupRealtime();
        // Auth gate → hide; reveal app
        authReady = true;
        hideAuthGate();
        view.authGateSent = false;
        // Trigger onboarding on first sign-in
        if (!hasCompletedOnboarding()) {
          startOnboarding();
        }
        renderAll();
      } else if (event === 'SIGNED_OUT') {
        currentUser = null;
        if (channel) { db.removeChannel(channel); channel = null; }
        setSyncStatus('idle', 'Sync');
        hideSyncErrorBanner();
        // Re-lock the app
        renderAll(); // will call renderAuthGate() since isLoggedIn() is false
      }
    });

    return {
      async init() {
        try {
          const { data: { session } } = await db.auth.getSession();
          if (session) {
            currentUser = session.user;
            cleanUrl();
            setSyncStatus('syncing', 'Syncing…');
            if (loadQueue().length) await processQueue();
            await pullAll();
            setupRealtime();
          }
        } catch(e) {
          console.error('Sync init error:', e);
          setSyncStatus('error', 'Sync error');
          showSyncErrorBanner();
        }
        // Auth check complete — now we know whether user is logged in
        authReady = true;
        if (!currentUser) {
          renderAuthGate();
        } else if (!hasCompletedOnboarding()) {
          // Already logged in (returning user) but never did onboarding
          startOnboarding();
        }
      },

      // Mutations: enqueue + drain. If offline, the queue persists and drains
      // on the 'online'/'focus' event or on next init.
      createLoop(loop) {
        if (!loop || !loop.id) return;
        enqueue({ op: 'create', id: loop.id, payload: loop, ts: Date.now() });
        if (currentUser && navigator.onLine) processQueue();
        else if (!navigator.onLine) { setSyncStatus('syncing', 'Offline'); scheduleRetry(); }
      },
      updateLoop(loopId, changes) {
        if (!loopId || !changes) return;
        enqueue({ op: 'update', id: loopId, payload: { ...changes }, ts: Date.now() });
        if (currentUser && navigator.onLine) processQueue();
        else if (!navigator.onLine) { setSyncStatus('syncing', 'Offline'); scheduleRetry(); }
      },
      deleteLoop(loopId) {
        if (!loopId) return;
        enqueue({ op: 'delete', id: loopId, ts: Date.now() });
        if (currentUser && navigator.onLine) processQueue();
        else if (!navigator.onLine) { setSyncStatus('syncing', 'Offline'); scheduleRetry(); }
      },
      undeleteLoop(loopId) {
        if (!loopId) return;
        enqueue({ op: 'undelete', id: loopId, ts: Date.now() });
        if (currentUser && navigator.onLine) processQueue();
        else if (!navigator.onLine) { setSyncStatus('syncing', 'Offline'); scheduleRetry(); }
      },

      async processQueue() {
        if (!currentUser) return { ok: true, pending: true };
        return await processQueue();
      },

      async retry() {
        if (!currentUser) return { ok: true, pending: true };
        setSyncStatus('syncing', 'Syncing…');
        try {
          const r = await processQueue();
          if (!r.ok) return r;
          await pullAll();
          setupRealtime();
          return { ok: true };
        } catch(e) {
          setSyncStatus('error', 'Sync error');
          return { ok: false, error: e };
        }
      },

      async sendMagicLink(email) {
        const redirect = CFG.EMAIL_REDIRECT_TO || (IS_FILE ? null : `${location.origin}${location.pathname}`);
        if (!redirect) throw new Error('Set EMAIL_REDIRECT_TO in open-loops-config.js (required when running from file://).');
        const { error } = await db.auth.signInWithOtp({ email, options: { emailRedirectTo: redirect } });
        if (error) throw error;
      },

      async signOut() { await db.auth.signOut(); },
      isLoggedIn() { return !!currentUser; }
    };
  })();

  function setSyncStatus(key, text) {
    view.syncStatus = key;
    view.syncText = text;
    renderHeader();
  }

  // ── INIT ──
  load();
  renderAll(); // First paint (authReady=false → no auth gate flash yet)

  // Kick off auth check. When Supabase is not configured, Sync.init() is a
  // no-op so we set authReady manually and show the "not configured" gate.
  if (!hasSupabaseCfg()) {
    // No Supabase — show config gate immediately after paint
    setTimeout(() => {
      authReady = true;
      renderAuthGate();
    }, 0);
  } else {
    // Sync.init() sets authReady = true internally once the session check resolves
    Sync.init();
  }

  // ── SERVICE WORKER ──
  if ('serviceWorker' in navigator && !IS_FILE) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./open-loops-sw.js')
        .then(registration => {
          // Check for updates every 60 seconds
          setInterval(() => registration.update(), 60000);
          
          // Listen for updates
          registration.addEventListener('updatefound', () => {
            const newWorker = registration.installing;
            newWorker.addEventListener('statechange', () => {
              if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                // New version available
                toast('Update available! Refreshing...', { duration: 2000 });
                setTimeout(() => window.location.reload(), 2000);
              }
            });
          });
        })
        .catch(() => {});
    });
  }
})();
</script>
</body>
</html>
